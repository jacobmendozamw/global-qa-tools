                      const col = dotColor(pt.risk, pt.qaei);
                      const isLast = i === points.length - 1;
                      return (
                        <g key={pt.q} style={{cursor:'pointer'}} onClick={()=>setDetail({type:'base', record:pt.r})}>
                          <circle cx={cx} cy={cy} r={isLast ? 7 : 5} fill={col} stroke="var(--bg)" strokeWidth="2"/>
                          <text x={cx} y={cy - 10} textAnchor="middle" fontSize="8.5" fontWeight={isLast?'700':'400'} fill="var(--text2)">{pt.qi.label}</text>
                          {pt.qaei == null && (
                            <text x={cx} y={cy+3} textAnchor="middle" fontSize="6.5" fill="var(--bg)">NA</text>
                          )}
                        </g>
                      );
                    })}
                  </svg>

                  {/* Legend: scores of latest quarter */}
                  {(() => {
                    const last = points[points.length-1];
                    const rl = last.risk!=null ? riskLevel(last.risk) : null;
                    return (
                      <div style={{display:'flex', gap:10, marginTop:10, paddingTop:8, borderTop:'1px solid var(--border)', fontSize:11}}>
                        <div>
                          <span style={{color:'var(--text3)'}}>Risk </span>
                          <span style={{fontWeight:700, color:rl?.text||'var(--text)', background:rl?.bg, padding:'1px 6px', borderRadius:4, border:`1px solid ${rl?.border||'var(--border)'}`}}>{last.risk?.toFixed(1) ?? '—'}</span>
                        </div>
                        <div>
                          <span style={{color:'var(--text3)'}}>QAEI </span>
                          <span style={{fontWeight:700, color:'var(--text2)'}}>{last.qaei!=null ? last.qaei.toFixed(1) : 'NA'}</span>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              );
            })}
          </div>
        );
      })()}

      {!loading && filteredRecords.length>0 && viewMode==='gauge' && (() => {
        const byProjQ = {};
        deduped.forEach(r => {
          const q = quarterOf(r.date);
          if (!byProjQ[r.project]) byProjQ[r.project] = {};
          byProjQ[r.project][q] = r;
        });
        const visProjs = PROJECTS.filter(p => visibleProjects.has(p));

        const CX=100, CY=96, R=70, SW=14;
        const toRad = d => d * Math.PI / 180;
        const gpt = deg => [CX + R*Math.cos(toRad(deg)), CY - R*Math.sin(toRad(deg))];
        const bgPath = `M${gpt(180)[0].toFixed(1)},${gpt(180)[1].toFixed(1)} A${R},${R},0,0,1,${gpt(0)[0].toFixed(1)},${gpt(0)[1].toFixed(1)}`;
        const rArc = v => {
          if (!v || v <= 0) return null;
          const [x1,y1] = gpt(180), [x2,y2] = gpt(180-(v/10)*90);
          return `M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R},0,0,1,${x2.toFixed(1)},${y2.toFixed(1)}`;
        };
        const qArc = v => {
          if (!v || v <= 0) return null;
          const [x1,y1] = gpt(0), [x2,y2] = gpt((v/10)*90);
          return `M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R},0,0,0,${x2.toFixed(1)},${y2.toFixed(1)}`;
        };

        return (
          <div style={{overflowX:'auto', paddingBottom:8}}>
            <div style={{display:'flex', gap:16, alignItems:'flex-start', minWidth:'max-content'}}>
              {visProjs.map(proj => {
                const projQuarters = allQuarters.filter(q => (!filterQuarter || q === filterQuarter) && byProjQ[proj]?.[q]);
                if (!projQuarters.length) return null;
                return (
                  <div key={proj} style={{display:'flex', flexDirection:'column', gap:12, width:210, flexShrink:0}}>
                    <div style={{fontSize:14, fontWeight:700, paddingBottom:8, borderBottom:'1px solid var(--border)'}}>{proj}</div>
                    {projQuarters.map(q => {
                      const r = byProjQ[proj][q];
                      const qi = quarterInfo(quarterOf(r.date));
                      const de = r.jira?.detectionEfficiency;
                      const mp = jiraMetrics?.modelParams || DEFAULT_MODEL_PARAMS;
                      const pmScores = Object.fromEntries(['automationConfidence','testCoverage','testability'].map(k=>[k, r.scores?.[k] ?? PROJECT_DEFAULTS[proj]?.[k]]));
                      const qaeiResult = computeQAEI(de ? de.rate : 0, pmScores, mp);
                      const hasDCE = !!de;
                      const risk = computedRisk(r) ?? 0;
                      const qaei = qaeiResult?.qaei ?? 0;
                      const rl = riskLevel(risk);
                      const ql = qaLevel(qaei);
                      const W=210, H=126;
                      const [sepX, sepY] = gpt(90);
                      return (
                        <div key={q} style={{border:'1px solid var(--border)', borderRadius:10, overflow:'hidden', background:'var(--bg)'}}>
                          <div style={{padding:'7px 12px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center', background:'var(--bg2)'}}>
                            <span style={{fontSize:11, fontWeight:600, color:'var(--text2)'}}>{qi.label}</span>
                            <div style={{display:'flex', gap:4}}>
                              {qi.isCurrent && <span style={{fontSize:9, padding:'1px 6px', borderRadius:20, background:'var(--blue-bg)', color:'var(--blue-text)', fontWeight:600}}>live</span>}
                              {r.evaluator==='auto'&&!qi.isCurrent && <span style={{fontSize:9, padding:'1px 6px', borderRadius:20, background:'var(--bg3)', color:'var(--text3)', fontWeight:600}}>auto</span>}
                            </div>
                          </div>
                          <div style={{paddingTop:4, textAlign:'center'}}>
                            <svg width={W} height={H} style={{display:'block', margin:'0 auto', overflow:'visible'}}>
                              <path d={bgPath} fill="none" stroke="var(--border)" strokeWidth={SW} strokeLinecap="butt"/>
                              {rArc(risk) && <path d={rArc(risk)} fill="none" stroke={rl?.border||'#ccc'} strokeWidth={SW} strokeLinecap="butt"/>}
                              {qArc(qaei) && <path d={qArc(qaei)} fill="none" stroke={ql?.border||'#ccc'} strokeWidth={SW} strokeLinecap="butt" opacity={hasDCE?1:0.6}/>}
                              <line x1={sepX.toFixed(1)} y1={(CY-R-SW/2-1).toFixed(1)} x2={sepX.toFixed(1)} y2={(CY-R+SW/2+1).toFixed(1)} stroke="var(--bg)" strokeWidth="2.5"/>
                              <text x={(gpt(180)[0]-4).toFixed(1)} y={(CY+16).toFixed(1)} textAnchor="end" fontSize="10" fontWeight="600" fill={rl?.border||'var(--text2)'}>{risk.toFixed(1)}</text>
                              <text x={(gpt(180)[0]-4).toFixed(1)} y={(CY+27).toFixed(1)} textAnchor="end" fontSize="8" fill="var(--text3)">Risk</text>
                              <text x={(gpt(0)[0]+4).toFixed(1)} y={(CY+16).toFixed(1)} textAnchor="start" fontSize="10" fontWeight="600" fill={hasDCE?(ql?.border||'var(--text2)'):'var(--text3)'}>{hasDCE?qaei.toFixed(1):`~${qaei.toFixed(1)}`}</text>
                              <text x={(gpt(0)[0]+4).toFixed(1)} y={(CY+27).toFixed(1)} textAnchor="start" fontSize="8" fill="var(--text3)">QAEI</text>
                              <text x={CX} y={(CY-R*0.30).toFixed(1)} textAnchor="middle" fontSize="26" fontWeight="700" fill={rl?.border||'var(--text)'}>{risk.toFixed(1)}</text>
                              <text x={CX} y={(CY-R*0.30+16).toFixed(1)} textAnchor="middle" fontSize="9" fill="var(--text3)">{rl?.label||'—'}</text>
                            </svg>
                          </div>
                          <div style={{padding:'0 12px 10px', display:'flex', justifyContent:'center', gap:6}}>
                            {rl && <span style={{fontSize:9, fontWeight:700, padding:'1px 7px', borderRadius:20, background:rl.bg, color:rl.text, border:`1px solid ${rl.border}`}}>{rl.label}</span>}
                            {ql && <span style={{fontSize:9, fontWeight:700, padding:'1px 7px', borderRadius:20, background:ql.bg, color:ql.text, border:`1px solid ${ql.border}`, opacity:hasDCE?1:0.65}}>{hasDCE?ql.label:`~${ql.label}`}</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {!loading && filteredRecords.length>0 && viewMode==='table' && (
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Project</th><th>Quarter</th><th>Final Risk</th><th>Level</th>
                <th>Base Risk</th><th>TRITON</th><th>Notes</th>
              </tr>
            </thead>
            <tbody>
              {filteredRecords.map(r=>{
                const cr = computedRisk(r);
                const rl = riskLevel(cr ?? r.finalRisk);
                return (
                  <tr key={r.id} style={{cursor:'pointer'}} onClick={()=>setDetail({type:'base',record:r})}>
                    <td style={{color:'var(--text2)',whiteSpace:'nowrap'}}>{fmtDate(r.date)}</td>
                    <td style={{fontWeight:600}}>{r.project}</td>
                    <td style={{color:'var(--text3)'}}>{quarterOf(r.date)}</td>
                    <td style={{fontWeight:700,color:rl?rl.text:'var(--text3)'}}>{cr!=null?cr.toFixed(1):'—'}</td>
                    <td>{rl&&<span className="pill" style={{background:rl.bg,color:rl.text}}>{rl.label}</span>}</td>
                    <td style={{color:'var(--text2)'}}>{r.baseRisk!=null?r.baseRisk.toFixed(1):'—'}</td>
                    <td style={{color:'var(--text2)'}}>{r.tritonScore!=null?r.tritonScore.toFixed(1):'—'}</td>
                    <td style={{color:'var(--text2)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.notes||'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      <HistoryDetailModal detail={detail} onClose={()=>setDetail(null)}
        onSaveRecord={updatedRecord => {
          setDetail(prev => prev ? {...prev, record: updatedRecord} : null);
          setLocalRefresh(n => n + 1);
        }}
        jiraHistory={jiraHistory} jiraMetrics={jiraMetrics} testMetrics={testMetrics}/>
    </div>
  );
}

// ── ConfigView — what the calculation is using right now, with plain meanings ──
function ConfigView({ jiraMetrics, jiraHistory }) {
  const curve = jiraMetrics?.tritonCurve || DEFAULT_CURVE;
  const sev = jiraMetrics?.severityWeights || DEFAULT_SEV_WEIGHTS;
  const mp = jiraMetrics?.modelParams || DEFAULT_MODEL_PARAMS;
  const cal = jiraMetrics?.calibration;
  const win = jiraMetrics?.window;
  const projData = jiraMetrics?.projects || {};
  const pct = v => `${Math.round(v*100)}%`;
  // Sensitivity (Rec #5): recompute each project's final at a given μ.
  const simFinal = (proj, muV) => {
    const w = projData[proj]?.escapedDefects?.weighted;
    if (w == null || !PROJECT_DEFAULTS[proj]) return null;
    const tri = tritonScore10(w, {...curve, mu: muV}, mp);
    return compute({...PROJECT_DEFAULTS[proj], escapedDefects: tri}, false, mp).finalRisk;
  };
  const muVariants = [Math.max(1, curve.mu-2), curve.mu, curve.mu+2];
  const fmtDay = s => { try { return new Date(s + (s && s.length===10?'T00:00:00':'')).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return s; } };

  const Row = ({k, v, meaning}) => (
    <div style={{display:'grid',gridTemplateColumns:'150px 70px 1fr',gap:10,alignItems:'baseline',padding:'6px 0',borderBottom:'.5px solid var(--border)'}}>
      <div style={{fontSize:12,fontWeight:600}}>{k}</div>
      <div style={{fontSize:12,fontWeight:700,color:'var(--purple)'}}>{v}</div>
      <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.45}}>{meaning}</div>
    </div>
  );
  const Group = ({title, badge, children}) => (
    <div className="card" style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div style={{fontSize:13,fontWeight:700}}>{title}</div>
        {badge && <span className="dim-badge" style={{background:'var(--bg2)',color:'var(--text2)',borderColor:'var(--border2)'}}>{badge}</span>}
      </div>
      {children}
    </div>
  );

  return (
    <div style={{maxWidth:760}}>
      <div className="helper" style={{marginBottom:14}}>
        These are the exact parameters the calculation is using right now. Scores are sourced from TRITON and computed with the model below; values marked as policy are team decisions, not auto-derived.
      </div>

      <Group title="Overview">
        <Row k="Model version" v={jiraMetrics?.modelVersion || '—'} meaning="Identifies the formula version, so historical assessments stay comparable when the model changes." />
        <Row k="Quarter" v={jiraMetrics?.quarter || '—'} meaning="Evaluation period." />
        <Row k="TRITON data" v={win?`${win.elapsedPct}%`:'—'} meaning={win?`Pulled ${fmtDay(win.from)} – ${fmtDay(win.to)}. The quarter is ${win.elapsedPct}% elapsed — early readings count fewer days, so treat them as partial.`:'Extraction window.'} />
        <Row k="Final scale" v="0–10" meaning="Final Risk runs 0 (none) to 10 (max). Levels: Low 0–5.0 · Medium 5.1–7.3 · High 7.4–10." />
      </Group>

      <Group title="Formula" badge="how the final is built">
        <div style={{fontFamily:'monospace',fontSize:12,background:'var(--bg2)',borderRadius:6,padding:'8px 10px',marginBottom:8}}>
          Final = Base × 0.40 + TRITON × 0.60
        </div>
        <div className="helper">Inherent product risk (Base, 40%) and objective production defects (TRITON, 60%). QA process quality is measured separately in the QA Effectiveness Index tab — it no longer modifies the Risk score. Manual Override forces Final = 10.</div>
      </Group>

      <Group title="Base Risk — inherent product risk" badge="40% of final">
        <Row k="User impact" v={pct(BASE_WEIGHTS.userImpact)} meaning="Business criticality & size of user base." />
        <Row k="Rate of change" v={pct(BASE_WEIGHTS.rateOfChange)} meaning="Release frequency / how fast the product moves." />
        <Row k="Complexity" v={pct(BASE_WEIGHTS.complexity)} meaning="Integrations, dependencies, system logic." />
        <div className="helper" style={{marginTop:6}}>Pre-loaded per project (1–3, mapped to 0–10); confirmed quarterly. Weights are within this group.</div>
      </Group>

      <Group title="TRITON Score — escaped defects curve" badge="60% of final">
        <Row k="μ (mu)" v={curve.mu} meaning="POLICY: the number of severity-weighted escaped defects/quarter treated as MEDIUM risk (5/10). The target you measure against — set by the team. Lower μ = stricter; higher μ = more lenient." />
        <Row k="σ (sigma)" v={curve.sigma} meaning="Spread: how quickly the score rises/falls around μ. Smaller = sharper separation between projects." />
        <Row k="Scale" v={`0–${curve.scaleMax||10}`} meaning="Curve output range." />
        <Row k="Curve type" v={mp.curveType||'gaussian'} meaning="Shape mapping weighted count → score. gaussian (bell) or logistic (S-curve). Score = scale × CDF((weightedCount − μ)/σ)." />
        <div style={{marginTop:8,marginBottom:4,fontSize:11,fontWeight:600,color:'var(--text2)'}}>Severity weights (each defect counts as):</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {Object.entries(sev).map(([p,w]) => (
            <span key={p} className="pill" style={{background:'var(--bg2)',color:'var(--text2)',border:'.5px solid var(--border2)'}}>{p} ×{w}</span>
          ))}
        </div>
        <div className="helper" style={{marginTop:6}}>Higher severity counts more (continuously) toward the weighted count that feeds the curve.</div>
      </Group>


      {muVariants && Object.keys(projData).some(p=>PROJECT_DEFAULTS[p]) && (
        <Group title="Sensitivity — how μ moves each project" badge="Rec #5">
          <div className="helper" style={{marginBottom:8}}>Final Risk if μ were set lower (stricter) or higher (lenient). Helps the team pick the anchor with eyes open.</div>
          <div style={{display:'grid',gridTemplateColumns:`1fr ${muVariants.map(()=>'70px').join(' ')}`,gap:6,fontSize:11.5}}>
            <div style={{fontWeight:600,color:'var(--text2)'}}>Project</div>
            {muVariants.map((m,i)=><div key={i} style={{fontWeight:600,textAlign:'center',color:m===curve.mu?'var(--purple)':'var(--text2)'}}>μ={m}{m===curve.mu?' ★':''}</div>)}
            {Object.keys(projData).filter(p=>PROJECT_DEFAULTS[p]).map(p=>(
              <React.Fragment key={p}>
                <div style={{padding:'3px 0'}}>{p}</div>
                {muVariants.map((m,i)=>{const f=simFinal(p,m);const rl=f!=null?riskLevel(f):null;return (
                  <div key={i} style={{textAlign:'center',padding:'3px 0',borderRadius:4,background:rl?rl.bg:'transparent',color:rl?rl.text:'var(--text3)',fontWeight:m===curve.mu?700:500}}>{f!=null?f.toFixed(1):'—'}</div>
                );})}
              </React.Fragment>
            ))}
          </div>
        </Group>
      )}

      {jiraHistory?.projects && (
        <Group title="TRITON history (backfilled)" badge="Rec #5/#8">
          <div className="helper" style={{marginBottom:8}}>Escaped-defect TRITON score per quarter, reconstructed from Jira with this methodology. Used to validate the anchor and watch trends — informational, not the official score.</div>
          <div style={{display:'grid',gridTemplateColumns:`1fr ${(jiraHistory.quarters||[]).map(()=>'66px').join(' ')}`,gap:6,fontSize:11.5}}>
            <div style={{fontWeight:600,color:'var(--text2)'}}>Project</div>
            {(jiraHistory.quarters||[]).map(qq=><div key={qq} style={{fontWeight:600,textAlign:'center',color:'var(--text2)'}}>{qq.replace('-'," ")}</div>)}
            {Object.entries(jiraHistory.projects).map(([p,qd])=>(
              <React.Fragment key={p}>
                <div style={{padding:'3px 0'}}>{p}</div>
                {(jiraHistory.quarters||[]).map(qq=>{const c=qd[qq];const s=c?c.tritonScore:null;const rl=s!=null?riskLevel(s):null;return (
                  <div key={qq} style={{textAlign:'center',padding:'3px 0',borderRadius:4,background:rl?rl.bg:'transparent',color:rl?rl.text:'var(--text3)'}}>{s!=null?s.toFixed(1):'—'}</div>
                );})}
              </React.Fragment>
            ))}
          </div>
          {jiraHistory.calibrationStats && <div className="helper" style={{marginTop:8}}>Calibration check: across {jiraHistory.calibrationStats.n} real values, median {jiraHistory.calibrationStats.median} / mean {jiraHistory.calibrationStats.mean} → μ={curve.mu} sits near the center (anchor validated). Note the quarter-to-quarter volatility — read the trend, not a single point.</div>}
        </Group>
      )}

      {jiraHistory?.projects && (
        <Group title="Defect density (informational — NOT scored)" badge="Rec #1">
          <div className="helper" style={{marginBottom:8}}>Weighted escaped defects per 100 delivered items (Done Story/Bug), per project vs its own history. Does <strong>not</strong> affect the score — cross-team density isn't comparable, so this is each project against itself, building toward the Q4 decision.</div>
          <div style={{display:'grid',gridTemplateColumns:`1fr ${(jiraHistory.quarters||[]).map(()=>'66px').join(' ')}`,gap:6,fontSize:11.5}}>
            <div style={{fontWeight:600,color:'var(--text2)'}}>Project</div>
            {(jiraHistory.quarters||[]).map(qq=><div key={qq} style={{fontWeight:600,textAlign:'center',color:'var(--text2)'}}>{qq.replace('-'," ")}</div>)}
            {Object.entries(jiraHistory.projects).map(([p,qd])=>(
              <React.Fragment key={p}>
                <div style={{padding:'3px 0'}}>{p}</div>
                {(jiraHistory.quarters||[]).map(qq=>{const c=qd[qq];const d=c?c.density:null;return (
                  <div key={qq} style={{textAlign:'center',padding:'3px 0',color:'var(--text2)'}}>{d!=null?d:(c&&c.delivered===0?'n/a':'—')}</div>
                );})}
              </React.Fragment>
            ))}
          </div>
          <div className="helper" style={{marginTop:8}}>⚠ <strong>Mira</strong> shows <code>n/a</code> — its delivery isn't logged under MIRA Story/Bug (denominator ≈ 0), so density is undefined for it. That denominator must be fixed before density is usable for Mira. GenAI Lens, Mira Studio and Mobile have a usable per-project trend.</div>
        </Group>
      )}

      <Group title="Calibration cadence" badge="Rec #5">
        <Row k="Last reviewed" v={cal?.lastReviewed||'—'} meaning="When μ/σ were last set/validated." />
        <Row k="Next review" v={cal?.nextReview||'—'} meaning="μ/σ are anchored and reviewed on a cadence (not per quarter) so scores stay comparable over time." />
        <div className="helper" style={{marginTop:6}}>{cal?.basis ? `Basis: ${cal.basis}.` : ''} Recompute the basis from accumulated history once ≥4 quarters exist.</div>
      </Group>

      <Group title="Exposure normalization (defect density)" badge={jiraMetrics?.exposureEnabled ? 'ON' : 'OFF'}>
        <div className="helper">
          {jiraMetrics?.exposureEnabled
            ? 'Active: escaped defects are normalized by delivery volume (defects per unit shipped).'
            : 'Disabled. Cross-team density isn’t viable yet — delivered-volume counts vary too much by team (verified: 31× spread). The workable path is per-project trend (each project vs its own history) once enough quarters accrue. See scripts/jira-projects.json → exposure.'}
        </div>
      </Group>
    </div>
  );
}

// ── QAEffectivenessView ───────────────────────────────────────────────────────
function QAEffectivenessView({ jiraMetrics }) {
  const mp = jiraMetrics?.modelParams || DEFAULT_MODEL_PARAMS;
  const [activePod, setActivePod] = useState(PODS[0]);
  const [visibleProjects, setVisibleProjects] = useState(new Set(PODS[0].projects));

  const toggleProject = proj =>
    setVisibleProjects(s => { const n = new Set(s); n.has(proj) ? n.delete(proj) : n.add(proj); return n; });

  const selectPod = pod => {
    setActivePod(pod);
    setVisibleProjects(pod ? new Set(pod.projects) : new Set(PROJECTS));
  };

  const projectData = PROJECTS.map(proj => {
    const de       = jiraMetrics?.projects?.[proj]?.detectionEfficiency;
    const defaults = PROJECT_DEFAULTS[proj] || {};
    const result   = de ? computeQAEI(de.rate, defaults, mp) : null;
    const ql       = result ? qaLevel(result.qaei) : null;
    return { proj, de, defaults, result, ql };
  });

  const ScoreBar = ({ value, max = 10, color, dim }) => (
    <div style={{height:8, background:'var(--bg3)', borderRadius:4, opacity: dim ? 0.5 : 1}}>
      <div style={{height:8, width:`${Math.min(100, (value / max) * 100)}%`, background:color||'var(--teal)', borderRadius:4, transition:'width .4s'}}/>
    </div>
  );

  const docs = jiraMetrics?.docs || {};

  return (
    <div>
      {/* Header */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <div style={{fontSize:13, fontWeight:700}}>QA Effectiveness Index (QAEI)</div>
          <span className="dim-badge" style={{background:'var(--blue-bg)', color:'var(--blue-text)', borderColor:'var(--blue-border)'}}>Q3 2026 · Phase 1 of 2</span>
        </div>
        <div className="helper" style={{lineHeight:1.7}}>
          Measures the value QA adds independently of product complexity or user base size.
          A product can score <strong>High Risk</strong> and <strong>Excellent QA</strong> simultaneously — they answer different questions.
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginTop:10}}>
          <div style={{fontSize:11, background:'var(--bg2)', borderRadius:6, padding:'8px 10px', border:'.5px solid var(--border)'}}>
            <div style={{fontWeight:700, marginBottom:4}}>
              Formula — Q3 2026
              {docs.qaeiMethodology && <a href={docs.qaeiMethodology} target="_blank" rel="noreferrer" style={{fontSize:10, color:'var(--purple)', marginLeft:8, fontWeight:400}}>Metodología ↗</a>}
            </div>
            <code style={{fontSize:10, display:'block', lineHeight:1.6, color:'var(--text2)'}}>
              QAEI = DCE × 0.65 + Process Maturity × 0.35
            </code>
            <div style={{fontSize:10, color:'var(--text3)', marginTop:4}}>
              <strong>DCE</strong> — bugs caught by QA (staging + production) as % of all known bugs<br/>
              <strong>Process Maturity</strong> — automation, coverage, testability
              {docs.dceReference && <><br/><a href={docs.dceReference} target="_blank" rel="noreferrer" style={{color:'var(--purple)'}}>Referencia DCE ↗</a></>}
              {docs.riskBaselineConfluence && <><br/><a href={docs.riskBaselineConfluence} target="_blank" rel="noreferrer" style={{color:'var(--purple)'}}>QA Risk Baseline Confluence ↗</a></>}
            </div>
          </div>
          <div style={{fontSize:11, background:'var(--bg2)', borderRadius:6, padding:'8px 10px', border:'.5px solid var(--border)'}}>
            <div style={{fontWeight:700, marginBottom:4}}>Phase 2 — Q4 2026</div>
            <code style={{fontSize:10, display:'block', lineHeight:1.6, color:'var(--text3)'}}>
              QAEI = DCE × 0.50 + Trend × 0.30 + Process × 0.20
            </code>
            <div style={{fontSize:10, color:'var(--text3)', marginTop:4}}>
              Trend (quarter-over-quarter improvement) requires 2 consecutive real quarters of data. Unlocks after Q3 closes.
            </div>
          </div>
        </div>
      </div>

      {/* Project filter */}
      <div className="card" style={{marginBottom:16}}>
        {/* Pod filter row */}
        <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap', marginBottom:10, paddingBottom:10, borderBottom:'1px solid var(--border)'}}>
          <span style={{fontSize:11, fontWeight:600, color:'var(--text2)', flexShrink:0}}>Pod:</span>
          {PODS.map(pod => (
            <button key={pod.id} onClick={()=>selectPod(pod)}
              style={{fontSize:11, padding:'3px 12px', borderRadius:20, cursor:'pointer', fontFamily:'inherit',
                fontWeight: activePod && activePod.id===pod.id ? 600 : 400,
                border: activePod && activePod.id===pod.id ? '1.5px solid var(--teal)' : '.5px solid var(--border)',
                background: activePod && activePod.id===pod.id ? 'var(--teal-light)' : 'transparent',
                color: activePod && activePod.id===pod.id ? 'var(--teal-dim)' : 'var(--text3)', transition:'all .15s'}}>
              {pod.name}
            </button>
          ))}
        </div>
        {/* Project pills — filtered to the active pod */}
        <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          <span style={{fontSize:12, fontWeight:600, color:'var(--text2)', flexShrink:0}}>Projects:</span>
          {(activePod ? activePod.projects : PROJECTS).map(proj => {
            const visible = visibleProjects.has(proj);
            const pd = projectData.find(p => p.proj === proj);
            const ql = pd?.ql;
            return (
              <button key={proj} onClick={() => toggleProject(proj)}
                style={{fontSize:12, padding:'5px 14px', borderRadius:20, cursor:'pointer', fontFamily:'inherit',
                  fontWeight: visible ? 600 : 400,
                  border: visible ? `1.5px solid ${ql?.border||'var(--purple)'}` : '.5px solid var(--border)',
                  background: visible ? (ql?.bg||'var(--bg2)') : 'transparent',
                  color: visible ? (ql?.text||'var(--purple)') : 'var(--text3)',
                  transition:'all .15s'}}>
                {proj}
              </button>
            );
          })}
        </div>
      </div>

      {/* Project cards */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(480px, 1fr))', gap:16, marginBottom:16}}>
        {projectData.filter(p => visibleProjects.has(p.proj)).map(({ proj, de, defaults, result, ql }) => (
          <div key={proj} className="card" style={{
            border: ql ? `1.5px solid ${ql.border}` : '1px solid var(--border)',
            background: ql ? `${ql.bg}cc` : 'var(--bg2)',
          }}>
            {/* Card header */}
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14}}>
              <div style={{fontWeight:700, fontSize:16}}>{proj}</div>
              {ql
                ? <span className="pill" style={{background:ql.bg, color:ql.text, border:`1px solid ${ql.border}`, fontWeight:600, fontSize:12}}>{ql.label}</span>
                : <span className="pill" style={{background:'var(--bg3)', color:'var(--text3)', border:'.5px solid var(--border)', fontSize:12}}>No data</span>}
            </div>

            {/* Score + breakdown */}
            <div style={{display:'flex', alignItems:'flex-start', gap:16, marginBottom:14}}>
              {/* Big number */}
              <div style={{textAlign:'center', flexShrink:0, minWidth:64}}>
                <div style={{fontSize:38, fontWeight:700, lineHeight:1, color:ql?.text||'var(--text3)'}}>
                  {result ? result.qaei.toFixed(1) : '—'}
                </div>
                <div style={{fontSize:11, color:ql?.text||'var(--text3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.05em', marginTop:2}}>/ 10</div>
              </div>

              {/* Bars */}
              <div style={{flex:1}}>
                {/* DCE */}
                <div style={{marginBottom:12}}>
                  <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                    <span style={{color:'var(--text2)'}}>Defect Containment <span style={{fontWeight:700, color:'var(--text)'}}>65%</span></span>
                    <span style={{fontWeight:700, color: de ? ql?.text||'var(--text)' : 'var(--text3)'}}>
                      {de ? `${de.rate}%` : '—'}
                    </span>
                  </div>
                  <ScoreBar value={de?.rate||0} max={100} color={ql?.border||'var(--border2)'}/>
                  {de && (
                    <div style={{fontSize:11, color:'var(--text3)', marginTop:4}}>
                      {(() => {
                        const preP = de.preProductionCaught ?? 0;
                        const parts = [];
                        if (preP > 0) parts.push(`${preP} pre-prod`);
                        if (de.internallyFound > 0) parts.push(`${de.internallyFound} escaped`);
                        parts.push(`${de.customerFound} customer`);
                        return `${parts.join(' + ')} · score ${result?.dceScore?.toFixed(1)||'—'}/10`;
                      })()}
                    </div>
                  )}
                </div>

                {/* Process Maturity */}
                <div style={{marginBottom:12}}>
                  <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                    <span style={{color:'var(--text2)'}}>Process Maturity <span style={{fontWeight:700, color:'var(--text)'}}>35%</span></span>
                    <span style={{fontWeight:700, color:'var(--text)'}}>
                      {result?.pmScore != null ? `${result.pmScore.toFixed(1)}/10` : '—'}
                    </span>
                  </div>
                  <ScoreBar value={result?.pmScore||0} max={10} color='var(--teal)' dim={true}/>
                  <div style={{fontSize:11, color:'var(--text3)', marginTop:4}}>
                    Auto {defaults.automationConfidence||'—'}/3 · Coverage {defaults.testCoverage||'—'}/5 · Testability {defaults.testability||'—'}/3
                  </div>
                </div>

                {/* Trend */}
                <div>
                  <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                    <span style={{color:'var(--text3)'}}>Trend (Q4+) <span style={{fontWeight:700}}>—</span></span>
                    <span style={{color:'var(--text3)', fontStyle:'italic', fontSize:11}}>Available Q4 2026</span>
                  </div>
                  <ScoreBar value={0} max={10} color='var(--border2)' dim={true}/>
                </div>
              </div>
            </div>

            {/* DCE interpretation */}
            {de && (
              <div style={{borderTop:'.5px solid var(--border)', paddingTop:10, fontSize:12, color:'var(--text2)', lineHeight:1.6}}>
                {de.rate >= 80
                  ? '✓ World-class containment — QA catches most bugs before customers, in staging and production.'
                  : de.rate >= 50
                  ? '~ About half of known bugs are caught by QA — room to grow pre-production detection.'
                  : de.rate > 0
                  ? '⚠ Most bugs reach customers first — increase usage of known and escaped labels in dev boards.'
                  : '⚠ No pre-production or internal catches found — verify known/escaped label usage in dev boards.'}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Industry benchmarks + methodology */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
        <div className="card">
          <div style={{fontSize:12, fontWeight:700, marginBottom:4}}>DCE Industry Benchmarks</div>
          <div style={{fontSize:11, color:'var(--text3)', marginBottom:8}}>Defect Containment Effectiveness — Capers Jones / IEEE / Atlassian</div>
          {[
            { range:'≥ 80%', label:'World-class', ...QA_LEVELS[3] },
            { range:'50–79%', label:'Effective', ...QA_LEVELS[2] },
            { range:'< 50%', label:'Needs improvement', ...QA_LEVELS[0] },
          ].map(b => (
            <div key={b.range} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'5px 0', borderBottom:'.5px solid var(--border)'}}>
              <span className="pill" style={{background:b.bg, color:b.text, border:`1px solid ${b.border}`}}>{b.label}</span>
              <span style={{fontSize:11, color:'var(--text2)', fontWeight:600}}>{b.range} of bugs caught internally</span>
            </div>
          ))}
        </div>

        <div className="card">
          <div style={{fontSize:12, fontWeight:700, marginBottom:8}}>What to improve first</div>
          {projectData.filter(p => p.de).sort((a,b) => (a.result?.qaei||0) - (b.result?.qaei||0)).map(({ proj, de, result, ql }) => (
            <div key={proj} style={{display:'flex', alignItems:'center', gap:8, padding:'5px 0', borderBottom:'.5px solid var(--border)'}}>
              <span style={{fontSize:11, fontWeight:600, minWidth:110}}>{proj}</span>
              <div style={{flex:1, height:5, background:'var(--bg3)', borderRadius:3}}>
                <div style={{height:5, width:`${Math.min(100, (result?.qaei||0) * 10)}%`, background:ql?.border||'var(--border)', borderRadius:3}}/>
              </div>
              <span style={{fontSize:11, fontWeight:700, color:ql?.text||'var(--text3)', minWidth:26, textAlign:'right'}}>
                {result?.qaei?.toFixed(1)||'—'}
              </span>
            </div>
          ))}
          <div className="helper" style={{marginTop:8}}>
            DCE improves by labeling bugs with <code>known</code> (staging catches, strongest signal) and <code>escaped</code> (production catches before customer reports) on dev boards. Process Maturity improves through automation and coverage growth.
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('history');
  const [historyRefresh, setHistoryRefresh] = useState(0);
  const [jiraMetrics, setJiraMetrics] = useState(null);
  const [jiraHistory, setJiraHistory] = useState(null);
  const [testMetrics, setTestMetrics] = useState(null);
  // Persisted Risk Index selection — survives tab switches
  const [riskIndexPod, setRiskIndexPod] = useState(PODS[0]);           // default: Mira, GAIL & Klear
  const [riskIndexProject, setRiskIndexProject] = useState('GenAI Lens'); // default: GenAI Lens

  // Load Jira metrics once; shared by the header period label and the assessment.
  useEffect(() => {
    fetch('./jira-history.json', {cache:'no-store'}).then(r=>r.ok?r.json():null).then(setJiraHistory).catch(()=>setJiraHistory(null));
    fetch('./jira-metrics.json', {cache:'no-store'})
      .then(r => r.ok ? r.json() : null)
      .then(setJiraMetrics)
      .catch(() => setJiraMetrics(null));
    fetch('./test-metrics.json', {cache:'no-store'})
      .then(r => r.ok ? r.json() : null)
      .then(setTestMetrics)
      .catch(() => setTestMetrics(null));
  }, []);

  const fmtDay = s => { try { return new Date(s + (s.length===10?'T00:00:00':'')).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return s; } };
  const w = jiraMetrics?.window;
  const periodText = w ? `TRITON data: ${fmtDay(w.from)} – ${fmtDay(w.to)}` : 'shared via data.json';

  return (
    <div>
      <div className="header">
        <div className="header-left">
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <span className="header-logo">Meltwater</span>
            <span className="header-divider">/</span>
            <span style={{fontSize:12,color:'var(--text2)'}}>Mira &amp; GenAI QA</span>
          </div>
          <h1>QA Risk Baseline</h1>
          <p>Q3 2026 model · {periodText}</p>
        </div>
        <div className="nav-tabs">
          <button className={`nav-tab${tab==='history'?' active':''}`} onClick={()=>setTab('history')}>RI History</button>
          <button className={`nav-tab${tab==='risk-index'?' active':''}`} onClick={()=>setTab('risk-index')}>Risk Index</button>
          <button className={`nav-tab${tab==='qa'?' active':''}`} onClick={()=>setTab('qa')}>QA Effectiveness</button>
          <button className={`nav-tab${tab==='config'?' active':''}`} onClick={()=>setTab('config')}>Model</button>
        </div>
      </div>
      {tab==='risk-index' && <RiskIndexView jiraMetrics={jiraMetrics} testMetrics={testMetrics}
        activePod={riskIndexPod} onPodChange={setRiskIndexPod}
        project={riskIndexProject} onProjectChange={setRiskIndexProject}/>}
      {tab==='history' && <HistoryView refreshKey={historyRefresh} jiraHistory={jiraHistory} jiraMetrics={jiraMetrics} testMetrics={testMetrics}/>}
      {tab==='qa' && <QAEffectivenessView jiraMetrics={jiraMetrics}/>}
      {tab==='config' && <ConfigView jiraMetrics={jiraMetrics} jiraHistory={jiraHistory}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
