<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#28bbbb;--teal-dim:#1f9898;--teal-light:#e8f8f8;
  /* Design-system palette (shared with landing, roadmap, git-metrics) */
  --bg:#fff;--bg2:#f9fafb;--bg3:#f3f4f6;
  --text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  /* --purple kept as alias so existing JSX inline styles still resolve */
  --purple:#28bbbb;
  --radius:8px;--radius-lg:10px;
  /* Semantic risk-level colors */
  --green-bg:#E1F5EE;--green-text:#085041;--green-border:#1D9E75;
  --amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#BA7517;
  --red-bg:#FAECE7;--red-text:#712B13;--red-border:#D85A30;
  --blue-bg:#E8F0FE;--blue-text:#1a3a6b;--blue-border:#4A6FA5;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1c;--bg2:#242424;--bg3:#2c2c2c;--text:#e8e8e0;--text2:#9ca3af;--text3:#6b7280;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18)}
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:16px 16px 48px}
.container{max-width:1100px;margin:0 auto}
/* ── Header ─────────────────────────────────────────────────────────────────── */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;padding-top:8px}
.header-logo{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--teal);text-transform:uppercase}
.header-divider{color:var(--border2);font-size:13px}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-left h1{font-size:17px;font-weight:700;margin-top:4px}
.header-left p{font-size:12px;color:var(--text2)}
/* ── Nav tabs ───────────────────────────────────────────────────────────────── */
.nav-tabs{display:flex;gap:4px;flex-shrink:0;align-self:center}
.nav-tab{font-size:11px;padding:5px 14px;height:30px;border-radius:5px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.nav-tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.nav-tab:hover:not(.active){border-color:var(--teal);background:var(--teal-light);color:var(--teal)}
/* ── Form ───────────────────────────────────────────────────────────────────── */
input,textarea,select{font-family:inherit;color:var(--text);background:transparent}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal)!important}
button{font-family:inherit;cursor:pointer}
/* ── Typography ─────────────────────────────────────────────────────────────── */
.pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
.helper{font-size:11px;color:var(--text2);line-height:1.5}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;margin-top:4px}
.dim-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;margin-top:18px}
.dim-title{font-size:13px;font-weight:700;letter-spacing:.01em}
.dim-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:4px;border:1px solid}
/* ── Cards ──────────────────────────────────────────────────────────────────── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px}
/* ── Buttons ────────────────────────────────────────────────────────────────── */
.btn-primary{font-size:12px;padding:6px 16px;border-radius:5px;border:none;background:var(--teal);color:#fff;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{background:var(--teal-dim)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{font-size:12px;padding:5px 14px;height:30px;border-radius:5px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer}
.btn-secondary:hover{border-color:var(--teal);background:var(--teal-light);color:var(--teal)}
/* ── Toast ──────────────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;animation:fadeIn .2s}
.toast.success{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}
.toast.error{background:var(--red-bg);color:var(--red-text);border:1px solid var(--red-border)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ── Criteria cards ─────────────────────────────────────────────────────────── */
.criterion-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px}
.criterion-card.filled{background:var(--bg)}
.criterion-card.empty{background:var(--bg2)}
.criterion-card.auto-loaded{background:var(--bg);border-color:var(--teal);opacity:.9}
.criterion-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:2px}
.criterion-name{font-size:13px;font-weight:600}
.criterion-meta{display:flex;gap:8px;align-items:center}
.criterion-desc{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.options-row{display:flex;gap:6px;flex-wrap:wrap}
.opt-btn{font-size:11px;padding:4px 12px;border-radius:5px;transition:all .15s;font-family:inherit}
.auto-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;background:var(--blue-bg);color:var(--blue-text);border:1px solid var(--blue-border)}
.confirm-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber-border)}
/* ── Override ───────────────────────────────────────────────────────────────── */
.override-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:8px;background:var(--bg2)}
.override-card.active{background:var(--red-bg);border-color:var(--red-border)}
.override-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:0}
.override-toggle input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#D85A30}
.override-toggle-label{font-size:13px;font-weight:600}
.override-justification{margin-top:10px}
/* ── Score sidebar ──────────────────────────────────────────────────────────── */
.score-display{border-radius:var(--radius-lg);padding:16px;text-align:center;transition:all .3s}
.score-num{font-size:38px;font-weight:700;line-height:1}
.score-level{font-size:16px;font-weight:600;margin-top:4px}
.score-breakdown{font-size:11px;opacity:.8;margin-top:6px;line-height:1.5}
/* ── Formula display (Model tab) ────────────────────────────────────────────── */
.formula-display{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.formula-display code{font-family:monospace;font-size:10px;background:var(--bg3);padding:1px 4px;border-radius:3px}
/* ── Tables ─────────────────────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
/* ── History / timeline ─────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px;color:var(--text3);font-size:13px}
.timeline-wrap{display:flex;flex-direction:column;gap:10px}
.timeline-project{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.timeline-project-name{font-size:13px;font-weight:700;margin-bottom:10px}
.timeline-points{display:flex;gap:8px;flex-wrap:wrap}
.timeline-point{padding:8px 12px;border-radius:8px;font-size:11px;border:1px solid transparent;min-width:120px}
.tp-date{color:var(--text2);margin-bottom:3px;font-size:10px}
.tp-score{font-size:18px;font-weight:700;line-height:1}
.tp-level{font-size:11px;font-weight:600;margin-top:2px}
.tp-divider{border-top:1px solid rgba(0,0,0,0.10);margin:6px 0 4px}
.tp-calc-row{display:flex;justify-content:space-between;gap:10px;font-size:10px;color:var(--text2);line-height:1.6}
.tp-calc-row span:last-child{font-weight:600;font-variant-numeric:tabular-nums;color:inherit}
.tp-eval{font-size:10px;color:var(--text2);margin-top:5px;border-top:1px solid rgba(0,0,0,0.07);padding-top:4px}
.tp-detail-btn{background:none;border:none;padding:0;font:inherit;font-size:10px;color:var(--teal);cursor:pointer;text-decoration:underline;text-underline-offset:2px;text-align:left;font-family:inherit}
.tp-detail-btn:hover{color:var(--text)}

.hist-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.hist-modal{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.hist-modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.hist-modal-close{background:none;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--text2);cursor:pointer;padding:2px 8px;font-family:inherit;flex-shrink:0}
.hist-modal-close:hover{background:var(--bg2)}
.hist-modal-body{padding:14px 16px 16px;overflow-y:auto;flex:1}
.hist-detail-section{padding:10px 0;border-bottom:.5px solid var(--border)}
.hist-detail-section:last-child{border-bottom:none;padding-bottom:0}
.hist-detail-crit-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hist-detail-footer{font-size:12px;color:var(--text2);padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.hist-triton-summary{display:flex;gap:16px;font-size:11px;color:var(--text2);background:var(--bg2);padding:8px 10px;border-radius:6px;border:1px solid var(--border);flex-wrap:wrap}
.hist-triton-ticket{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border);min-width:0}
.hist-triton-ticket:last-child{border-bottom:none}
/* ── Toggle / toolbar ───────────────────────────────────────────────────────── */
.toggle-wrap{display:flex;border:1px solid var(--border2);border-radius:5px;overflow:hidden}
.toggle-btn{font-size:11px;padding:4px 12px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.toggle-btn.active{background:var(--teal);color:#fff}

.history-toolbar select{font-size:12px;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--bg);height:30px}
</style>
</head>

<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

// ── Storage ──────────────────────────────────────────────────────────────────
// Shared assessments live in the committed ./data.json (visible to everyone).
// Local additions are kept in localStorage until exported and committed to the repo.
const STORAGE_KEY = 'qa-risk-assessments-v2';
const DATA_URL = './data.json';

function loadLocalAssessments() {
  try { const r = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); return Array.isArray(r)?r:[]; }
  catch { return []; }
}

async function fetchSharedAssessments() {
  try {
    const res = await fetch(DATA_URL, {cache:'no-store'});
    if (!res.ok) return [];
    const r = await res.json();
    return Array.isArray(r) ? r : [];
  } catch { return []; }
}

// Merge shared (data.json) + local (localStorage) by id; local wins on conflict.
async function loadAssessments() {
  const [shared, local] = [await fetchSharedAssessments(), loadLocalAssessments()];
  const byId = new Map();
  shared.forEach(r => byId.set(r.id, r));
  local.forEach(r => byId.set(r.id, r));
  return [...byId.values()];
}

function saveAssessment(record) {
  const all = loadLocalAssessments(); all.push(record);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

// Download the full merged set as data.json so it can be committed to the repo.
function exportAssessments(records) {
  const sorted = [...records].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const blob = new Blob([JSON.stringify(sorted, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// v3: MIT_WEIGHTS removed — QA process criteria no longer affect the Risk Index.
// They feed the QA Effectiveness Index only (PM_WEIGHTS_QAEI below).
const BASE_WEIGHTS  = { userImpact:0.40, rateOfChange:0.35, complexity:0.25 };

const DEFAULT_CURVE = { mu: 5, sigma: 4, scaleMax: 10 };
const DEFAULT_SEV_WEIGHTS = { Blocker: 3, Critical: 2, Major: 1.5, High: 1.5, Medium: 1, Minor: 1, Low: 1 };
const DEFAULT_MODEL_PARAMS = { curveType: 'gaussian', baseFloor: 0, multiplierMin: 0.70, multiplierMax: 1.10 };


// TRITON escaped-defect score on a 0–10 scale via an anchored curve (Gaussian or
// logistic, Rec #5). Mirrors scripts/fetch-jira-metrics.mjs. Params from jira-metrics.json.
function normalCDF(z) {
  const t = 1 / (1 + 0.3275911 * Math.abs(z / Math.SQRT2));
  const y = 1 - (((((1.061405429*t - 1.453152027)*t) + 1.421413741)*t - 0.284496736)*t + 0.254829592) * t * Math.exp(-(z/Math.SQRT2)*(z/Math.SQRT2));
  const erf = z >= 0 ? y : -y;
  return 0.5 * (1 + erf);
}
const logisticCDF = z => 1 / (1 + Math.exp(-z * 1.7));
const weightOf = (priority, weights) => (weights || DEFAULT_SEV_WEIGHTS)[priority] ?? 1;
const weightedCount = (tickets, weights) => tickets.reduce((s, t) => s + weightOf(t.priority, weights), 0);
function tritonScore10(weighted, curve, mp) {
  const { mu, sigma, scaleMax = 10 } = curve || DEFAULT_CURVE;
  const cdf = (mp || DEFAULT_MODEL_PARAMS).curveType === 'logistic' ? logisticCDF : normalCDF;
  return Math.round(scaleMax * cdf((weighted - mu) / sigma) * 10) / 10;
}

// Criteria with scale > 3 (e.g. testCoverage scale:5) are normalized to the 1–3
// range before the weighted average so the formula stays unchanged for all callers.
function wavg(criteria, weights, scores) {
  const filled = criteria.filter(c => scores[c.id] != null);
  if (!filled.length) return null;
  const tw = filled.reduce((s,c) => s + weights[c.id], 0);
  return filled.reduce((s,c) => {
    const scale = c.scale || 3;
    const norm = scale === 3 ? scores[c.id] : 1 + (scores[c.id] - 1) / (scale - 1) * 2;
    return s + norm * weights[c.id];
  }, 0) / tw;
}

const SCALE_MAX = 10;
// Map a 1–3 weighted-average (manual criteria) onto 0–10, honoring a base floor
// (Rec #7): floor at the lowest qualitative level so a core product is never 0.
const to10 = (v, mp) => {
  if (v == null) return null;
  const floor = (mp || DEFAULT_MODEL_PARAMS).baseFloor || 0;
  return floor + ((v - 1) / 2) * (SCALE_MAX - floor);
};

function compute(scores, overrideActive, mp) {
  mp = mp || DEFAULT_MODEL_PARAMS;
  if (overrideActive) return { baseRisk:null, tritonScore:(scores.escapedDefects ?? null), finalRisk:SCALE_MAX, overridden:true };
  const base10      = to10(wavg(BASE_RISK_CRITERIA, BASE_WEIGHTS, scores), mp);
  const tritonScore = scores.escapedDefects ?? null; // already on the 0–10 scale
  if (base10 == null && tritonScore == null) return { baseRisk:null, tritonScore:null, finalRisk:null, overridden:false };
  const finalRisk = Math.min(SCALE_MAX, ((base10||0) * 0.40) + ((tritonScore||0) * 0.60));
  return { baseRisk:base10, tritonScore, finalRisk, overridden:false };
}

// ── QA Effectiveness Index model ──────────────────────────────────────────────
// Criteria that measure process maturity (subset of MITIGATION_CRITERIA, excluding
// detectionEfficiency which is DCE — already the primary input to QAEI).
const PM_CRITERIA_QAEI = [
  { id:'automationConfidence', scale:3 },
  { id:'testCoverage',         scale:5 },
  { id:'testability',          scale:3 },
];
// Weights re-normalized to 1.0 after removing detectionEfficiency (0.35+0.30+0.20=0.85 → /0.85).
const PM_WEIGHTS_QAEI = { automationConfidence:0.412, testCoverage:0.353, testability:0.235 };

// QAEI levels: higher = better (inverse of Risk levels).
const QA_LEVELS = [
  { max:3.9, label:'Needs attention', text:'#712B13', bg:'#FAECE7', border:'#D85A30' },
  { max:5.9, label:'Developing',      text:'#633806', bg:'#FAEEDA', border:'#BA7517' },
  { max:7.9, label:'Effective',       text:'#085041', bg:'#E1F5EE', border:'#1D9E75' },
  { max:10,  label:'Excellent',       text:'#1a3a6b', bg:'#E8F0FE', border:'#4A6FA5' },
];
const qaLevel = score => score == null ? null : (QA_LEVELS.find(l => score <= l.max) || QA_LEVELS[QA_LEVELS.length - 1]);

// Q3 formula: QAEI = DCE×0.65 + ProcessMaturity×0.35
// Q4+: QAEI = DCE×0.50 + Trend×0.30 + ProcessMaturity×0.20 (once 2 real quarters exist)
function computeQAEI(dceRate, processScores, mp) {
  if (dceRate == null) return null;
  const dceScore  = Math.round(dceRate / 10 * 10) / 10;  // 0–100 % → 0–10
  const pmRaw     = wavg(PM_CRITERIA_QAEI, PM_WEIGHTS_QAEI, processScores || {});
  const pmScore   = pmRaw != null ? Math.round(to10(pmRaw, mp) * 10) / 10 : null;
  const qaei      = pmScore != null
    ? Math.round((dceScore * 0.65 + pmScore * 0.35) * 10) / 10
    : Math.round(dceScore * 10) / 10;
  return { qaei, dceScore, pmScore };
}

function CriterionCard({ criterion, score, onScore, colorMap, weightPct, autoLoaded, reverseOptions, locked, lockedNote, lockedLabel, evidence }) {

  const orderedOptions = reverseOptions ? [...criterion.options].reverse() : criterion.options;
  return (
    <div className={`criterion-card ${score != null ? 'filled' : 'empty'} ${autoLoaded ? 'auto-loaded' : ''}`}>

      <div className="options-row">
        {orderedOptions.map(o => {
          const sel = score === o.score;
          const col = colorMap[o.score];

          if (locked && !sel) return null;

            <button key={o.score} className="opt-btn" disabled={locked} onClick={() => !locked && onScore(criterion.id, o.score)}
              style={{cursor: locked ? 'default' : 'pointer', border: sel ? `1.5px solid ${col.border}` : '.5px solid var(--border)', background: sel ? col.bg : 'transparent', color: sel ? col.text : 'var(--text2)', fontWeight: sel ? 600 : 400}}>
              {o.label} <span style={{opacity:.75}}>· {o.detail}</span>
            </button>

        })}

        <div style={{marginTop:8,borderTop:'.5px solid var(--border)',paddingTop:6}}>

            </table>

        </div>
      )}
    </div>
  );
}

// Merges static PROJECT_EVIDENCE rows with live counts from test-metrics.json.
// Only quantitative rows (Spec files, Active tests, Spec files / tests, Flows automated)
// are replaced — qualitative analysis rows stay as-is.
function buildEvidence(project, criterionId, testMetrics) {
  const staticRows = PROJECT_EVIDENCE[project]?.[criterionId];
  if (!staticRows) return null;
  const tm = testMetrics?.projects?.[project];
  if (!tm || tm.error) return staticRows;
  const specStr = tm.subflows != null
    ? `${tm.specFiles} main flows · ${tm.subflows} subflows`
    : `${tm.specFiles} files · ${tm.activeTests} active · ${tm.skipped} skipped`;
  return staticRows.map(([label, value]) => {
    if (label === 'Spec files')         return [label, String(tm.specFiles)];
    if (label === 'Active tests')       return [label, tm.subflows != null ? String(tm.activeTests) : `${tm.activeTests} (${tm.skipped} skipped)`];
    if (label === 'Spec files / tests') return [label, specStr];
    if (label === 'Flows automated')    return [label, String(tm.activeTests)];
    return [label, value];
  });
}

  const jiraNote = id => {
    if (!jiraProject) return null;
    const upd = jiraMetrics.generatedAt ? ` · updated ${fmtUpdated(jiraMetrics.generatedAt)}` : '';

    }
    if (id === 'avgAgeOpenIssues') {

              </div>
              {showTickets && (
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:3}}>
                  {escapedTickets.map(t => {
                    const pc = t.critical ? {bg:'#FAECE7',bd:'#D85A30',tx:'#712B13'} : {bg:'var(--bg2)',bd:'var(--border2)',tx:'var(--text2)'};
                    return (
                      <div key={t.key} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 6px',borderRadius:5}}>
                        <span style={{fontSize:9.5,fontWeight:600,padding:'1px 6px',borderRadius:4,background:pc.bg,color:pc.tx,border:`.5px solid ${pc.bd}`,whiteSpace:'nowrap'}}>{t.priority}</span>
                        <a href={t.url} target="_blank" rel="noreferrer" style={{fontSize:11,fontWeight:600,color:'var(--purple)',textDecoration:'none',whiteSpace:'nowrap'}}>{t.key}</a>
                        <span style={{fontSize:11,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}} title={t.summary}>{t.summary}</span>
                      </div>
                    );
                  })}
                  <div style={{fontSize:10.5,color:'var(--text3)',marginTop:5,borderTop:'.5px solid var(--border)',paddingTop:5}}>
                    {escTotalEff} escaped ({escCritEff} critical) · weighted {escWeightedEff} · score {escScoreEff}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Data confidence (Rec #6) + informational avg-age (Rec #4 — no longer scored). */}
          {jiraProject && (() => {
            const mr = jiraProject.needsManualReview || jiraProject.dataQuality?.manualReview || {escaped:0,open:0};
            const elapsed = jiraMetrics.window?.elapsedPct;
            const age = jiraProject.avgAgeOpenIssues;
            const flags = (mr.escaped||mr.open) > 0;
            return (
              <div className="card" style={{marginTop:8,padding:'8px 12px',fontSize:11,color:'var(--text2)',display:'flex',flexWrap:'wrap',gap:'4px 14px',alignItems:'center'}}>
                <span style={{fontWeight:600,color:'var(--text)'}}>Data confidence</span>
                {elapsed!=null && <span>Quarter {elapsed}% elapsed</span>}
                <span style={{color:flags?'var(--red-text)':'var(--text2)'}}>{flags?`⚠ ${mr.escaped} esc / ${mr.open} open in manual review`:'No tickets in manual review'}</span>
                {age && <span style={{color:'var(--text3)'}}>Open-issue age (info, not scored): {age.openCount} open · avg {age.avgDays}d</span>}
              </div>
            );
          })()}

          {/* QA Process Metrics — informational, feeds the QAEI tab, not scored in Risk Index */}
          <div className="dim-header">
            <div className="dim-title">QA Process Metrics</div>
            <span className="dim-badge" style={{background:'var(--blue-bg)',color:'var(--blue-text)',borderColor:'var(--blue-border)'}}>
              QAEI tab · not scored in Risk Index
            </span>
          </div>
          <div className="helper" style={{marginBottom:10}}>
            {isMitLocked
              ? `Sourced automatically from the test suite (${mitSrc.repo}, branch ${mitSrc.branch}). These values drive the Process Maturity component of the QA Effectiveness Index.`
              : 'These values drive the Process Maturity component in the QA Effectiveness Index. They do not affect the Risk score.'}
          </div>
          {MITIGATION_CRITERIA.map(c => {
            const locked = isMitLocked;
            const lockedNote = isMitLocked ? mitLockedNote : null;
            return (
              <CriterionCard key={c.id} criterion={c} score={scores[c.id]} onScore={()=>{}}
                colorMap={c.scale === 5 ? MIT_COLORS_5 : MIT_COLORS}
                autoLoaded={false}
                reverseOptions={true}
                locked={locked}
                lockedNote={lockedNote}
                lockedLabel={locked ? 'GitHub' : null}
                evidence={buildEvidence(project, c.id, testMetrics)} />
            );
          })}

          {/* QA Catches — pre-production + production-escaped, collapsed by default */}
          {(() => {
            const preProductionTickets = jiraProject?.preProductionCaught?.tickets || [];
            const internalTickets = jiraProject?.internalEscaped?.tickets || [];
            const total = preProductionTickets.length + internalTickets.length;
            if (total === 0) return null;
            return (
              <div className="card" style={{marginTop:8,padding:'10px 12px'}}>
                <div style={{display:'flex',alignItems:'center',cursor:'pointer',gap:8}} onClick={()=>setShowQACatches(v=>!v)}>
                  <span style={{fontSize:12,fontWeight:600}}>{showQACatches?'▾':'▸'} QA catches ({total})</span>
                  <span style={{fontSize:10.5,color:'var(--text3)',marginLeft:'auto'}}>Bugs intercepted by QA before customer reports</span>
                </div>
                {showQACatches && (
                  <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
                    {preProductionTickets.length > 0 && (
                      <div>
                        <div style={{fontSize:10.5,fontWeight:700,color:'var(--green-text)',background:'var(--green-bg)',border:'.5px solid var(--green-border)',borderRadius:5,padding:'2px 8px',marginBottom:4,display:'inline-block'}}>
                          Pre-production ({preProductionTickets.length}) · staging, never reached production
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:3}}>
                          {preProductionTickets.map(t => (
                            <div key={t.key} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 6px',borderRadius:5}}>
                              <span style={{fontSize:9.5,fontWeight:600,padding:'1px 6px',borderRadius:4,background:'var(--green-bg)',color:'var(--green-text)',border:'.5px solid var(--green-border)',whiteSpace:'nowrap'}}>{t.priority}</span>
                              <a href={t.url} target="_blank" rel="noreferrer" style={{fontSize:11,fontWeight:600,color:'var(--purple)',textDecoration:'none',whiteSpace:'nowrap'}}>{t.key}</a>
                              <span style={{fontSize:11,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}} title={t.summary}>{t.summary}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {internalTickets.length > 0 && (
                      <div style={{marginTop: preProductionTickets.length > 0 ? 4 : 0}}>
                        <div style={{fontSize:10.5,fontWeight:700,color:'var(--blue-text)',background:'var(--blue-bg)',border:'.5px solid var(--blue-border)',borderRadius:5,padding:'2px 8px',marginBottom:4,display:'inline-block'}}>
                          Production-escaped ({internalTickets.length}) · found in production before customers
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:3}}>
                          {internalTickets.map(t => (
                            <div key={t.key} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 6px',borderRadius:5}}>
                              <span style={{fontSize:9.5,fontWeight:600,padding:'1px 6px',borderRadius:4,background:'var(--blue-bg)',color:'var(--blue-text)',border:'.5px solid var(--blue-border)',whiteSpace:'nowrap'}}>{t.priority}</span>
                              <a href={t.url} target="_blank" rel="noreferrer" style={{fontSize:11,fontWeight:600,color:'var(--purple)',textDecoration:'none',whiteSpace:'nowrap'}}>{t.key}</a>
                              <span style={{fontSize:11,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}} title={t.summary}>{t.summary}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })()}

        </div>

        {/* Sidebar */}
        <div style={{display:'flex',flexDirection:'column',gap:12,position:'sticky',top:16}}>
          {/* Score display */}
          <div className="score-display" style={{
            border: rl ? `1.5px solid ${rl.border}` : '.5px solid var(--border)',
            background: rl ? rl.bg : 'var(--bg2)'
          }}>
            <div style={{fontSize:11,fontWeight:600,color:rl?rl.text:'var(--text2)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>
              Final Risk
            </div>
            <div className="score-num" style={{color:rl?rl.text:'var(--text3)'}}>
              {result.finalRisk != null ? result.finalRisk.toFixed(1) : '—'}<span style={{fontSize:'0.4em',fontWeight:500,opacity:.7}}> / 10</span>
            </div>
            <div className="score-level" style={{color:rl?rl.text:'var(--text3)'}}>
              {rl ? rl.label : 'Pending'}
            </div>
            {result.baseRisk != null && result.tritonScore != null && !result.overridden && (
              <div className="score-breakdown" style={{color:rl?.text}}>
                Base {result.baseRisk.toFixed(1)} × 0.40<br/>
                TRITON {result.tritonScore.toFixed(1)} × 0.60
              </div>
            )}
          </div>

          {/* Formula */}
          <div className="formula-display">
            <strong>Formula</strong> <span style={{fontSize:10}}>(0–10 scale)</span><br/>
            <code>Base × 0.40 + TRITON × 0.60</code>
          </div>

          {/* Legend */}
          <div className="card">
            <div className="section-label">Risk levels</div>
            {[{l:'Low',r:'0.0 – 5.0',c:'#085041',bg:'#E1F5EE'},{l:'Medium',r:'5.1 – 7.3',c:'#633806',bg:'#FAEEDA'},{l:'High',r:'7.4 – 10',c:'#712B13',bg:'#FAECE7'}].map(x=>(
              <div key={x.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <span className="pill" style={{background:x.bg,color:x.c}}>{x.l}</span>
                <span style={{fontSize:11,color:'var(--text2)'}}>{x.r}</span>
              </div>
            ))}
          </div>

        </div>
      </div>
    </div>
  );
}

// ── TritonDetailBody ──────────────────────────────────────────────────────────
function TritonDetailBody({ r, ql, jiraHistory, jiraMetrics, onSaveRecord }) {
  const sevColor = p => {
    if (p === 'Blocker' || p === 'Critical') return {bg:'#FAECE7',text:'#712B13',border:'#D85A30'};
    if (p === 'Major'   || p === 'High')     return {bg:'#FAEEDA',text:'#633806',border:'#BA7517'};
    if (p === 'Medium')                      return {bg:'#FFF3CD',text:'#5a4200',border:'#C9A227'};
    return {bg:'var(--bg3)',text:'var(--text2)',border:'var(--border2)'};
  };

  // All tickets in the record (not pre-filtered).
  const allStoredTix = r.jira?.escapedDefects?.tickets || [];

  // Live / history fallbacks for when no tickets are stored in the record.
  const jmQl  = jiraMetrics?.quarter ? jiraMetrics.quarter.split('-').reverse().join('-') : null;
  const jmEsc = (jmQl === ql) ? (jiraMetrics?.projects?.[r.project]?.escapedDefects ?? null) : null;
  const hist  = jiraHistory?.projects?.[r.project]?.[ql] ?? null;

  // Full ticket list (with or without stored per-ticket data).
  const allTickets = allStoredTix.length > 0 ? allStoredTix : (jmEsc?.tickets || hist?.tickets || []);
  const hasTickets = allTickets.length > 0;

  // Local exclusion state — initialised from the record's saved exclusions.
  const [localExcluded, setLocalExcluded] = useState(() => new Set(r.jira?.excludedTickets || []));
  const [saving, setSaving] = useState(false);

  const originalExcluded = new Set(r.jira?.excludedTickets || []);
  const isDirty = localExcluded.size !== originalExcluded.size ||
    [...localExcluded].some(k => !originalExcluded.has(k));

  const toggleTicket = key => setLocalExcluded(prev => {
    const next = new Set(prev);
    if (next.has(key)) next.delete(key); else next.add(key);
    return next;
  });

  // Active (non-excluded) tickets and derived stats.
  const activeTickets = allTickets.filter(t => !localExcluded.has(t.key));
  const activeWtd     = activeTickets.reduce((s, t) => s + (t.weight || 0), 0);
  const activeCrit    = activeTickets.filter(t => t.priority === 'Blocker' || t.priority === 'Critical').length;

  // Recalculate triton score and final risk in real-time.
  const curve = jiraMetrics?.tritonCurve || DEFAULT_CURVE;
  const mp    = jiraMetrics?.modelParams  || DEFAULT_MODEL_PARAMS;
  const recalcTriton    = hasTickets ? tritonScore10(activeWtd, curve, mp) : (r.tritonScore ?? null);
  const recalcCombined  = ((r.baseRisk || 0) * 0.40) + ((recalcTriton || 0) * 0.60);
  const recalcFinalRisk = Math.min(10, Math.round(recalcCombined * 10) / 10);
  const recalcLevel     = riskLevel(recalcFinalRisk);

  const tritonChanged   = hasTickets && Math.abs(recalcTriton - (r.tritonScore ?? 0)) >= 0.05;
  const finalChanged    = hasTickets && Math.abs(recalcFinalRisk - (r.finalRisk ?? 0)) >= 0.05;

  const handleSave = () => {
    setSaving(true);
    const newTritonScore  = recalcTriton;
    const newFinalRisk    = recalcFinalRisk;
    const updatedRecord   = {
      ...r,
      tritonScore: newTritonScore,
      scores: { ...r.scores, escapedDefects: newTritonScore },
      finalRisk: newFinalRisk,
      level: recalcLevel?.label ?? r.level,
      jira: {
        ...r.jira,
        excludedTickets: [...localExcluded],
        escapedEffective: {
          total:    activeTickets.length,
          critical: activeCrit,
          weighted: activeWtd,
        },
      },
    };
    // Persist to localStorage (local wins over shared data.json on next load).
    const locals = loadLocalAssessments();
    const byId   = new Map(locals.map(rec => [rec.id, rec]));
    byId.set(updatedRecord.id, updatedRecord);
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...byId.values()]));
    setSaving(false);
    onSaveRecord(updatedRecord);
  };

  // ── No data case ──────────────────────────────────────────────────────────
  if (r.tritonScore == null && allTickets.length === 0) {
    return <div style={{color:'var(--text3)',fontSize:12,padding:'8px 0'}}>No escaped defects tracked this quarter.</div>;
  }

  // ── Summary bar ───────────────────────────────────────────────────────────
  const SummaryBar = () => (
    <div className="hist-triton-summary" style={{flexDirection:'column',gap:6}}>
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        <span>Active <strong>{hasTickets ? activeTickets.length : (r.jira?.escapedEffective?.total ?? jmEsc?.total ?? hist?.total ?? '—')}</strong></span>
        <span>Critical <strong>{hasTickets ? activeCrit : (r.jia?.escapedEffective?.critical ?? jmEsc?.critical ?? hist?.critical ?? '—')}</strong></span>
        <span>Weighted <strong>{hasTickets ? activeWtd.toFixed(1) : (jmEsc?.weighted ?? hist?.weighted ?? '—')}</strong></span>
        <span style={{display:'flex',alignItems:'center',gap:6}}>
          Score&nbsp;
          <strong style={{color: tritonChanged ? (recalcTriton < (r.tritonScore??0) ? '#1D9E75' : '#D85A30') : 'inherit'}}>
            {recalcTriton != null ? recalcTriton.toFixed(1) : '—'}
          </strong>
          {tritonChanged && <span style={{fontSize:10,color:'var(--text3)'}}>(was {r.tritonScore?.toFixed(1)})</span>}
        </span>
      </div>
      {finalChanged && (
        <div style={{fontSize:11,padding:'4px 8px',borderRadius:5,background: recalcLevel?.bg,color:recalcLevel?.text,border:`1px solid ${recalcLevel?.border}`,fontWeight:600,display:'inline-flex',alignItems:'center',gap:6,alignSelf:'flex-start'}}>
          Final Risk → {recalcFinalRisk.toFixed(1)} {recalcLevel?.label}
          <span style={{fontWeight:400,opacity:.8}}>(was {r.finalRisk?.toFixed(1)} {r.level})</span>
        </div>
      )}
    </div>
  );

  return (
    <div>
      <SummaryBar/>
      {hasTickets ? (
        <div style={{marginTop:10}}>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:6,lineHeight:1.5}}>
            Toggle tickets to exclude non-bugs or out-of-scope items. The score recalculates instantly — save when done.
          </div>
          {allTickets.map(t => {
            const sc      = sevColor(t.priority);
            const disabled = localExcluded.has(t.key);
            return (
              <div key={t.key} className="hist-triton-ticket" style={{opacity: disabled ? 0.45 : 1, cursor:'pointer'}}
                onClick={() => toggleTicket(t.key)}>
                <input type="checkbox" checked={!disabled} readOnly
                  style={{width:13,height:13,flexShrink:0,cursor:'pointer',accentColor:'var(--teal)'}}/>
                <span className="pill" style={{background:sc.bg,color:sc.text,border:`1px solid ${sc.border}`,minWidth:58,textAlign:'center',flexShrink:0}}>
                  {t.priority}
                </span>
                {t.url
                  ? <a href={t.url} target="_blank" rel="noreferrer"
                      style={{fontWeight:600,color:'var(--teal)',fontSize:11,whiteSpace:'nowrap',flexShrink:0,textDecoration: disabled ? 'line-through' : 'none'}}
                      onClick={e => e.stopPropagation()}>{t.key}</a>
                  : <span style={{fontWeight:600,color:'var(--teal)',fontSize:11,whiteSpace:'nowrap',flexShrink:0,textDecoration: disabled ? 'line-through' : 'none'}}>{t.key}</span>
                }
                <span style={{fontSize:11,color:'var(--text)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textDecoration: disabled ? 'line-through' : 'none'}}>
                  {t.summary}
                </span>
                <span style={{fontSize:10,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>×{t.weight}</span>
                {disabled && <span style={{fontSize:10,fontWeight:600,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>excluded</span>}
              </div>
            );
          })}
          {isDirty && (
            <div style={{marginTop:12,display:'flex',alignItems:'center',gap:10}}>
              <button className="btn-primary" onClick={handleSave} disabled={saving}
                style={{fontSize:12,padding:'6px 16px'}}>
                {saving ? 'Saving…' : 'Save adjustments'}
              </button>
              <span style={{fontSize:11,color:'var(--text3)'}}>
                {localExcluded.size - originalExcluded.size > 0
                  ? `${localExcluded.size - originalExcluded.size} ticket(s) newly excluded`
                  : localExcluded.size < originalExcluded.size
                  ? `${originalExcluded.size - localExcluded.size} ticket(s) re-included`
                  : 'Changes pending'}
              </span>
            </div>
          )}
        </div>
      ) : (
        <div>
          {hist?.note && <div style={{fontSize:11,color:'var(--text3)',marginTop:8,lineHeight:1.5}}>{hist.note}</div>}
          <div style={{fontSize:11,color:'var(--text3)',marginTop:8}}>Ticket-level detail not available for this period.</div>
        </div>
      )}
    </div>
  );
}

// ── DCEDetailBody ─────────────────────────────────────────────────────────────
function DCEDetailBody({ r }) {
  const [openSection, setOpenSection] = React.useState(null);
  const de = r.jira?.detectionEfficiency;
  const preTickets      = r.jira?.preProductionCaught?.tickets || [];
  const internalTickets = r.jira?.internalEscaped?.tickets || [];
  const customerTickets = r.jira?.escapedDefects?.tickets || [];

  const toggle = s => setOpenSection(v => v === s ? null : s);

  const rowStyle = {padding:'4px 8px 4px 0', fontWeight:600, verticalAlign:'top'};
  const countStyle = {padding:'4px 8px', color:'var(--text)', fontWeight:700, whiteSpace:'nowrap', verticalAlign:'top'};
  const linkStyle = {fontSize:10.5, color:'var(--purple)', cursor:'pointer', background:'none', border:'none', padding:0, fontWeight:600, whiteSpace:'nowrap', verticalAlign:'top'};

  const priorityColor = p => {
    if (p === 'Blocker' || p === 'Critical') return {bg:'#FAECE7', text:'#712B13', border:'#D85A30'};
    if (p === 'Major'   || p === 'High')     return {bg:'#FAEEDA', text:'#633806', border:'#BA7517'};
    return {bg:'var(--bg3)', text:'var(--text2)', border:'var(--border2)'};
  };

  const TicketList = ({ tickets, section }) => (
    <div style={{marginTop:4, marginBottom:2, display:'flex', flexDirection:'column', overflow:'hidden'}}>
      {tickets.length === 0
        ? <span style={{fontSize:11,color:'var(--text3)'}}>No tickets available.</span>
        : tickets.map(t => {
            const pc = priorityColor(t.priority);
            return (
              <div key={t.key} style={{display:'flex', alignItems:'center', gap:8, padding:'4px 0', borderBottom:'.5px solid var(--border)', minWidth:0}}>
                <span style={{fontSize:9.5, fontWeight:600, padding:'1px 6px', borderRadius:4, background:pc.bg, color:pc.text, border:`.5px solid ${pc.border}`, whiteSpace:'nowrap', flexShrink:0}}>{t.priority}</span>
                <a href={t.url} target="_blank" rel="noreferrer" style={{fontSize:11, fontWeight:600, color:'var(--purple)', textDecoration:'none', whiteSpace:'nowrap', flexShrink:0}}>{t.key}</a>
                <span style={{fontSize:11, color:'var(--text2)', flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={t.summary}>{t.summary}</span>
              </div>
            );
          })
      }
      <button style={{...linkStyle, marginTop:4, alignSelf:'flex-start'}} onClick={() => toggle(section)}>▴ Hide</button>
    </div>
  );

  const SectionToggle = ({ section, count, tickets }) => {
    if (count === 0) return null;
    const open = openSection === section;
    return (
      <button style={linkStyle} onClick={() => toggle(section)}>
        {open ? '▾' : '▸'} {open ? 'Hide' : 'View tickets'}
      </button>
    );
  };

  if (!de) {
    return (
      <div className="helper">No DCE data recorded for this snapshot. DCE tracking is available from Q2-2026 onward, when the <code>escaped</code> and <code>known</code> Jira labels were implemented.</div>
    );
  }

  return (
    <div>
      <div className="helper" style={{marginBottom:10}}>
        DCE measures what fraction of known bugs were caught by QA before or during production, vs. reported by customers.
        Formula: (pre-production + internally found) / (pre-production + internally found + customer-reported) × 100
      </div>
      <div className="hist-detail-section">
        <div className="hist-detail-crit-header">
          <span style={{fontWeight:700, fontSize:13}}>DCE Rate</span>
          <span className="pill" style={{background:'var(--blue-bg)', color:'var(--blue-text)', border:'1px solid var(--blue-border)'}}>{de.rate}%</span>
        </div>
        <table style={{width:'100%', borderCollapse:'collapse', marginTop:8, fontSize:11}}>
          <tbody>
            <tr>
              <td style={{...rowStyle, color:'var(--green-text)', width:'52%'}}>Pre-production catches (staging)</td>
              <td style={countStyle}>{de.preProductionCaught ?? 0}</td>
              <td style={{padding:'4px 0', verticalAlign:'top'}}><SectionToggle section="pre" count={de.preProductionCaught ?? 0} /></td>
            </tr>
            {openSection === 'pre' && (
              <tr><td colSpan={3} style={{paddingBottom:4}}><TicketList tickets={preTickets} section="pre" /></td></tr>
            )}
            <tr>
              <td style={{...rowStyle, color:'var(--blue-text)'}}>Internally found (post-prod)</td>
              <td style={countStyle}>{de.internallyFound ?? 0}</td>
              <td style={{padding:'4px 0', verticalAlign:'top'}}><SectionToggle section="internal" count={de.internallyFound ?? 0} /></td>
            </tr>
            {openSection === 'internal' && (
              <tr><td colSpan={3} style={{paddingBottom:4}}><TicketList tickets={internalTickets} section="internal" /></td></tr>
            )}
            <tr style={{borderTop:'.5px solid var(--border)'}}>
              <td style={{...rowStyle, color:'var(--red-text)', paddingTop:6}}>Customer-reported</td>
              <td style={{...countStyle, paddingTop:6}}>{de.customerFound ?? 0}</td>
              <td style={{padding:'6px 0 4px', verticalAlign:'top'}}><SectionToggle section="customer" count={de.customerFound ?? 0} /></td>
            </tr>
            {openSection === 'customer' && (
              <tr><td colSpan={3} style={{paddingBottom:4}}><TicketList tickets={customerTickets} section="customer" /></td></tr>
            )}
          </tbody>
        </table>
      </div>
      <div className="hist-detail-footer">
        DCE Score: <strong>{Math.round(de.rate / 10 * 10) / 10}</strong> / 10
        &nbsp;·&nbsp; formula: rate% ÷ 10
      </div>
    </div>
  );
}

// ── HistoryDetailModal ────────────────────────────────────────────────────────
function HistoryDetailModal({ detail, onClose, onSaveRecord, jiraHistory, jiraMetrics, testMetrics }) {
  if (!detail) return null;
  const { type, record: r } = detail;
  const d = new Date(r.date);
  const ql = `Q${Math.floor(d.getUTCMonth()/3)+1}-${d.getUTCFullYear()}`;

  const sevColor = p => {
    if (p === 'Blocker' || p === 'Critical') return {bg:'#FAECE7',text:'#712B13',border:'#D85A30'};
    if (p === 'Major'   || p === 'High')     return {bg:'#FAEEDA',text:'#633806',border:'#BA7517'};
    if (p === 'Medium')                      return {bg:'#FFF3CD',text:'#5a4200',border:'#C9A227'};
    return {bg:'var(--bg3)',text:'var(--text2)',border:'var(--border2)'};
  };

  let title, body;

  if (type === 'base') {
    title = 'Base Risk Breakdown';
    body = (
      <div>
        {BASE_RISK_CRITERIA.map(c => {
          const score = r.scores?.[c.id];
          const opt   = c.options.find(o => o.score === score);
          const col   = RISK_COLORS[score] || {};
          return (
            <div key={c.id} className="hist-detail-section">
              <div className="hist-detail-crit-header">
                <span style={{fontWeight:700,fontSize:13}}>{c.label}</span>
                <span style={{fontSize:11,color:'var(--text2)'}}>{Math.round(BASE_WEIGHTS[c.id]*100)}% weight</span>
                {opt && <span className="pill" style={{background:col.bg,color:col.text,border:`1px solid ${col.border}`}}>{opt.label} · {score}/3</span>}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>{c.description}</div>
              {opt && <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>"{opt.detail}"</div>}
            </div>
          );
        })}
        <div className="hist-detail-footer">
          Base Risk: <strong>{r.baseRisk != null ? r.baseRisk.toFixed(1) : '—'}</strong> / 10
          &nbsp;·&nbsp; formula: (wavg − 1) / 2 × 10
        </div>
      </div>
    );
  } else if (type === 'triton') {
    title = 'TRITON Escaped Defects';
    body = <TritonDetailBody r={r} ql={ql} jiraHistory={jiraHistory} jiraMetrics={jiraMetrics} onSaveRecord={onSaveRecord}/>;
  } else if (type === 'dce') {
    title = 'Detection Coverage Efficiency (DCE)';
    body = <DCEDetailBody r={r} />;
  } else if (type === 'mit') {
    title = 'QA Process Evidence';

    const mitLabelColor = label => {
      const l = label.toLowerCase();
      if (/^assessment/.test(l)) return null;
      if (/^covered$|^flows covered$|^covered flows|^critical flows covered|^flows automated$/.test(l)) return '#1D6B4E';
      if (/^gaps?$|^not covered|^not automated|^most critical gap|^core flows not covered|^functional flows covered$|^coverage$/.test(l)) return '#9B3520';
      if (/^limitation|^impact|^production skip/.test(l)) return '#7A4C0C';
      if (/^next step/.test(l)) return '#2C5282';
      return 'var(--text2)';
    };

    const mitValueColor = (label, value) => {
      const l = label.toLowerCase();
      const v = value.toLowerCase();
      // "X of Y" ratio
      const ratioMatch = value.match(/^(\d+) of (\d+)/);
      if (ratioMatch) {
        const [, num, den] = ratioMatch.map(Number);
        if (den === 0) return 'var(--text2)';
        const frac = num / den;
        if (frac === 0) return '#9B3520';
        if (frac >= 0.7) return '#1D6B4E';
        if (frac >= 0.4) return '#7A4C0C';
        return '#9B3520';
      }
      // percentage
      const pctMatch = value.match(/(\d+)%/);
      if (pctMatch) {
        const pct = parseInt(pctMatch[1]);
        if (pct >= 70) return '#1D6B4E';
        if (pct >= 40) return '#7A4C0C';
        return '#9B3520';
      }
      // bare "0" or "0 (…)"
      if (/^0(\s|\(|$)/.test(value.trim())) return '#9B3520';
      // label-driven negatives
      if (/^gaps?$|^not covered|^not automated|^most critical gap|^core flows not covered|^coverage$/.test(l)) return '#9B3520';
      // label-driven positives
      if (/^covered$|^flows covered$|^flows automated$|^critical flows covered/.test(l)) return '#1D6B4E';
      if (/^limitation|^impact|^production skip/.test(l)) return '#7A4C0C';
      // qualitative value patterns
      if (/^none\b|^no automated\b/.test(v)) return '#9B3520';
      if (/skips (in|on)|only testable in production|limits pre-production/.test(v)) return '#7A4C0C';
      if (/^good\b|^stable,|page object model|page object exists|deterministic throughout|stable testids/.test(v)) return '#1D6B4E';
      if (/^baseline estimate|^reassess/.test(v)) return '#7A4C0C';
      return 'var(--text2)';
    };

    body = (
      <div>
        <div className="helper" style={{marginBottom:10}}>These criteria drive the Process Maturity component of the QA Effectiveness Index. They are recorded here for reference but do not affect the Risk score.</div>
        {MITIGATION_CRITERIA.map(c => {
          const score   = r.scores?.[c.id];
          const opt     = c.options.find(o => o.score === score);
          const colorMap= c.scale === 5 ? MIT_COLORS_5 : MIT_COLORS;
          const col     = colorMap[score] || {};
          const hasScore = score != null && col.bg;
          const evidence= PROJECT_EVIDENCE[r.project]?.[c.id];
          return (
            <div key={c.id} className="hist-detail-section" style={hasScore ? {borderLeft:`3px solid ${col.border}`, paddingLeft:10, marginLeft:-10} : {}}>
              <div className="hist-detail-crit-header">
                <span style={{fontWeight:700,fontSize:13}}>{c.label}</span>
                {hasScore
                  ? <span style={{fontSize:12,fontWeight:700,padding:'3px 10px',borderRadius:6,background:col.bg,color:col.text,border:`1.5px solid ${col.border}`}}>{opt.label} · {score}/{c.scale||3}</span>
                  : <span style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>No score recorded</span>
                }
              </div>
              {evidence ? (
                <table style={{width:'100%',borderCollapse:'collapse',marginTop:6,fontSize:11}}>
                  <tbody>
                    {evidence.map(([label,value],i) => {
                      const isAssessment = label.toLowerCase().startsWith('assessment');
                      const lc = mitLabelColor(label);
                      const vc = mitValueColor(label, value);
                      if (isAssessment) {
                        return (
                          <tr key={i}>
                            <td colSpan={2} style={{padding:'6px 0 2px',borderTop:'.5px solid var(--border)'}}>
                              <span style={{fontSize:10.5,fontStyle:'italic',color:col.text||'var(--text3)',background:col.bg||'var(--bg2)',border:`1px solid ${col.border||'var(--border)'}`,borderRadius:5,padding:'2px 8px',display:'inline-block'}}>{value}</span>
                            </td>
                          </tr>
                        );
                      }
                      return (
                        <tr key={i} style={{borderBottom:i<evidence.length-1?'.5px solid var(--border)':'none'}}>
                          <td style={{padding:'4px 8px 4px 0',color:lc||'var(--text3)',fontWeight:700,width:'36%',verticalAlign:'top'}}>{label}</td>
                          <td style={{padding:'4px 0',color:vc,fontWeight: vc !== 'var(--text2)' ? 600 : 400,lineHeight:1.45}}>{value}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              ) : (
                <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>No evidence recorded for this project.</div>
              )}
            </div>
          );
        })}
        <div className="hist-detail-footer">
          These scores are recorded for reference only — they feed the QA Effectiveness Index and do not affect the Risk score (v3 model).
          {r.multiplier != null && <span style={{opacity:.5}}>&nbsp;·&nbsp;v2 multiplier: {r.multiplier.toFixed(2)}</span>}
        </div>
      </div>
    );
  }

  return (
    <div className="hist-modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="hist-modal">
        <div className="hist-modal-header">
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{title}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{r.project} · {ql}</div>
          </div>
          <button className="hist-modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="hist-modal-body">{body}</div>
      </div>
    </div>
  );
}

// ── HistoryView ───────────────────────────────────────────────────────────────
function HistoryView({ refreshKey, jiraHistory, jiraMetrics, testMetrics }) {
  const [allRecords, setAllRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [visibleProjects, setVisibleProjects] = useState(new Set(PODS[0].projects));
  const [filterQuarter, setFilterQuarter] = useState('');
  const [viewMode, setViewMode] = useState('timeline');
  const [weightBase, setWeightBase] = useState(40);
  const [localRefresh, setLocalRefresh] = useState(0);
  const [detail, setDetail] = useState(null);
  const [activePod, setActivePod] = useState(PODS[0]);
  const fileRef = useRef(null);

  useEffect(()=>{
    if (!detail) return;
    const onKey = e => { if (e.key === 'Escape') setDetail(null); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [detail]);

  useEffect(()=>{
    let cancelled = false;
    setLoading(true);
    loadAssessments().then(list=>{
      if (cancelled) return;
      setAllRecords(list.sort((a,b)=>new Date(b.date)-new Date(a.date)));
      setLoading(false);
    });
    return ()=>{ cancelled = true; };
  },[refreshKey, localRefresh]);

  const handleImport = e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) throw new Error('not an array');
        const byId = new Map();
        loadLocalAssessments().forEach(r=>byId.set(r.id,r));
        imported.forEach(r=>byId.set(r.id,r));
        localStorage.setItem(STORAGE_KEY, JSON.stringify([...byId.values()]));
        setLocalRefresh(n=>n+1);
      } catch { alert('Invalid data.json file'); }
    };
    reader.readAsText(f);
    e.target.value = '';
  };

  const toggleProject = proj =>
    setVisibleProjects(s => { const n = new Set(s); n.has(proj) ? n.delete(proj) : n.add(proj); return n; });

  const selectPod = pod => {
    const next = (activePod && activePod.id === pod.id) ? null : pod;
    setActivePod(next);
    setVisibleProjects(next ? new Set(next.projects) : new Set(PROJECTS));
  };

  const fmtDate = iso => new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  const quarterOf = iso => {
    const d = new Date(iso);
    return `Q${Math.floor(d.getUTCMonth()/3)+1}-${d.getUTCFullYear()}`;
  };

  const quarterInfo = qKey => {
    const [qPart, year] = qKey.split('-');
    const n = parseInt(qPart.slice(1));
    const starts = ['Jan 1','Apr 1','Jul 1','Oct 1'];
    const ends   = ['Mar 31','Jun 30','Sep 30','Dec 31'];
    const today = new Date();
    const todayStr = today.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const currentQ = `Q${Math.floor(today.getMonth()/3)+1}-${today.getFullYear()}`;
    const isCurrent = qKey === currentQ;
    return { label:`Q${n} ${year}`, start:`${starts[n-1]}, ${year}`, end: isCurrent ? todayStr : `${ends[n-1]}, ${year}`, isCurrent };
  };

  const allQuarters = [...new Set(allRecords.map(r=>quarterOf(r.date)))].sort().reverse();

  // Deduplicate: keep one record per project+quarter, preferring auto over manual backfill
  const PM_SCORE_KEYS = ['automationConfidence', 'testCoverage', 'testability'];
  const mergePMScores = (winner, loser) => {
    if (!loser?.scores) return winner;
    const missing = PM_SCORE_KEYS.filter(k => winner.scores?.[k] == null && loser.scores[k] != null);
    if (!missing.length) return winner;
    return { ...winner, scores: { ...winner.scores, ...Object.fromEntries(missing.map(k => [k, loser.scores[k]])) } };
  };

  const deduped = Object.values(
    allRecords.reduce((acc, r) => {
      const key = `${r.project}::${quarterOf(r.date)}`;
      const ex = acc[key];
      if (!ex) { acc[key] = r; return acc; }
      if (r.evaluator === 'auto' && ex.evaluator !== 'auto') { acc[key] = mergePMScores(r, ex); return acc; }
      if (ex.evaluator === 'auto' && r.evaluator !== 'auto') { acc[key] = mergePMScores(ex, r); return acc; }
      if (new Date(r.date) > new Date(ex.date)) acc[key] = r;
      return acc;
    }, {})
  ).sort((a,b) => new Date(b.date)-new Date(a.date));

  const filteredRecords = deduped
    .filter(r => visibleProjects.has(r.project))
    .filter(r => !filterQuarter || quarterOf(r.date) === filterQuarter);

  const barColor = v => v==null ? 'var(--border2)' : v>=7.4 ? '#D85A30' : v>=5.1 ? '#BA7517' : '#1D9E75';
  const computedRisk = r => (r.baseRisk != null && r.tritonScore != null)
    ? Math.round((r.baseRisk * (weightBase/100) + r.tritonScore * ((100-weightBase)/100)) * 10) / 10
    : r.finalRisk;

  const latestByProject = PROJECTS.reduce((acc, p) => {
    const r = allRecords.find(rec => rec.project === p); // allRecords sorted newest first
    if (r) acc[p] = riskLevel(computedRisk(r) ?? r.finalRisk);
    return acc;
  }, {});

  return (
    <div>
      {/* Project filter pills */}
      <div className="card" style={{marginBottom:12}}>
        {/* Pod filter row */}
        <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap', marginBottom:10, paddingBottom:10, borderBottom:'1px solid var(--border)'}}>
          <span style={{fontSize:11, fontWeight:600, color:'var(--text2)', flexShrink:0}}>Pod:</span>
          {PODS.map(pod => (
            <button key={pod.id} onClick={()=>selectPod(pod)}
              style={{fontSize:11, padding:'3px 12px', borderRadius:20, cursor:'pointer', fontFamily:'inherit',
                fontWeight: activePod && activePod.id===pod.id ? 600 : 400,
                border: activePod && activePod.id===pod.id ? '1.5px solid var(--teal)' : '.5px solid var(--border)',
                background: activePod && activePod.id===pod.id ? 'var(--teal-light)' : 'transparent',
                color: activePod && activePod.id===pod.id ? 'var(--teal-dim)' : 'var(--text3)', transition:'all .15s'}}>
              {pod.name}
            </button>
          ))}
        </div>
        {/* Project pills — filtered to the active pod */}
        <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          <span style={{fontSize:12, fontWeight:600, color:'var(--text2)', flexShrink:0}}>Projects:</span>
          {(activePod ? activePod.projects : PROJECTS).map(proj => {
            const visible = visibleProjects.has(proj);
            const rl = latestByProject[proj];
            return (
              <button key={proj} onClick={()=>toggleProject(proj)}
                style={{fontSize:12, padding:'5px 14px', borderRadius:20, cursor:'pointer', fontFamily:'inherit',
                  fontWeight: visible ? 600 : 400,
                  border: visible ? `1.5px solid ${rl?.border||'var(--teal)'}` : '.5px solid var(--border)',
                  background: visible ? (rl?.bg||'var(--teal-light)') : 'transparent',
                  color: visible ? (rl?.text||'var(--teal-dim)') : 'var(--text3)',
                  transition:'all .15s'}}>
                {proj}
              </button>
            );
          })}
        </div>
      </div>

      {/* Toolbar: quarter filter + view toggle + export */}
      <div className="history-toolbar">
        <div style={{display:'flex', gap:6, flexWrap:'wrap', alignItems:'center'}}>
          <button onClick={()=>setFilterQuarter('')}
            className={`toggle-btn${!filterQuarter?' active':''}`}
            style={{borderRadius:20, border: !filterQuarter ? 'none' : '1px solid var(--border2)', padding:'5px 14px'}}>
            All
          </button>
          {allQuarters.map(q => {
            const qi = quarterInfo(q);
            return (
              <button key={q} onClick={()=>setFilterQuarter(f=>f===q?'':q)}
                className={`toggle-btn${filterQuarter===q?' active':''}`}
                style={{borderRadius:20, border: filterQuarter===q ? 'none' : '1px solid var(--border2)', padding:'5px 14px'}}>
                {qi.label}{qi.isCurrent ? ' ●' : ''}
              </button>
            );
          })}
        </div>
        <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{filteredRecords.length} snapshot{filteredRecords.length!==1?'s':''}</span>
        <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:8,background:weightBase!==40?'var(--amber-bg)':'var(--bg2)',border:`1px solid ${weightBase!==40?'var(--amber-border)':'var(--border)'}`,transition:'background .2s, border .2s'}}>
          <span style={{fontSize:9,fontWeight:600,color:'var(--text3)',whiteSpace:'nowrap',lineHeight:1.3}}>Base<br/>{weightBase}%</span>
          <input type="range" min="0" max="100" step="5" value={weightBase} onChange={e=>setWeightBase(+e.target.value)}
            style={{width:80,accentColor:'var(--teal)',cursor:'pointer',verticalAlign:'middle'}}/>
          <span style={{fontSize:9,fontWeight:600,color:'var(--text3)',whiteSpace:'nowrap',lineHeight:1.3}}>TRITON<br/>{100-weightBase}%</span>
          {weightBase!==40 && <button onClick={()=>setWeightBase(40)} style={{fontSize:9,padding:'2px 6px',borderRadius:4,border:'1px solid var(--amber-border)',background:'transparent',color:'var(--amber-text)',cursor:'pointer',fontFamily:'inherit',marginLeft:2}}>↩ reset</button>}
        </div>
        <div className="toggle-wrap">
          <button className={`toggle-btn${viewMode==='timeline'?' active':''}`} onClick={()=>setViewMode('timeline')}>Cards</button>
          <button className={`toggle-btn${viewMode==='matrix'?' active':''}`} onClick={()=>setViewMode('matrix')}>Matrix</button>
          <button className={`toggle-btn${viewMode==='gauge'?' active':''}`} onClick={()=>setViewMode('gauge')}>Gauge</button>
          <button className={`toggle-btn${viewMode==='table'?' active':''}`} onClick={()=>setViewMode('table')}>Table</button>
        </div>
        <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleImport} style={{display:'none'}}/>
        <button className="toggle-btn" style={{border:'1px solid var(--border2)',borderRadius:6}} onClick={()=>fileRef.current && fileRef.current.click()}>Import</button>
        <button className="btn-primary" style={{fontSize:11,padding:'5px 12px'}} onClick={()=>exportAssessments(allRecords)} disabled={!allRecords.length}>Export data.json</button>
      </div>

      {loading && <div className="empty-state">Loading...</div>}
      {!loading && filteredRecords.length===0 && <div className="empty-state">No snapshots for this selection.</div>}

      {!loading && filteredRecords.length>0 && viewMode==='timeline' && (
        <div style={{overflowX:'auto', paddingBottom:8}}>
          <div style={{display:'flex', gap:16, alignItems:'flex-start', minWidth:'max-content'}}>
          {(() => {
            // build lookup: project → quarter → record (for delta)
            const byProjQ = {};
            deduped.forEach(r => {
              const q = quarterOf(r.date);
              if (!byProjQ[r.project]) byProjQ[r.project] = {};
              byProjQ[r.project][q] = r;
            });
            return PROJECTS.filter(p => visibleProjects.has(p)).map(proj => {
              const projQuarters = allQuarters
                .filter(q => (!filterQuarter || q === filterQuarter) && byProjQ[proj]?.[q]);
              if (!projQuarters.length) return null;
              return (
                <div key={proj} style={{display:'flex', flexDirection:'column', gap:12, width:300, flexShrink:0}}>
                  <div style={{fontSize:14, fontWeight:700, paddingBottom:8, borderBottom:'1px solid var(--border)'}}>{proj}</div>
                  {projQuarters.map(q => {
                    const r = byProjQ[proj][q];
                    const prevQ = allQuarters[allQuarters.indexOf(q) + 1];
                    const prev = prevQ ? byProjQ[proj]?.[prevQ] : null;
                    const cr = computedRisk(r), prevCr = prev ? computedRisk(prev) : null;
                    const rl = riskLevel(cr ?? r.finalRisk);
                    const delta = (prevCr!=null&&cr!=null) ? cr-prevCr : null;
                    const dtxt = delta==null ? null : (delta>0?`▲ +${delta.toFixed(1)}`:delta<0?`▼ ${delta.toFixed(1)}`:'± 0.0');
                    const dcol = delta==null||delta===0 ? 'var(--text3)' : delta>0 ? '#D85A30' : '#1D9E75';
                    const qi = quarterInfo(quarterOf(r.date));
                    const de = r.jira?.detectionEfficiency;
                    const mp = jiraMetrics?.modelParams || DEFAULT_MODEL_PARAMS;
                    const pmScores = Object.fromEntries(
                      ['automationConfidence','testCoverage','testability'].map(k => [k, r.scores?.[k] ?? PROJECT_DEFAULTS[r.project]?.[k]])
                    );
                    const qaeiResult = computeQAEI(de ? de.rate : 0, pmScores, mp);
                    const hasDCE = !!de;
                    const ql = qaeiResult ? qaLevel(qaeiResult.qaei) : null;
                    const qaBarColor = v => v==null ? 'var(--border2)' : v>=7.5 ? '#1D9E75' : v>=5.0 ? '#BA7517' : '#D85A30';
                    const ScoreBadge = ({level}) => level
                      ? <span style={{fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:20,background:level.bg,color:level.text,border:`1px solid ${level.border}`,letterSpacing:'.02em'}}>{level.label}</span>
                      : null;
                    const DetailBtn = ({label, onClick}) => (
                      <button className="tp-detail-btn" style={{color:'var(--teal)',fontSize:10,fontWeight:600}} onClick={onClick}>{label}</button>
                    );
                    return (
                      <div key={r.id}
                        style={{border:'1px solid var(--border)',borderRadius:10,overflow:'hidden',background:'var(--bg)',transition:'box-shadow .15s'}}
                        onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.07)'}
                        onMouseLeave={e=>e.currentTarget.style.boxShadow=''}>

                        {/* Header */}
                        <div style={{padding:'7px 12px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--bg2)'}}>
                          <span style={{fontSize:11,fontWeight:600,color:'var(--text2)'}}>{qi.label}</span>
                          <div style={{display:'flex',gap:4}}>
                            {qi.isCurrent && <span style={{fontSize:9,padding:'1px 6px',borderRadius:20,background:'var(--blue-bg)',color:'var(--blue-text)',fontWeight:600}}>live</span>}
                            {r.evaluator==='auto'&&!qi.isCurrent && <span style={{fontSize:9,padding:'1px 6px',borderRadius:20,background:'var(--bg3)',color:'var(--text3)',fontWeight:600}}>auto</span>}
                          </div>
                        </div>

                        {/* Two sections */}
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1px 1fr'}}>

                          {/* Risk Score */}
                          <div style={{padding:'12px 12px 10px'}}>
                            <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--text3)',marginBottom:6}}>Risk Score</div>
                            <div style={{display:'flex',alignItems:'baseline',gap:5,marginBottom:4}}>
                              <span style={{fontSize:24,fontWeight:700,lineHeight:1,color:'var(--text)'}}>{cr!=null?cr.toFixed(1):'—'}</span>
                              <span style={{fontSize:10,color:'var(--text3)'}}>/ 10</span>
                              {dtxt && <span style={{fontSize:10,fontWeight:700,color:dcol,marginLeft:2}}>{dtxt}</span>}
                            </div>
                            <div style={{marginBottom:8}}><ScoreBadge level={rl}/></div>
                            <div style={{display:'flex',flexDirection:'column',gap:5}}>
                              <div>
                                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:2}}>
                                  <DetailBtn label="Base" onClick={e=>{e.stopPropagation();setDetail({type:'base',record:r})}}/>
                                  <span style={{fontWeight:600,color:'var(--text2)'}}>{r.baseRisk!=null?r.baseRisk.toFixed(1):'—'}</span>
                                </div>
                                <div style={{height:3,background:'var(--border)',borderRadius:2}}>
                                  <div style={{height:3,width:`${r.baseRisk!=null?Math.min(100,(r.baseRisk/10)*100):0}%`,background:barColor(r.baseRisk),borderRadius:2,transition:'width .4s'}}/>
                                </div>
                              </div>
                              <div>
                                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:2}}>
                                  <DetailBtn label="TRITON" onClick={e=>{e.stopPropagation();setDetail({type:'triton',record:r})}}/>
                                  <span style={{fontWeight:600,color:'var(--text2)'}}>{r.tritonScore!=null?r.tritonScore.toFixed(1):'—'}</span>
                                </div>
                                <div style={{height:3,background:'var(--border)',borderRadius:2}}>
                                  <div style={{height:3,width:`${r.tritonScore!=null?Math.min(100,(r.tritonScore/10)*100):0}%`,background:barColor(r.tritonScore),borderRadius:2,transition:'width .4s'}}/>
                                </div>
                              </div>
                            </div>
                          </div>

                          {/* Divider */}
                          <div style={{background:'var(--border)'}}/>

                          {/* QAEI */}
                          <div style={{padding:'12px 12px 10px'}}>
                            <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--text3)',marginBottom:6}}>QAEI</div>
                            <div style={{display:'flex',alignItems:'baseline',gap:5,marginBottom:4}}>
                              <span style={{fontSize:24,fontWeight:700,lineHeight:1,color:'var(--text)'}}>{qaeiResult.qaei.toFixed(1)}</span>
                              <span style={{fontSize:10,color:'var(--text3)'}}>/ 10</span>
                            </div>
                            <div style={{marginBottom:8}}>{ql ? <ScoreBadge level={ql}/> : <span style={{fontSize:10,color:'var(--text3)'}}>—</span>}</div>
                            <div style={{display:'flex',flexDirection:'column',gap:5}}>
                              <div>
                                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:2}}>
                                  <DetailBtn label={hasDCE?"DCE ↗":"DCE (est.)"} onClick={e=>{e.stopPropagation();setDetail({type:'dce',record:r})}}/>
                                  <span style={{fontWeight:600,color:'var(--text2)'}}>{qaeiResult.dceScore.toFixed(1)}{!hasDCE&&<span style={{fontSize:9,color:'var(--text3)'}}> ≈0</span>}</span>
                                </div>
                                <div style={{height:3,background:'var(--border)',borderRadius:2}}>
                                  <div style={{height:3,width:`${Math.min(100,(qaeiResult.dceScore/10)*100)}%`,background:qaBarColor(qaeiResult.dceScore),borderRadius:2,transition:'width .4s'}}/>
                                </div>
                              </div>
                              <div>
                                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:2}}>
                                  <DetailBtn label="Process ↗" onClick={e=>{e.stopPropagation();setDetail({type:'mit',record:r})}}/>
                                  <span style={{fontWeight:600,color:'var(--text2)'}}>{qaeiResult.pmScore!=null?qaeiResult.pmScore.toFixed(1):'—'}</span>
                                </div>
                                <div style={{height:3,background:'var(--border)',borderRadius:2}}>
                                  <div style={{height:3,width:`${qaeiResult.pmScore!=null?Math.min(100,(qaeiResult.pmScore/10)*100):0}%`,background:qaBarColor(qaeiResult.pmScore),borderRadius:2,transition:'width .4s'}}/>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            });
          })()}
          </div>
        </div>
      )}

      {!loading && filteredRecords.length>0 && viewMode==='matrix' && (() => {
        // build lookup: project → quarter → record
        const byProjQ = {};
        deduped.forEach(r => {
          const q = quarterOf(r.date);
          if (!byProjQ[r.project]) byProjQ[r.project] = {};
          byProjQ[r.project][q] = r;
        });
        const visProjs = PROJECTS.filter(p => visibleProjects.has(p));
        const quarters = allQuarters.filter(q => !filterQuarter || q === filterQuarter).slice().reverse(); // oldest→newest

        const W = 200, H = 200, PAD = 28;
        const toX = risk  => PAD + ((risk  ?? 0) / 10) * (W - PAD * 2);
        const toY = qaei  => H - PAD - ((qaei  ?? 0) / 10) * (H - PAD * 2);
        const dotColor = (risk, qaei) => {
          if (risk == null) return '#aaa';
          if (risk >= 7.4) return '#D85A30';
          if (risk >= 5.1) return '#BA7517';
          return '#1D9E75';
        };

        return (
          <div style={{display:'flex', flexWrap:'wrap', gap:20, paddingBottom:8}}>
            {visProjs.map(proj => {
              const points = quarters.map(q => {
                const r = byProjQ[proj]?.[q];
                if (!r) return null;
                const mp = jiraMetrics?.modelParams || DEFAULT_MODEL_PARAMS;
                const de = r.jira?.detectionEfficiency;
                const pmScores = Object.fromEntries(['automationConfidence','testCoverage','testability'].map(k=>[k, r.scores?.[k] ?? PROJECT_DEFAULTS[proj]?.[k]]));
                const qaeiResult = computeQAEI(de ? de.rate : 0, pmScores, mp);
                return { q, qi: quarterInfo(q), risk: computedRisk(r), qaei: qaeiResult.qaei, hasDCE: !!de, r };
              }).filter(Boolean);

              if (!points.length) return null;

              return (
                <div key={proj} style={{background:'var(--bg)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 16px', minWidth:W+32}}>
                  <div style={{fontSize:12, fontWeight:700, color:'var(--text)', marginBottom:10}}>{proj}</div>
                  <svg width={W} height={H} style={{display:'block', overflow:'visible'}}>
                    {/* Quadrant backgrounds */}
                    <rect x={PAD} y={PAD} width={(W-PAD*2)/2} height={(H-PAD*2)/2} fill="#E1F5EE" opacity="0.5" rx="3"/>
                    <rect x={PAD+(W-PAD*2)/2} y={PAD} width={(W-PAD*2)/2} height={(H-PAD*2)/2} fill="#FAEEDA" opacity="0.5" rx="3"/>
                    <rect x={PAD} y={PAD+(H-PAD*2)/2} width={(W-PAD*2)/2} height={(H-PAD*2)/2} fill="#FAEEDA" opacity="0.45" rx="3"/>
                    <rect x={PAD+(W-PAD*2)/2} y={PAD+(H-PAD*2)/2} width={(W-PAD*2)/2} height={(H-PAD*2)/2} fill="#FAECE7" opacity="0.5" rx="3"/>

                    {/* Grid lines */}
                    {[2,4,6,8].map(v => (
                      <g key={v}>
                        <line x1={toX(v)} y1={PAD} x2={toX(v)} y2={H-PAD} stroke="var(--border)" strokeWidth="0.5"/>
                        <line x1={PAD} y1={toY(v)} x2={W-PAD} y2={toY(v)} stroke="var(--border)" strokeWidth="0.5"/>
                      </g>
                    ))}

                    {/* Axis borders */}
                    <rect x={PAD} y={PAD} width={W-PAD*2} height={H-PAD*2} fill="none" stroke="var(--border2)" strokeWidth="1"/>

                    {/* Axis labels */}
                    <text x={W/2} y={H-4} textAnchor="middle" fontSize="9" fill="var(--text3)">Risk Score →</text>
                    <text x={8} y={H/2} textAnchor="middle" fontSize="9" fill="var(--text3)" transform={`rotate(-90,8,${H/2})`}>QAEI →</text>
                    <text x={PAD} y={PAD-4} fontSize="8" fill="var(--text3)">0</text>
                    <text x={W-PAD-4} y={PAD-4} fontSize="8" fill="var(--text3)" textAnchor="end">10</text>

                    {/* Trend line */}
                    {points.length > 1 && points.map((pt, i) => {
                      if (i === 0) return null;
                      const prev = points[i-1];
                      const x1 = toX(prev.risk), y1 = toY(prev.qaei ?? 0);
                      const x2 = toX(pt.risk),   y2 = toY(pt.qaei ?? 0);
                      return (
                        <g key={i}>
                          <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#999" strokeWidth="1.5" strokeDasharray="3,2"/>
                          {/* Arrowhead */}
                          <polygon
                            points={`0,-4 3,2 -3,2`}
                            fill="#999"
                            transform={`translate(${x2},${y2}) rotate(${Math.atan2(y2-y1, x2-x1)*180/Math.PI+90})`}
                          />
                        </g>
                      );
                    })}

                    {/* Dots */}
                    {points.map((pt, i) => {
                      const cx = toX(pt.risk);
                      const cy = toY(pt.qaei ?? 0);
