<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QA Risk Baseline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#28bbbb;--teal-dim:#1f9898;--teal-light:#e8f8f8;
  /* Design-system palette (shared with landing, roadmap, git-metrics) */
  --bg:#fff;--bg2:#f9fafb;--bg3:#f3f4f6;
  --text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  /* --purple kept as alias so existing JSX inline styles still resolve */
  --purple:#28bbbb;
  --radius:8px;--radius-lg:10px;
  /* Semantic risk-level colors */
  --green-bg:#E1F5EE;--green-text:#085041;--green-border:#1D9E75;
  --amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#BA7517;
  --red-bg:#FAECE7;--red-text:#712B13;--red-border:#D85A30;
  --blue-bg:#E8F0FE;--blue-text:#1a3a6b;--blue-border:#4A6FA5;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1c;--bg2:#242424;--bg3:#2c2c2c;--text:#e8e8e0;--text2:#9ca3af;--text3:#6b7280;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18)}
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:16px 16px 48px}
.container{max-width:1100px;margin:0 auto}
/* ── Header ─────────────────────────────────────────────────────────────────── */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;padding-top:8px}
.header-logo{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--teal);text-transform:uppercase}
.header-divider{color:var(--border2);font-size:13px}
.header-left{display:flex;flex-direction:column;gap:2px}
.header-left h1{font-size:17px;font-weight:700;margin-top:4px}
.header-left p{font-size:12px;color:var(--text2)}
/* ── Nav tabs ───────────────────────────────────────────────────────────────── */
.nav-tabs{display:flex;gap:4px;flex-shrink:0;align-self:center}
.nav-tab{font-size:11px;padding:5px 14px;height:30px;border-radius:5px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.nav-tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.nav-tab:hover:not(.active){border-color:var(--teal);background:var(--teal-light);color:var(--teal)}
/* ── Form ───────────────────────────────────────────────────────────────────── */
input,textarea,select{font-family:inherit;color:var(--text);background:transparent}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal)!important}
button{font-family:inherit;cursor:pointer}
/* ── Typography ─────────────────────────────────────────────────────────────── */
.pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
.helper{font-size:11px;color:var(--text2);line-height:1.5}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;margin-top:4px}
.dim-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;margin-top:18px}
.dim-title{font-size:13px;font-weight:700;letter-spacing:.01em}
.dim-badge{font-size:10px;font-weight:600;padding:2px 9px;border-radius:4px;border:1px solid}
/* ── Cards ──────────────────────────────────────────────────────────────────── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px}
/* ── Buttons ────────────────────────────────────────────────────────────────── */
.btn-primary{font-size:12px;padding:6px 16px;border-radius:5px;border:none;background:var(--teal);color:#fff;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{background:var(--teal-dim)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{font-size:12px;padding:5px 14px;height:30px;border-radius:5px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer}
.btn-secondary:hover{border-color:var(--teal);background:var(--teal-light);color:var(--teal)}
/* ── Toast ──────────────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;animation:fadeIn .2s}
.toast.success{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}
.toast.error{background:var(--red-bg);color:var(--red-text);border:1px solid var(--red-border)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ── Criteria cards ─────────────────────────────────────────────────────────── */
.criterion-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px}
.criterion-card.filled{background:var(--bg)}
.criterion-card.empty{background:var(--bg2)}
.criterion-card.auto-loaded{background:var(--bg);border-color:var(--teal);opacity:.9}
.criterion-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:2px}
.criterion-name{font-size:13px;font-weight:600}
.criterion-meta{display:flex;gap:8px;align-items:center}
.criterion-desc{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.options-row{display:flex;gap:6px;flex-wrap:wrap}
.opt-btn{font-size:11px;padding:4px 12px;border-radius:5px;transition:all .15s;font-family:inherit}
.auto-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;background:var(--blue-bg);color:var(--blue-text);border:1px solid var(--blue-border)}
.confirm-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber-border)}
/* ── Override ───────────────────────────────────────────────────────────────── */
.override-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:8px;background:var(--bg2)}
.override-card.active{background:var(--red-bg);border-color:var(--red-border)}
.override-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:0}
.override-toggle input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#D85A30}
.override-toggle-label{font-size:13px;font-weight:600}
.override-justification{margin-top:10px}
/* ── Score sidebar ──────────────────────────────────────────────────────────── */
.score-display{border-radius:var(--radius-lg);padding:16px;text-align:center;transition:all .3s}
.score-num{font-size:38px;font-weight:700;line-height:1}
.score-level{font-size:16px;font-weight:600;margin-top:4px}
.score-breakdown{font-size:11px;opacity:.8;margin-top:6px;line-height:1.5}
/* ── Formula display (Model tab) ────────────────────────────────────────────── */
.formula-display{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.formula-display code{font-family:monospace;font-size:10px;background:var(--bg3);padding:1px 4px;border-radius:3px}
/* ── Tables ─────────────────────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
/* ── History / timeline ─────────────────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px;color:var(--text3);font-size:13px}
.timeline-wrap{display:flex;flex-direction:column;gap:10px}
.timeline-project{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.timeline-project-name{font-size:13px;font-weight:700;margin-bottom:10px}
.timeline-points{display:flex;gap:8px;flex-wrap:wrap}
.timeline-point{padding:8px 12px;border-radius:8px;font-size:11px;border:1px solid transparent;min-width:120px}
.tp-date{color:var(--text2);margin-bottom:3px;font-size:10px}
.tp-score{font-size:18px;font-weight:700;line-height:1}
.tp-level{font-size:11px;font-weight:600;margin-top:2px}
.tp-divider{border-top:1px solid rgba(0,0,0,0.10);margin:6px 0 4px}
.tp-calc-row{display:flex;justify-content:space-between;gap:10px;font-size:10px;color:var(--text2);line-height:1.6}
.tp-calc-row span:last-child{font-weight:600;font-variant-numeric:tabular-nums;color:inherit}
.tp-eval{font-size:10px;color:var(--text2);margin-top:5px;border-top:1px solid rgba(0,0,0,0.07);padding-top:4px}
.tp-detail-btn{background:none;border:none;padding:0;font:inherit;font-size:10px;color:var(--teal);cursor:pointer;text-decoration:underline;text-underline-offset:2px;text-align:left;font-family:inherit}
.tp-detail-btn:hover{color:var(--text)}
/* ── History detail modal ───────────────────────────────────────────────────── */
.hist-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.hist-modal{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.hist-modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.hist-modal-close{background:none;border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--text2);cursor:pointer;padding:2px 8px;font-family:inherit;flex-shrink:0}
.hist-modal-close:hover{background:var(--bg2)}
.hist-modal-body{padding:14px 16px 16px;overflow-y:auto;flex:1}
.hist-detail-section{padding:10px 0;border-bottom:.5px solid var(--border)}
.hist-detail-section:last-child{border-bottom:none;padding-bottom:0}
.hist-detail-crit-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hist-detail-footer{font-size:12px;color:var(--text2);padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.hist-triton-summary{display:flex;gap:16px;font-size:11px;color:var(--text2);background:var(--bg2);padding:8px 10px;border-radius:6px;border:1px solid var(--border);flex-wrap:wrap}
.hist-triton-ticket{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border);min-width:0}
.hist-triton-ticket:last-child{border-bottom:none}
/* ── Toggle / toolbar ───────────────────────────────────────────────────────── */
.toggle-wrap{display:flex;border:1px solid var(--border2);border-radius:5px;overflow:hidden}
.toggle-btn{font-size:11px;padding:4px 12px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.toggle-btn.active{background:var(--teal);color:#fff}
.history-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.history-toolbar select{font-size:12px;padding:5px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--bg);height:30px}
</style>
</head>
<body>
<div class="container" id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

// ── Storage ──────────────────────────────────────────────────────────────────
// Shared assessments live in the committed ./data.json (visible to everyone).
// Local additions are kept in localStorage until exported and committed to the repo.
const STORAGE_KEY = 'qa-risk-assessments-v2';
const DATA_URL = './data.json';

function loadLocalAssessments() {
  try { const r = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); return Array.isArray(r)?r:[]; }
  catch { return []; }
}

async function fetchSharedAssessments() {
  try {
    const res = await fetch(DATA_URL, {cache:'no-store'});
    if (!res.ok) return [];
    const r = await res.json();
    return Array.isArray(r) ? r : [];
  } catch { return []; }
}

// Merge shared (data.json) + local (localStorage) by id; local wins on conflict.
async function loadAssessments() {
  const [shared, local] = [await fetchSharedAssessments(), loadLocalAssessments()];
  const byId = new Map();
  shared.forEach(r => byId.set(r.id, r));
  local.forEach(r => byId.set(r.id, r));
  return [...byId.values()];
}

function saveAssessment(record) {
  const all = loadLocalAssessments(); all.push(record);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

// Download the full merged set as data.json so it can be committed to the repo.
function exportAssessments(records) {
  const sorted = [...records].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const blob = new Blob([JSON.stringify(sorted, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Model ─────────────────────────────────────────────────────────────────────
const PROJECTS = ['GenAI Lens','Mira Studio','Mira','Mobile','Engage (Legacy)'];

// Project defaults map — synced to Confluence §4.8 (2026-Q3-v2)
const PROJECT_DEFAULTS = {
  // testCoverage is on the 5-level scale (1=0–20%, 2=20–40%, 3=40–60%, 4=60–80%, 5=80–100%).
  'GenAI Lens':    { userImpact:3, rateOfChange:3, complexity:3, testability:3, testCoverage:5, automationConfidence:3 },
  'Mira Studio':   { userImpact:3, rateOfChange:3, complexity:3, testability:2, testCoverage:3, automationConfidence:2 },
  'Mira':          { userImpact:3, rateOfChange:3, complexity:2, testability:2, testCoverage:1, automationConfidence:1 },
  'Mobile':        { userImpact:2, rateOfChange:2, complexity:2, testability:2, testCoverage:1, automationConfidence:1 },
  'Engage (Legacy)':{ userImpact:2, rateOfChange:1, complexity:1, testability:2, testCoverage:1, automationConfidence:1 },
};

// Evidence behind each pre-loaded default — mirrors Confluence §6 analysis.
// Each entry is an array of [indicator, value] rows rendered as a 2-column table.
const PROJECT_EVIDENCE = {

    automationConfidence: [
      ['Spec files',           '21'],
      ['Active tests',         '232 (3 skipped)'],
      ['Critical flows covered','18 of 21 (~80%)'],
      ['Covered',              'Overview, Trends, Benchmarking, Sentiment, Sources, AI Insights, Recommendations, Drill-downs, Prompt CRUD, Exports, Empty states'],
      ['Gaps',                 'Error states, role-based permissions, Monitor/Dashboard integration'],
      ['Assessment',           'Critical flows covered reliably — score 3'],
    ],
    testCoverage: [
      ['Automated coverage',   '~80% of critical flows'],
      ['Spec files / tests',   '21 files · 232 active · 3 skipped'],
      ['Flows covered',        '18 of 21 identified critical flows'],
      ['Not covered',          'Network error states, role-based permissions, Monitor/Dashboard integration'],
      ['Assessment',           '80–100% covered — score 5'],
    ],
    testability: [
      ['Code structure',  'Page Object Model with isolated fixtures (.isolated.spec.ts pattern)'],
      ['Selectors',       'Stable, no brittle XPaths'],
      ['Waits',           'Deterministic throughout'],
      ['Assessment',      'Good structure, test hooks available — score 3'],
    ],
  },
  'Mira Studio': {
    automationConfidence: [
      ['Spec files',             '10'],
      ['Active tests',           '85 (11 skipped)'],
      ['Critical flows covered', '10 of 16 (~55%)'],
      ['Covered',                'Projects CRUD, prompts, search, history, landing page, Media Brief Agent'],
      ['Most critical gap',      'AI response generation (the primary product flow) is not automated'],
      ['Assessment',             'Partial coverage or some gaps — score 2'],
    ],
    testCoverage: [
      ['Automated coverage',   '~55% of critical flows'],
      ['Spec files / tests',   '10 files · 85 active · 11 skipped'],
      ['Flows covered',        '10 of 16 identified critical flows'],
      ['Not covered',          'AI response generation, export/share, file attachment, role-based permissions, error states, staging'],
      ['Assessment',           '40–60% covered — score 3'],
    ],
    testability: [
      ['Code structure',  'Good POM (projects/, prompt-library/, search-and-history/ directories)'],
      ['Limitation',      'Entire suite skips on staging — only testable in production'],
      ['Impact',          'Limits pre-production validation and isolation'],
      ['Assessment',      'Some friction, partial test support — score 2'],
    ],
  },
  'Mira': {
    automationConfidence: [
      ['Spec files',    '0'],
      ['Active tests',  '0'],
      ['Coverage',      'None — all flows depend on manual testing'],
      ['Note',          'Score anchored at minimum; no evidence of automated coverage capacity'],
      ['Assessment',    'Major flows rely on manual testing — score 1'],
    ],
    testCoverage: [
      ['Automated coverage', '0%'],
      ['Spec files',         '0 (verified 26 June 2026 in global-qa-test-suite src/tests/mira/)'],
      ['Not covered',        'Prompt generation, scheduling, report generation, share visibility — all manual'],
      ['Assessment',         '0–20% covered — score 1'],
    ],
    testability: [
      ['Evidence',     'None — no tests exist to assess structural testability'],
      ['Score basis',  'Baseline estimate only (score 2)'],
      ['Next step',    'Reassess once an automated suite is introduced'],
      ['Assessment',   'Estimate: some friction, partial test support — score 2'],
    ],
  },
  'Mobile': {
    automationConfidence: [
      ['Suite',              'Maestro (global-qa-mobile-test-suite)'],
      ['Flows automated',    '3 flows + 2 subflows'],
      ['Covered',            'Login (happy path + invalid password), What\'s New onboarding, returning-user re-login'],
      ['Not automated',      'Monitor, content browsing, sharing, alerts, translation, settings (~85% of flows)'],
      ['Assessment',         'Major flows rely on manual testing — score 1'],
    ],
    testCoverage: [
      ['Automated coverage', '~15% of critical flows'],
      ['Flows automated',    '3 (auth + onboarding only)'],
      ['Core flows not covered','Monitor, content browsing, sharing, alerts, translation, settings'],
      ['Framework',          'Maestro YAML flows'],
      ['Assessment',         '0–20% covered — score 1'],
    ],
    testability: [
      ['Framework',    'Maestro — stable testIDs, reusable subflows, deterministic waits'],
      ['Code quality', 'Good within existing scope'],
      ['Limitation',   'Coverage scope is minimal (auth + onboarding only)'],
      ['Assessment',   'Some friction, partial test support — score 2'],
    ],
  },
  'Engage (Legacy)': {
    automationConfidence: [
      ['Spec files',              '1'],
      ['Active tests',            '1 (page heading verification only)'],
      ['Functional flows covered','0 of 8'],
      ['Note',                    'Suite skips in production (test.skip(ENVIRONMENT === \'production\'))'],
      ['Assessment',              'Major flows rely on manual testing — score 1'],
    ],
    testCoverage: [
      ['Automated coverage',       '~5% (1 heading test)'],
      ['Functional flows covered', '0 of 8'],
      ['Not covered',              'Create/schedule post, drafts, calendar, publishing, approval, analytics, account connections'],
      ['Production skip',          'No automated test runs against the live environment'],
      ['Assessment',               '0–20% covered — score 1'],
    ],
    testability: [
      ['Code structure',  'Page Object exists, structure is sound'],
      ['Limitation',      'Production-skip flag limits real-environment validation'],
      ['Assessment',      'Some friction, partial test support — score 2'],
    ],
  },
};

// GitHub repo that is the evidence source for each project's Mitigation scores.
const PROJECT_MIT_SOURCE = {
  'GenAI Lens':     { repo: 'global-qa-test-suite', branch: 'develop' },
  'Mira Studio':    { repo: 'global-qa-test-suite', branch: 'develop' },
  'Mira':           { repo: 'global-qa-test-suite', branch: 'develop' },
  'Mobile':         { repo: 'global-qa-mobile-test-suite', branch: 'main' },
  'Engage (Legacy)':{ repo: 'global-qa-test-suite', branch: 'develop' },
};

// Criteria definitions
const BASE_RISK_CRITERIA = [
  { id:'userImpact', label:'User impact', inputType:'auto',
    description:'Business criticality and size of user base. Pre-loaded — update only if product scope changes.',
    options:[{score:1,label:'Low',detail:'Internal tool or low traffic'},{score:2,label:'Medium',detail:'Affects a subset of users'},{score:3,label:'High',detail:'Core product, wide user base'}] },
  { id:'rateOfChange', label:'Rate of change', inputType:'auto',
    description:'Release frequency and sprint delivery cadence. Pre-loaded — update if cadence changes significantly.',
    options:[{score:1,label:'Stable',detail:'Rarely updated'},{score:2,label:'Moderate',detail:'Updated every few weeks'},{score:3,label:'Rapid',detail:'Updated weekly or more'}] },
  { id:'complexity', label:'Complexity', inputType:'auto',
    description:'Integrations, dependencies, and system logic. Pre-loaded — update only after major architectural changes.',
    options:[{score:1,label:'Low',detail:'Simple flows, few integrations'},{score:2,label:'Medium',detail:'Some complex flows or integrations'},{score:3,label:'High',detail:'Many dependencies, complex logic'}] },
];

const TRITON_CRITERIA = [
  { id:'escapedDefects', label:'Escaped defects', inputType:'jira',
    description:'TRITON Defects this quarter (service requests excluded), scored 0–10 on an anchored Gaussian curve. Severity overrides volume: P1/P2 tickets raise the floor. Sourced automatically from TRITON; the options below are only a manual fallback for unmapped projects.',
    // Manual-fallback options on the 0–10 scale (used only when no Jira data).
    options:[
      {score:2,label:'Low',detail:'Few escaped defects this quarter'},
      {score:5,label:'Medium',detail:'A moderate number of escaped defects'},
      {score:9,label:'High',detail:'Many escaped defects, or critical (P1/P2) present'},
    ] },
];

const MITIGATION_CRITERIA = [
  { id:'automationConfidence', label:'Automation confidence', inputType:'confirm',
    description:'How reliably automated tests would catch a regression in critical user flows. Review each quarter.',
    options:[{score:1,label:'Low',detail:'Major flows rely on manual testing'},{score:2,label:'Medium',detail:'Partial coverage or some gaps'},{score:3,label:'High',detail:'Critical flows covered reliably'}] },
  { id:'testCoverage', label:'Test coverage', inputType:'confirm', scale:5,
    description:'Combined automated + manual coverage across critical flows. Review each quarter.',
    options:[
      {score:1,label:'0–20%', detail:'Very low coverage'},
      {score:2,label:'20–40%',detail:'Low coverage'},
      {score:3,label:'40–60%',detail:'Medium coverage'},
      {score:4,label:'60–80%',detail:'Good coverage'},
      {score:5,label:'80–100%',detail:'High coverage'},
    ] },
  { id:'testability', label:'Testability', inputType:'confirm',
    description:'How easy it is to write and maintain meaningful tests. Structural — confirm quarterly.',
    options:[{score:1,label:'Hard',detail:'Poor structure, hard to isolate'},{score:2,label:'Moderate',detail:'Some friction, partial test support'},{score:3,label:'Easy',detail:'Good structure, test hooks available'}] },
  // v3: "Avg. age of open issues" removed in v2. "detectionEfficiency" removed in v3
  // — it now lives exclusively in the QAEI tab as the DCE driver.
];

// v3: MIT_WEIGHTS removed — QA process criteria no longer affect the Risk Index.
// They feed the QA Effectiveness Index only (PM_WEIGHTS_QAEI below).
const BASE_WEIGHTS  = { userImpact:0.40, rateOfChange:0.35, complexity:0.25 };

const DEFAULT_CURVE = { mu: 5, sigma: 4, scaleMax: 10 };
const DEFAULT_SEV_WEIGHTS = { Blocker: 3, Critical: 2, Major: 1.5, High: 1.5, Medium: 1, Minor: 1, Low: 1 };
const DEFAULT_MODEL_PARAMS = { curveType: 'gaussian', baseFloor: 0, multiplierMin: 0.70, multiplierMax: 1.10 };


// TRITON escaped-defect score on a 0–10 scale via an anchored curve (Gaussian or
// logistic, Rec #5). Mirrors scripts/fetch-jira-metrics.mjs. Params from jira-metrics.json.
function normalCDF(z) {
  const t = 1 / (1 + 0.3275911 * Math.abs(z / Math.SQRT2));
  const y = 1 - (((((1.061405429*t - 1.453152027)*t) + 1.421413741)*t - 0.284496736)*t + 0.254829592) * t * Math.exp(-(z/Math.SQRT2)*(z/Math.SQRT2));
  const erf = z >= 0 ? y : -y;
  return 0.5 * (1 + erf);
}
const logisticCDF = z => 1 / (1 + Math.exp(-z * 1.7));
const weightOf = (priority, weights) => (weights || DEFAULT_SEV_WEIGHTS)[priority] ?? 1;
const weightedCount = (tickets, weights) => tickets.reduce((s, t) => s + weightOf(t.priority, weights), 0);
function tritonScore10(weighted, curve, mp) {
  const { mu, sigma, scaleMax = 10 } = curve || DEFAULT_CURVE;
  const cdf = (mp || DEFAULT_MODEL_PARAMS).curveType === 'logistic' ? logisticCDF : normalCDF;
  return Math.round(scaleMax * cdf((weighted - mu) / sigma) * 10) / 10;
}

// Criteria with scale > 3 (e.g. testCoverage scale:5) are normalized to the 1–3
// range before the weighted average so the formula stays unchanged for all callers.
function wavg(criteria, weights, scores) {
  const filled = criteria.filter(c => scores[c.id] != null);
  if (!filled.length) return null;
  const tw = filled.reduce((s,c) => s + weights[c.id], 0);
  return filled.reduce((s,c) => {
    const scale = c.scale || 3;
    const norm = scale === 3 ? scores[c.id] : 1 + (scores[c.id] - 1) / (scale - 1) * 2;
    return s + norm * weights[c.id];
  }, 0) / tw;
}

const SCALE_MAX = 10;
// Map a 1–3 weighted-average (manual criteria) onto 0–10, honoring a base floor
// (Rec #7): floor at the lowest qualitative level so a core product is never 0.
const to10 = (v, mp) => {
  if (v == null) return null;
  const floor = (mp || DEFAULT_MODEL_PARAMS).baseFloor || 0;
  return floor + ((v - 1) / 2) * (SCALE_MAX - floor);
};

function compute(scores, overrideActive, mp) {
  mp = mp || DEFAULT_MODEL_PARAMS;
  if (overrideActive) return { baseRisk:null, tritonScore:(scores.escapedDefects ?? null), finalRisk:SCALE_MAX, overridden:true };
  const base10      = to10(wavg(BASE_RISK_CRITERIA, BASE_WEIGHTS, scores), mp);
  const tritonScore = scores.escapedDefects ?? null; // already on the 0–10 scale
  if (base10 == null && tritonScore == null) return { baseRisk:null, tritonScore:null, finalRisk:null, overridden:false };
  const finalRisk = Math.min(SCALE_MAX, ((base10||0) * 0.40) + ((tritonScore||0) * 0.60));
  return { baseRisk:base10, tritonScore, finalRisk, overridden:false };
}

// ── QA Effectiveness Index model ──────────────────────────────────────────────
// Criteria that measure process maturity (subset of MITIGATION_CRITERIA, excluding
// detectionEfficiency which is DCE — already the primary input to QAEI).
const PM_CRITERIA_QAEI = [
  { id:'automationConfidence', scale:3 },
  { id:'testCoverage',         scale:5 },
  { id:'testability',          scale:3 },
];
// Weights re-normalized to 1.0 after removing detectionEfficiency (0.35+0.30+0.20=0.85 → /0.85).
const PM_WEIGHTS_QAEI = { automationConfidence:0.412, testCoverage:0.353, testability:0.235 };

// QAEI levels: higher = better (inverse of Risk levels).
const QA_LEVELS = [
  { max:3.9, label:'Needs attention', text:'#712B13', bg:'#FAECE7', border:'#D85A30' },
  { max:5.9, label:'Developing',      text:'#633806', bg:'#FAEEDA', border:'#BA7517' },
  { max:7.9, label:'Effective',       text:'#085041', bg:'#E1F5EE', border:'#1D9E75' },
  { max:10,  label:'Excellent',       text:'#1a3a6b', bg:'#E8F0FE', border:'#4A6FA5' },
];
const qaLevel = score => score == null ? null : (QA_LEVELS.find(l => score <= l.max) || QA_LEVELS[QA_LEVELS.length - 1]);

// Q3 formula: QAEI = DCE×0.65 + ProcessMaturity×0.35
// Q4+: QAEI = DCE×0.50 + Trend×0.30 + ProcessMaturity×0.20 (once 2 real quarters exist)
function computeQAEI(dceRate, processScores, mp) {
  if (dceRate == null) return null;
  const dceScore  = Math.round(dceRate / 10 * 10) / 10;  // 0–100 % → 0–10
  const pmRaw     = wavg(PM_CRITERIA_QAEI, PM_WEIGHTS_QAEI, processScores || {});
  const pmScore   = pmRaw != null ? Math.round(to10(pmRaw, mp) * 10) / 10 : null;
  const qaei      = pmScore != null
    ? Math.round((dceScore * 0.65 + pmScore * 0.35) * 10) / 10
    : Math.round(dceScore * 10) / 10;
  return { qaei, dceScore, pmScore };
}

// 0–10 scale (linear rescale of the previous 1.5 / 2.2 thresholds × 10/3).
const LEVELS = [
  {max:5.0, label:'Low',    text:'#085041', bg:'#E1F5EE', border:'#1D9E75'},
  {max:7.3, label:'Medium', text:'#633806', bg:'#FAEEDA', border:'#BA7517'},
  {max:Infinity, label:'High', text:'#712B13', bg:'#FAECE7', border:'#D85A30'},
];
const riskLevel = s => LEVELS.find(l => s <= l.max);
const levelByLabel = lbl => LEVELS.find(l => l.label === lbl);

// Option colors by criterion type
const RISK_COLORS   = {1:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},2:{bg:'#FAEEDA',border:'#BA7517',text:'#633806'},3:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'}};
const MIT_COLORS    = {1:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'},2:{bg:'#FAEEDA',border:'#BA7517',text:'#633806'},3:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'}};
// 5-level color map for testCoverage (0–20 / 20–40 / 40–60 / 60–80 / 80–100%).
const MIT_COLORS_5  = {1:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'},2:{bg:'#FAEEDA',border:'#BA7517',text:'#633806'},3:{bg:'#FFF3CD',border:'#C9A227',text:'#5a4200'},4:{bg:'#D4EDDA',border:'#3D9970',text:'#1a5c3a'},5:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'}};
const NEUTRAL_COLORS= {1:{bg:'#E8F0FE',border:'#4A6FA5',text:'#1a3a6b'},2:{bg:'#E8F0FE',border:'#4A6FA5',text:'#1a3a6b'},3:{bg:'#E8F0FE',border:'#4A6FA5',text:'#1a3a6b'}};

// ── CriterionCard ─────────────────────────────────────────────────────────────
function CriterionCard({ criterion, score, onScore, colorMap, weightPct, autoLoaded, reverseOptions, locked, lockedNote, lockedLabel, evidence }) {
  const [showEvidence, setShowEvidence] = useState(false);
  const inputTypeLabel = criterion.inputType === 'auto' ? 'Auto' : criterion.inputType === 'confirm' ? 'Confirm' : 'Jira';
  const inputTagClass  = criterion.inputType === 'auto' ? 'auto-tag' : criterion.inputType === 'confirm' ? 'confirm-tag' : 'auto-tag';
  // Display order only — score values stay attached to each option.
  // Reversed so green (lower final risk) is always leftmost, red rightmost, across all sections.
  const orderedOptions = reverseOptions ? [...criterion.options].reverse() : criterion.options;
  return (
    <div className={`criterion-card ${score != null ? 'filled' : 'empty'} ${autoLoaded ? 'auto-loaded' : ''}`}>
      <div className="criterion-top">
        <div className="criterion-name">{criterion.label}</div>
        <div className="criterion-meta">
          {weightPct && <span style={{fontSize:11,color:'var(--text2)'}}>{weightPct}</span>}
          <span className={inputTagClass}>{locked ? `🔒 ${lockedLabel || 'Jira'}` : inputTypeLabel}</span>
        </div>
      </div>
      <div className="criterion-desc">{criterion.description}</div>
      <div className="options-row">
        {orderedOptions.map(o => {
          const sel = score === o.score;
          const col = colorMap[o.score];
          // When locked (value sourced from Jira), only the selected option is shown
          // and it is not clickable — it's read-only data, not a choice.
          if (locked && !sel) return null;
          return (
            <button key={o.score} className="opt-btn" disabled={locked} onClick={() => !locked && onScore(criterion.id, o.score)}
              style={{cursor: locked ? 'default' : 'pointer', border: sel ? `1.5px solid ${col.border}` : '.5px solid var(--border)', background: sel ? col.bg : 'transparent', color: sel ? col.text : 'var(--text2)', fontWeight: sel ? 600 : 400}}>
              {o.label} <span style={{opacity:.75}}>· {o.detail}</span>
            </button>
          );
        })}
      </div>
      {locked && lockedNote && <div style={{fontSize:10.5,color:'var(--text3)',marginTop:6}}>{lockedNote}</div>}
      {evidence && (
        <div style={{marginTop:8,borderTop:'.5px solid var(--border)',paddingTop:6}}>
          <button onClick={()=>setShowEvidence(v=>!v)}
            style={{fontSize:11,fontWeight:600,color:'var(--blue-text)',background:'var(--blue-bg)',border:'1px solid var(--blue-border)',borderRadius:4,padding:'2px 10px',cursor:'pointer',fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:4}}>
            {showEvidence ? '▾' : '▸'} Evidence
          </button>
          {showEvidence && (
            <table style={{width:'100%',borderCollapse:'collapse',marginTop:6,fontSize:11}}>
              <tbody>
                {evidence.map(([label, value], i) => (
                  <tr key={i} style={{borderBottom: i < evidence.length - 1 ? '.5px solid var(--border)' : 'none'}}>
                    <td style={{padding:'4px 8px 4px 0',color:'var(--text3)',fontWeight:600,width:'36%',verticalAlign:'top'}}>{label}</td>
                    <td style={{padding:'4px 0',color:'var(--text2)',lineHeight:1.45}}>{value}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  );
}

// ── AssessView ────────────────────────────────────────────────────────────────
// Merges static PROJECT_EVIDENCE rows with live counts from test-metrics.json.
// Only quantitative rows (Spec files, Active tests, Spec files / tests, Flows automated)
// are replaced — qualitative analysis rows stay as-is.
function buildEvidence(project, criterionId, testMetrics) {
  const staticRows = PROJECT_EVIDENCE[project]?.[criterionId];
  if (!staticRows) return null;
  const tm = testMetrics?.projects?.[project];
  if (!tm || tm.error) return staticRows;
  const specStr = tm.subflows != null
    ? `${tm.specFiles} main flows · ${tm.subflows} subflows`
    : `${tm.specFiles} files · ${tm.activeTests} active · ${tm.skipped} skipped`;
  return staticRows.map(([label, value]) => {
    if (label === 'Spec files')         return [label, String(tm.specFiles)];
    if (label === 'Active tests')       return [label, tm.subflows != null ? String(tm.activeTests) : `${tm.activeTests} (${tm.skipped} skipped)`];
    if (label === 'Spec files / tests') return [label, specStr];
    if (label === 'Flows automated')    return [label, String(tm.activeTests)];
    return [label, value];
  });
}

function AssessView({ jiraMetrics, testMetrics }) {
  const [project, setProject] = useState('');
  const [scores, setScores] = useState({});
  const [showTickets, setShowTickets] = useState(false);

  const JIRA_IDS = ['escapedDefects'];
  const jiraProject = (jiraMetrics && project) ? jiraMetrics.projects?.[project] : null;
  const jiraScore = id => jiraProject?.[id]?.score;
  const isJiraLocked = c => c.inputType === 'jira' && jiraScore(c.id) != null;

  const mitSrc = project ? PROJECT_MIT_SOURCE[project] : null;
  const isMitLocked = !!mitSrc;
  const fmtUpdated = iso => { try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); } catch { return ''; } };
  const tmDate = testMetrics?.generatedAt ? `updated ${fmtUpdated(testMetrics.generatedAt)}` : 'analyzed June 26, 2026';
  const mitLockedNote = mitSrc ? `From ${mitSrc.repo} · branch: ${mitSrc.branch} · ${tmDate}` : null;

  const escapedTickets = jiraProject?.escapedDefects?.tickets || [];
  const escTotalEff = escapedTickets.length;
  const escCritEff = escapedTickets.filter(t => t.critical).length;
  const escWeightedEff = weightedCount(escapedTickets, jiraMetrics?.severityWeights);
  const escScoreEff = escapedTickets.length ? tritonScore10(escWeightedEff, jiraMetrics?.tritonCurve, jiraMetrics?.modelParams) : jiraScore('escapedDefects');

  const jiraNote = id => {
    if (!jiraProject) return null;
    const upd = jiraMetrics.generatedAt ? ` · updated ${fmtUpdated(jiraMetrics.generatedAt)}` : '';
    const mr = jiraProject.needsManualReview;
    if (id === 'escapedDefects') {
      const warn = mr?.escaped ? ` ⚠ ${mr.escaped} unlinked need manual review` : '';
      return `From TRITON · ${escTotalEff} escaped defect${escTotalEff!==1?'s':''} (${escCritEff} critical, weighted ${escWeightedEff})${upd}${warn}`;
    }
    if (id === 'avgAgeOpenIssues') {
      const d = jiraProject.avgAgeOpenIssues;
      const warn = mr?.open ? ` ⚠ ${mr.open} unlinked need manual review` : '';
      const core = d.openCount === 0 ? `From TRITON · no open defects${upd}` : `From TRITON · ${d.openCount} open · avg ${d.avgDays}d${upd}`;
      return core + warn;
    }
    if (id === 'detectionEfficiency') {
      const de = jiraProject.detectionEfficiency;
      if (!de) return null;
      const preP = de.preProductionCaught ?? 0;
      const parts = [];
      if (preP > 0) parts.push(`${preP} pre-production (known)`);
      if (de.internallyFound > 0) parts.push(`${de.internallyFound} post-production (escaped)`);
      parts.push(`${de.customerFound} customer-reported`);
      return `Dev boards · ${parts.join(' · ')} · comprehensive DCE ${de.rate}%${upd}`;
    }
    return null;
  };

  useEffect(() => {
    const base = (project && PROJECT_DEFAULTS[project]) ? {...PROJECT_DEFAULTS[project]} : {};
    const jp = (jiraMetrics && project) ? jiraMetrics.projects?.[project] : null;
    if (jp) {
      for (const id of JIRA_IDS) {
        if (jp[id]?.score != null) base[id] = jp[id].score;
      }
    }
    setScores(base);
    setShowTickets(false);
  }, [project, jiraMetrics]);

  useEffect(() => {
    if (!escapedTickets.length) return;
    setScores(s => s.escapedDefects === escScoreEff ? s : ({...s, escapedDefects: escScoreEff}));
  }, [escScoreEff, escapedTickets.length]);

  const result = compute(scores, false, jiraMetrics?.modelParams);
  const rl = result.finalRisk != null ? riskLevel(result.finalRisk) : null;

  return (
    <div>
      {/* Project selector */}
      <div className="card" style={{marginBottom:20}}>
        <div className="section-label">Project</div>
        <select value={project} onChange={e=>setProject(e.target.value)} style={{width:'100%',fontSize:13,padding:'4px 0',border:'none',borderBottom:'.5px solid var(--border2)'}}>
          <option value="">Select a project...</option>
          {PROJECTS.map(p=><option key={p} value={p}>{p}</option>)}
        </select>

      <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:16,alignItems:'start'}}>
        <div>
          {/* Base Risk */}

            <div className="dim-title">Base Risk</div>
            <span className="dim-badge" style={{background:'var(--bg2)',color:'var(--text2)',borderColor:'var(--border2)'}}>40% of Final Risk</span>
          </div>
          <div className="helper" style={{marginBottom:10}}>Inherent product risk. Sourced from project configuration.</div>
          {BASE_RISK_CRITERIA.map(c => (
            <CriterionCard key={c.id} criterion={c} score={scores[c.id]} onScore={()=>{}}
              colorMap={RISK_COLORS} weightPct={`${Math.round(BASE_WEIGHTS[c.id]*100)}% of group`}
              locked={true} lockedLabel="Config" />
          ))}

          {/* TRITON Score */}

          </div>
          <div className="helper" style={{marginBottom:10}}>Sourced automatically from TRITON (🔒 locked) — Defects this quarter scored 0–10 on an anchored Gaussian curve, severity-adjusted. Falls back to manual entry for projects not mapped in Jira. See §4.6 in Confluence for the JQL filter and curve.</div>
          {TRITON_CRITERIA.map(c => {
            if (isJiraLocked(c)) {

                      <div style={{fontSize:22,fontWeight:700,lineHeight:1,color:lvl.text||'var(--text)'}}>{escScoreEff!=null?escScoreEff.toFixed(1):'—'}</div>
