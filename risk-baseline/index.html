                  <span style={{fontSize:10.5,color:'var(--text3)'}}>Bugs found by QA in staging — never reached production</span>
                </div>
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:3}}>
                  {preProductionTickets.map(t => (
                    <div key={t.key} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 6px',borderRadius:5}}>
                      <span style={{fontSize:9.5,fontWeight:600,padding:'1px 6px',borderRadius:4,background:'var(--green-bg)',color:'var(--green-text)',border:'.5px solid var(--green-border)',whiteSpace:'nowrap'}}>{t.priority}</span>
                      <a href={t.url} target="_blank" rel="noreferrer" style={{fontSize:11,fontWeight:600,color:'var(--purple)',textDecoration:'none',whiteSpace:'nowrap'}}>{t.key}</a>
                      <span style={{fontSize:11,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}} title={t.summary}>{t.summary}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* Internally-escaped ticket viewer — production bugs found by QA before customer reports */}
          {jiraProject?.internalEscaped?.tickets?.length > 0 && (() => {
            const internalTickets = jiraProject.internalEscaped.tickets;
            return (
              <div className="card" style={{marginTop:8,padding:'10px 12px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,fontWeight:600}}>Production-escaped catches ({internalTickets.length})</span>
                  <span style={{fontSize:10.5,color:'var(--text3)'}}>Bugs found by QA in production before customer reports</span>
                </div>
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:3}}>
                  {internalTickets.map(t => (
                    <div key={t.key} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 6px',borderRadius:5}}>
                      <span style={{fontSize:9.5,fontWeight:600,padding:'1px 6px',borderRadius:4,background:'var(--blue-bg)',color:'var(--blue-text)',border:'.5px solid var(--blue-border)',whiteSpace:'nowrap'}}>{t.priority}</span>
                      <a href={t.url} target="_blank" rel="noreferrer" style={{fontSize:11,fontWeight:600,color:'var(--purple)',textDecoration:'none',whiteSpace:'nowrap'}}>{t.key}</a>
                      <span style={{fontSize:11,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}} title={t.summary}>{t.summary}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

        </div>

        {/* Sidebar */}
        <div style={{display:'flex',flexDirection:'column',gap:12,position:'sticky',top:16}}>
          {/* Score display */}
          <div className="score-display" style={{
            border: rl ? `1.5px solid ${rl.border}` : '.5px solid var(--border)',
            background: rl ? rl.bg : 'var(--bg2)'
          }}>
            <div style={{fontSize:11,fontWeight:600,color:rl?rl.text:'var(--text2)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>
              Final Risk
            </div>
            <div className="score-num" style={{color:rl?rl.text:'var(--text3)'}}>
              {result.finalRisk != null ? result.finalRisk.toFixed(1) : '—'}<span style={{fontSize:'0.4em',fontWeight:500,opacity:.7}}> / 10</span>
            </div>
            <div className="score-level" style={{color:rl?rl.text:'var(--text3)'}}>
              {rl ? rl.label : 'Pending'}
            </div>
            {result.baseRisk != null && result.tritonScore != null && !result.overridden && (
              <div className="score-breakdown" style={{color:rl?.text}}>
                Base {result.baseRisk.toFixed(1)} × 0.40<br/>
                TRITON {result.tritonScore.toFixed(1)} × 0.60
              </div>
            )}
          </div>

          {/* Formula */}
          <div className="formula-display">
            <strong>Formula</strong> <span style={{fontSize:10}}>(0–10 scale)</span><br/>
            <code>Base × 0.40 + TRITON × 0.60</code>
          </div>

          {/* Legend */}
          <div className="card">
            <div className="section-label">Risk levels</div>
            {[{l:'Low',r:'0.0 – 5.0',c:'#085041',bg:'#E1F5EE'},{l:'Medium',r:'5.1 – 7.3',c:'#633806',bg:'#FAEEDA'},{l:'High',r:'7.4 – 10',c:'#712B13',bg:'#FAECE7'}].map(x=>(
              <div key={x.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <span className="pill" style={{background:x.bg,color:x.c}}>{x.l}</span>
                <span style={{fontSize:11,color:'var(--text2)'}}>{x.r}</span>
              </div>
            ))}
          </div>

        </div>
      </div>
    </div>
  );
}

// ── TritonDetailBody ──────────────────────────────────────────────────────────
function TritonDetailBody({ r, ql, jiraHistory, jiraMetrics, onSaveRecord }) {
  const sevColor = p => {
    if (p === 'Blocker' || p === 'Critical') return {bg:'#FAECE7',text:'#712B13',border:'#D85A30'};
    if (p === 'Major'   || p === 'High')     return {bg:'#FAEEDA',text:'#633806',border:'#BA7517'};
    if (p === 'Medium')                      return {bg:'#FFF3CD',text:'#5a4200',border:'#C9A227'};
    return {bg:'var(--bg3)',text:'var(--text2)',border:'var(--border2)'};
  };

  // All tickets in the record (not pre-filtered).
  const allStoredTix = r.jira?.escapedDefects?.tickets || [];

  // Live / history fallbacks for when no tickets are stored in the record.
  const jmQl  = jiraMetrics?.quarter ? jiraMetrics.quarter.split('-').reverse().join('-') : null;
  const jmEsc = (jmQl === ql) ? (jiraMetrics?.projects?.[r.project]?.escapedDefects ?? null) : null;
  const hist  = jiraHistory?.projects?.[r.project]?.[ql] ?? null;

  // Full ticket list (with or without stored per-ticket data).
  const allTickets = allStoredTix.length > 0 ? allStoredTix : (jmEsc?.tickets || hist?.tickets || []);
  const hasTickets = allTickets.length > 0;

  // Local exclusion state — initialised from the record's saved exclusions.
  const [localExcluded, setLocalExcluded] = useState(() => new Set(r.jira?.excludedTickets || []));
  const [saving, setSaving] = useState(false);

  const originalExcluded = new Set(r.jira?.excludedTickets || []);
  const isDirty = localExcluded.size !== originalExcluded.size ||
    [...localExcluded].some(k => !originalExcluded.has(k));

  const toggleTicket = key => setLocalExcluded(prev => {
    const next = new Set(prev);
    if (next.has(key)) next.delete(key); else next.add(key);
    return next;
  });

  // Active (non-excluded) tickets and derived stats.
  const activeTickets = allTickets.filter(t => !localExcluded.has(t.key));
  const activeWtd     = activeTickets.reduce((s, t) => s + (t.weight || 0), 0);
  const activeCrit    = activeTickets.filter(t => t.priority === 'Blocker' || t.priority === 'Critical').length;

  // Recalculate triton score and final risk in real-time.
  const curve = jiraMetrics?.tritonCurve || DEFAULT_CURVE;
  const mp    = jiraMetrics?.modelParams  || DEFAULT_MODEL_PARAMS;
  const recalcTriton    = hasTickets ? tritonScore10(activeWtd, curve, mp) : (r.tritonScore ?? null);
  const recalcCombined  = ((r.baseRisk || 0) * 0.40) + ((recalcTriton || 0) * 0.60);
  const recalcFinalRisk = Math.min(10, Math.round(recalcCombined * 10) / 10);
  const recalcLevel     = riskLevel(recalcFinalRisk);

  const tritonChanged   = hasTickets && Math.abs(recalcTriton - (r.tritonScore ?? 0)) >= 0.05;
  const finalChanged    = hasTickets && Math.abs(recalcFinalRisk - (r.finalRisk ?? 0)) >= 0.05;

  const handleSave = () => {
    setSaving(true);
    const newTritonScore  = recalcTriton;
    const newFinalRisk    = recalcFinalRisk;
    const updatedRecord   = {
      ...r,
      tritonScore: newTritonScore,
      scores: { ...r.scores, escapedDefects: newTritonScore },
      finalRisk: newFinalRisk,
      level: recalcLevel?.label ?? r.level,
      jira: {
        ...r.jira,
        excludedTickets: [...localExcluded],
        escapedEffective: {
          total:    activeTickets.length,
          critical: activeCrit,
          weighted: activeWtd,
        },
      },
    };
    // Persist to localStorage (local wins over shared data.json on next load).
    const locals = loadLocalAssessments();
    const byId   = new Map(locals.map(rec => [rec.id, rec]));
    byId.set(updatedRecord.id, updatedRecord);
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...byId.values()]));
    setSaving(false);
    onSaveRecord(updatedRecord);
  };

  // ── No data case ──────────────────────────────────────────────────────────
  if (r.tritonScore == null && allTickets.length === 0) {
    return <div style={{color:'var(--text3)',fontSize:12,padding:'8px 0'}}>No escaped defects tracked this quarter.</div>;
  }

  // ── Summary bar ───────────────────────────────────────────────────────────
  const SummaryBar = () => (
    <div className="hist-triton-summary" style={{flexDirection:'column',gap:6}}>
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        <span>Active <strong>{hasTickets ? activeTickets.length : (r.jira?.escapedEffective?.total ?? jmEsc?.total ?? hist?.total ?? '—')}</strong></span>
        <span>Critical <strong>{hasTickets ? activeCrit : (r.jia?.escapedEffective?.critical ?? jmEsc?.critical ?? hist?.critical ?? '—')}</strong></span>
        <span>Weighted <strong>{hasTickets ? activeWtd.toFixed(1) : (jmEsc?.weighted ?? hist?.weighted ?? '—')}</strong></span>
        <span style={{display:'flex',alignItems:'center',gap:6}}>
          Score&nbsp;
          <strong style={{color: tritonChanged ? (recalcTriton < (r.tritonScore??0) ? '#1D9E75' : '#D85A30') : 'inherit'}}>
            {recalcTriton != null ? recalcTriton.toFixed(1) : '—'}
          </strong>
          {tritonChanged && <span style={{fontSize:10,color:'var(--text3)'}}>(was {r.tritonScore?.toFixed(1)})</span>}
        </span>
      </div>
      {finalChanged && (
        <div style={{fontSize:11,padding:'4px 8px',borderRadius:5,background: recalcLevel?.bg,color:recalcLevel?.text,border:`1px solid ${recalcLevel?.border}`,fontWeight:600,display:'inline-flex',alignItems:'center',gap:6,alignSelf:'flex-start'}}>
          Final Risk → {recalcFinalRisk.toFixed(1)} {recalcLevel?.label}
          <span style={{fontWeight:400,opacity:.8}}>(was {r.finalRisk?.toFixed(1)} {r.level})</span>
        </div>
      )}
    </div>
  );

  return (
    <div>
      <SummaryBar/>
      {hasTickets ? (
        <div style={{marginTop:10}}>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:6,lineHeight:1.5}}>
            Toggle tickets to exclude non-bugs or out-of-scope items. The score recalculates instantly — save when done.
          </div>
          {allTickets.map(t => {
            const sc      = sevColor(t.priority);
            const disabled = localExcluded.has(t.key);
            return (
              <div key={t.key} className="hist-triton-ticket" style={{opacity: disabled ? 0.45 : 1, cursor:'pointer'}}
                onClick={() => toggleTicket(t.key)}>
                <input type="checkbox" checked={!disabled} readOnly
                  style={{width:13,height:13,flexShrink:0,cursor:'pointer',accentColor:'var(--teal)'}}/>
                <span className="pill" style={{background:sc.bg,color:sc.text,border:`1px solid ${sc.border}`,minWidth:58,textAlign:'center',flexShrink:0}}>
                  {t.priority}
                </span>
                {t.url
                  ? <a href={t.url} target="_blank" rel="noreferrer"
                      style={{fontWeight:600,color:'var(--teal)',fontSize:11,whiteSpace:'nowrap',flexShrink:0,textDecoration: disabled ? 'line-through' : 'none'}}
                      onClick={e => e.stopPropagation()}>{t.key}</a>
                  : <span style={{fontWeight:600,color:'var(--teal)',fontSize:11,whiteSpace:'nowrap',flexShrink:0,textDecoration: disabled ? 'line-through' : 'none'}}>{t.key}</span>
                }
                <span style={{fontSize:11,color:'var(--text)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textDecoration: disabled ? 'line-through' : 'none'}}>
                  {t.summary}
                </span>
                <span style={{fontSize:10,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>×{t.weight}</span>
                {disabled && <span style={{fontSize:10,fontWeight:600,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>excluded</span>}
              </div>
            );
          })}
          {isDirty && (
            <div style={{marginTop:12,display:'flex',alignItems:'center',gap:10}}>
              <button className="btn-primary" onClick={handleSave} disabled={saving}
                style={{fontSize:12,padding:'6px 16px'}}>
                {saving ? 'Saving…' : 'Save adjustments'}
              </button>
              <span style={{fontSize:11,color:'var(--text3)'}}>
                {localExcluded.size - originalExcluded.size > 0
                  ? `${localExcluded.size - originalExcluded.size} ticket(s) newly excluded`
                  : localExcluded.size < originalExcluded.size
                  ? `${originalExcluded.size - localExcluded.size} ticket(s) re-included`
                  : 'Changes pending'}
              </span>
            </div>
          )}
        </div>
      ) : (
        <div>
          {hist?.note && <div style={{fontSize:11,color:'var(--text3)',marginTop:8,lineHeight:1.5}}>{hist.note}</div>}
          <div style={{fontSize:11,color:'var(--text3)',marginTop:8}}>Ticket-level detail not available for this period.</div>
        </div>
      )}
    </div>
  );
}

// ── HistoryDetailModal ────────────────────────────────────────────────────────
function HistoryDetailModal({ detail, onClose, onSaveRecord, jiraHistory, jiraMetrics, testMetrics }) {
  if (!detail) return null;
  const { type, record: r } = detail;
  const d = new Date(r.date);
  const ql = `Q${Math.floor(d.getUTCMonth()/3)+1}-${d.getUTCFullYear()}`;

  const sevColor = p => {
    if (p === 'Blocker' || p === 'Critical') return {bg:'#FAECE7',text:'#712B13',border:'#D85A30'};
    if (p === 'Major'   || p === 'High')     return {bg:'#FAEEDA',text:'#633806',border:'#BA7517'};
    if (p === 'Medium')                      return {bg:'#FFF3CD',text:'#5a4200',border:'#C9A227'};
    return {bg:'var(--bg3)',text:'var(--text2)',border:'var(--border2)'};
  };

  let title, body;

  if (type === 'base') {
    title = 'Base Risk Breakdown';
    body = (
      <div>
        {BASE_RISK_CRITERIA.map(c => {
          const score = r.scores?.[c.id];
          const opt   = c.options.find(o => o.score === score);
          const col   = RISK_COLORS[score] || {};
          return (
            <div key={c.id} className="hist-detail-section">
              <div className="hist-detail-crit-header">
                <span style={{fontWeight:700,fontSize:13}}>{c.label}</span>
                <span style={{fontSize:11,color:'var(--text2)'}}>{Math.round(BASE_WEIGHTS[c.id]*100)}% weight</span>
                {opt && <span className="pill" style={{background:col.bg,color:col.text,border:`1px solid ${col.border}`}}>{opt.label} · {score}/3</span>}
              </div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>{c.description}</div>
              {opt && <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>"{opt.detail}"</div>}
            </div>
          );
        })}
        <div className="hist-detail-footer">
          Base Risk: <strong>{r.baseRisk != null ? r.baseRisk.toFixed(1) : '—'}</strong> / 10
          &nbsp;·&nbsp; formula: (wavg − 1) / 2 × 10
        </div>
      </div>
    );
  } else if (type === 'triton') {
    title = 'TRITON Escaped Defects';
    body = <TritonDetailBody r={r} ql={ql} jiraHistory={jiraHistory} jiraMetrics={jiraMetrics} onSaveRecord={onSaveRecord}/>;
  } else if (type === 'mit') {
    title = 'QA Process Evidence';
    body = (
      <div>
        <div className="helper" style={{marginBottom:10}}>These criteria drive the Process Maturity component of the QA Effectiveness Index. They are recorded here for reference but do not affect the Risk score.</div>
        {MITIGATION_CRITERIA.map(c => {
          const score   = r.scores?.[c.id];
          const opt     = c.options.find(o => o.score === score);
          const colorMap= c.scale === 5 ? MIT_COLORS_5 : MIT_COLORS;
          const col     = colorMap[score] || {};
          const evidence= PROJECT_EVIDENCE[r.project]?.[c.id];
          return (
            <div key={c.id} className="hist-detail-section">
              <div className="hist-detail-crit-header">
                <span style={{fontWeight:700,fontSize:13}}>{c.label}</span>
                {opt && <span className="pill" style={{background:col.bg,color:col.text,border:`1px solid ${col.border}`}}>{opt.label} · {score}/{c.scale||3}</span>}
              </div>
              {evidence ? (
                <table style={{width:'100%',borderCollapse:'collapse',marginTop:6,fontSize:11}}>
                  <tbody>
                    {evidence.map(([label,value],i) => (
                      <tr key={i} style={{borderBottom:i<evidence.length-1?'.5px solid var(--border)':'none'}}>
                        <td style={{padding:'3px 8px 3px 0',color:'var(--text3)',fontWeight:600,width:'36%',verticalAlign:'top'}}>{label}</td>
                        <td style={{padding:'3px 0',color:'var(--text2)',lineHeight:1.45}}>{value}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              ) : (
                <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>No evidence recorded for this project.</div>
              )}
            </div>
          );
        })}
        <div className="hist-detail-footer">
          These scores are recorded for reference only — they feed the QA Effectiveness Index and do not affect the Risk score (v3 model).
          {r.multiplier != null && <span style={{opacity:.5}}>&nbsp;·&nbsp;v2 multiplier: {r.multiplier.toFixed(2)}</span>}
        </div>
      </div>
    );
  }

  return (
    <div className="hist-modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="hist-modal">
        <div className="hist-modal-header">
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{title}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{r.project} · {ql}</div>
          </div>
          <button className="hist-modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="hist-modal-body">{body}</div>
      </div>
    </div>
  );
}

// ── HistoryView ───────────────────────────────────────────────────────────────
function HistoryView({ refreshKey, jiraHistory, jiraMetrics, testMetrics }) {
  const [records, setRecords] = useState([]);
  const [allRecords, setAllRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filterProject, setFilterProject] = useState('');
  const [viewMode, setViewMode] = useState('timeline');
  const [localRefresh, setLocalRefresh] = useState(0);
  const [detail, setDetail] = useState(null);
  const fileRef = useRef(null);

  useEffect(()=>{
    if (!detail) return;
    const onKey = e => { if (e.key === 'Escape') setDetail(null); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [detail]);

  useEffect(()=>{
    let cancelled = false;
    setLoading(true);
    loadAssessments().then(list=>{
      if (cancelled) return;
      const all = list.sort((a,b)=>new Date(b.date)-new Date(a.date));
      setAllRecords(all);
      setRecords(filterProject ? all.filter(r=>r.project===filterProject) : all);
      setLoading(false);
    });
    return ()=>{ cancelled = true; };
  },[filterProject,refreshKey,localRefresh]);

  const handleImport = e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) throw new Error('not an array');
        // Merge imported into local store by id (imported wins on conflict).
        const byId = new Map();
        loadLocalAssessments().forEach(r=>byId.set(r.id,r));
        imported.forEach(r=>byId.set(r.id,r));
        localStorage.setItem(STORAGE_KEY, JSON.stringify([...byId.values()]));
        setLocalRefresh(n=>n+1);
      } catch { alert('Invalid data.json file'); }
    };
    reader.readAsText(f);
    e.target.value = '';
  };

  const projects = [...new Set(records.map(r=>r.project))].sort();
  const byProject = projects.reduce((acc,p)=>{ acc[p]=records.filter(r=>r.project===p).sort((a,b)=>new Date(a.date)-new Date(b.date)); return acc; },{});
  const fmtDate = iso => new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  return (
    <div>
      <div className="history-toolbar">
        <select value={filterProject} onChange={e=>setFilterProject(e.target.value)}>
          <option value="">All projects</option>
          {[...new Set([...PROJECTS,...projects])].map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        <div className="toggle-wrap">
          <button className={`toggle-btn${viewMode==='timeline'?' active':''}`} onClick={()=>setViewMode('timeline')}>Timeline</button>
          <button className={`toggle-btn${viewMode==='table'?' active':''}`} onClick={()=>setViewMode('table')}>Table</button>
        </div>
        <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{records.length} assessment{records.length!==1?'s':''}</span>
        <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleImport} style={{display:'none'}}/>
        <button className="toggle-btn" style={{border:'1px solid var(--border2)',borderRadius:6}} onClick={()=>fileRef.current && fileRef.current.click()}>Import data.json</button>
        <button className="btn-primary" style={{fontSize:11,padding:'5px 12px'}} onClick={()=>exportAssessments(allRecords)} disabled={!allRecords.length}>Export data.json</button>
      </div>
      <div className="helper" style={{marginBottom:16}}>
        To share your assessments with the team, click <strong>Export data.json</strong> and commit the downloaded file to <code>risk-baseline/data.json</code> in the repo. Everyone who opens this page then sees the committed assessments.
      </div>

      {loading && <div className="empty-state">Loading...</div>}
      {!loading && records.length===0 && <div className="empty-state">No assessments yet. Run the first one from the Assessment tab.</div>}

      {!loading && records.length>0 && viewMode==='timeline' && (
        <div className="timeline-wrap">
          {Object.entries(byProject).map(([proj,recs])=>(
            <div key={proj} className="timeline-project">
              <div className="timeline-project-name">{proj}</div>
              <div className="timeline-points">
                {recs.map((r,i)=>{
                  const rl = r.level ? levelByLabel(r.level) : (r.finalRisk != null ? riskLevel(r.finalRisk) : null);
                  // Quarter-over-quarter trend vs the previous assessment (Rec #10).
                  const prev = i>0 ? recs[i-1] : null;
                  const delta = (prev && prev.finalRisk!=null && r.finalRisk!=null) ? r.finalRisk - prev.finalRisk : null;
                  const dtxt = delta==null ? null : (delta>0?`▲ +${delta.toFixed(1)}`:delta<0?`▼ ${delta.toFixed(1)}`:'± 0.0');
                  const dcol = delta==null||delta===0 ? 'var(--text3)' : delta>0 ? '#D85A30' : '#1D9E75';
                  return (
                    <div key={r.id} className="timeline-point" style={{background:rl?rl.bg:'var(--bg2)',border:`1px solid ${rl?rl.border:'var(--border)'}`}} title={r.overrideActive?`Override: ${r.overrideJustification}`:r.notes||''}>
                      <div className="tp-date">{fmtDate(r.date)}</div>
                      <div className="tp-score" style={{color:rl?rl.text:'var(--text3)'}}>{r.finalRisk!=null?r.finalRisk.toFixed(1):'—'}</div>
                      <div className="tp-level" style={{color:rl?rl.text:'var(--text3)'}}>{rl?rl.label:'—'}{r.overrideActive?' ⚑':''}</div>
                      {dtxt && <div style={{fontSize:10,fontWeight:600,color:dcol}}>{dtxt}</div>}
                      <div className="tp-divider"/>
                      <div className="tp-calc-row"><button className="tp-detail-btn" onClick={()=>setDetail({type:'base',record:r})}>Base</button><span>{r.baseRisk!=null?r.baseRisk.toFixed(1):'—'}</span></div>
                      <div className="tp-calc-row"><button className="tp-detail-btn" onClick={()=>setDetail({type:'triton',record:r})}>TRITON</button><span>{r.tritonScore!=null?r.tritonScore.toFixed(1):'—'}</span></div>
                      <div className="tp-calc-row"><button className="tp-detail-btn" onClick={()=>setDetail({type:'mit',record:r})}>QA Process</button><span style={{fontSize:10,color:'var(--text3)'}}>QAEI</span></div>
                      <div className="tp-eval">by {r.evaluator}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {!loading && records.length>0 && viewMode==='table' && (
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Project</th><th>Final Risk</th><th>Level</th>
                <th>Base Risk</th><th>TRITON</th>
                <th>Override</th><th>Evaluator</th><th>Notes</th>
              </tr>
            </thead>
            <tbody>
              {records.map(r=>{
                const rl = r.level ? levelByLabel(r.level) : (r.finalRisk!=null?riskLevel(r.finalRisk):null);
                return (
                  <tr key={r.id}>
                    <td style={{color:'var(--text2)',whiteSpace:'nowrap'}}>{fmtDate(r.date)}</td>
                    <td style={{fontWeight:600}}>{r.project}</td>
                    <td style={{fontWeight:700,color:rl?rl.text:'var(--text3)'}}>{r.finalRisk!=null?r.finalRisk.toFixed(1):'—'}</td>
                    <td>{rl&&<span className="pill" style={{background:rl.bg,color:rl.text}}>{rl.label}</span>}</td>
                    <td style={{color:'var(--text2)'}}>{r.baseRisk!=null?r.baseRisk.toFixed(1):'—'}</td>
                    <td style={{color:'var(--text2)'}}>{r.tritonScore!=null?r.tritonScore.toFixed(1):'—'}</td>
                    <td style={{color:r.overrideActive?'var(--red-text)':'var(--text3)'}}>{r.overrideActive?'⚑ Yes':'—'}</td>
                    <td style={{color:'var(--text2)'}}>{r.evaluator}</td>
                    <td style={{color:'var(--text2)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.notes||'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      <HistoryDetailModal detail={detail} onClose={()=>setDetail(null)}
        onSaveRecord={updatedRecord => {
          // Persist to local store (already written inside TritonDetailBody; this
          // just keeps the in-memory view in sync without a full reload).
          setDetail(prev => prev ? {...prev, record: updatedRecord} : null);
          setLocalRefresh(n => n + 1);
        }}
        jiraHistory={jiraHistory} jiraMetrics={jiraMetrics} testMetrics={testMetrics}/>
    </div>
  );
}

// ── ConfigView — what the calculation is using right now, with plain meanings ──
function ConfigView({ jiraMetrics, jiraHistory }) {
  const curve = jiraMetrics?.tritonCurve || DEFAULT_CURVE;
  const sev = jiraMetrics?.severityWeights || DEFAULT_SEV_WEIGHTS;
  const mp = jiraMetrics?.modelParams || DEFAULT_MODEL_PARAMS;
  const cal = jiraMetrics?.calibration;
  const win = jiraMetrics?.window;
  const projData = jiraMetrics?.projects || {};
  const pct = v => `${Math.round(v*100)}%`;
  // Sensitivity (Rec #5): recompute each project's final at a given μ.
  const simFinal = (proj, muV) => {
    const w = projData[proj]?.escapedDefects?.weighted;
    if (w == null || !PROJECT_DEFAULTS[proj]) return null;
    const tri = tritonScore10(w, {...curve, mu: muV}, mp);
    return compute({...PROJECT_DEFAULTS[proj], escapedDefects: tri}, false, mp).finalRisk;
  };
  const muVariants = [Math.max(1, curve.mu-2), curve.mu, curve.mu+2];
  const fmtDay = s => { try { return new Date(s + (s && s.length===10?'T00:00:00':'')).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return s; } };

  const Row = ({k, v, meaning}) => (
    <div style={{display:'grid',gridTemplateColumns:'150px 70px 1fr',gap:10,alignItems:'baseline',padding:'6px 0',borderBottom:'.5px solid var(--border)'}}>
      <div style={{fontSize:12,fontWeight:600}}>{k}</div>
      <div style={{fontSize:12,fontWeight:700,color:'var(--purple)'}}>{v}</div>
      <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.45}}>{meaning}</div>
    </div>
  );
  const Group = ({title, badge, children}) => (
    <div className="card" style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div style={{fontSize:13,fontWeight:700}}>{title}</div>
        {badge && <span className="dim-badge" style={{background:'var(--bg2)',color:'var(--text2)',borderColor:'var(--border2)'}}>{badge}</span>}
      </div>
      {children}
    </div>
  );

  return (
    <div style={{maxWidth:760}}>
      <div className="helper" style={{marginBottom:14}}>
        These are the exact parameters the calculation is using right now. Scores are sourced from TRITON and computed with the model below; values marked as policy are team decisions, not auto-derived.
      </div>

      <Group title="Overview">
        <Row k="Model version" v={jiraMetrics?.modelVersion || '—'} meaning="Identifies the formula version, so historical assessments stay comparable when the model changes." />
        <Row k="Quarter" v={jiraMetrics?.quarter || '—'} meaning="Evaluation period." />
        <Row k="TRITON data" v={win?`${win.elapsedPct}%`:'—'} meaning={win?`Pulled ${fmtDay(win.from)} – ${fmtDay(win.to)}. The quarter is ${win.elapsedPct}% elapsed — early readings count fewer days, so treat them as partial.`:'Extraction window.'} />
        <Row k="Final scale" v="0–10" meaning="Final Risk runs 0 (none) to 10 (max). Levels: Low 0–5.0 · Medium 5.1–7.3 · High 7.4–10." />
      </Group>

      <Group title="Formula" badge="how the final is built">
        <div style={{fontFamily:'monospace',fontSize:12,background:'var(--bg2)',borderRadius:6,padding:'8px 10px',marginBottom:8}}>
          Final = Base × 0.40 + TRITON × 0.60
        </div>
        <div className="helper">Inherent product risk (Base, 40%) and objective production defects (TRITON, 60%). QA process quality is measured separately in the QA Effectiveness Index tab — it no longer modifies the Risk score. Manual Override forces Final = 10.</div>
      </Group>

      <Group title="Base Risk — inherent product risk" badge="40% of final">
        <Row k="User impact" v={pct(BASE_WEIGHTS.userImpact)} meaning="Business criticality & size of user base." />
        <Row k="Rate of change" v={pct(BASE_WEIGHTS.rateOfChange)} meaning="Release frequency / how fast the product moves." />
        <Row k="Complexity" v={pct(BASE_WEIGHTS.complexity)} meaning="Integrations, dependencies, system logic." />
        <div className="helper" style={{marginTop:6}}>Pre-loaded per project (1–3, mapped to 0–10); confirmed quarterly. Weights are within this group.</div>
      </Group>

      <Group title="TRITON Score — escaped defects curve" badge="60% of final">
        <Row k="μ (mu)" v={curve.mu} meaning="POLICY: the number of severity-weighted escaped defects/quarter treated as MEDIUM risk (5/10). The target you measure against — set by the team. Lower μ = stricter; higher μ = more lenient." />
        <Row k="σ (sigma)" v={curve.sigma} meaning="Spread: how quickly the score rises/falls around μ. Smaller = sharper separation between projects." />
        <Row k="Scale" v={`0–${curve.scaleMax||10}`} meaning="Curve output range." />
        <Row k="Curve type" v={mp.curveType||'gaussian'} meaning="Shape mapping weighted count → score. gaussian (bell) or logistic (S-curve). Score = scale × CDF((weightedCount − μ)/σ)." />
        <div style={{marginTop:8,marginBottom:4,fontSize:11,fontWeight:600,color:'var(--text2)'}}>Severity weights (each defect counts as):</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {Object.entries(sev).map(([p,w]) => (
            <span key={p} className="pill" style={{background:'var(--bg2)',color:'var(--text2)',border:'.5px solid var(--border2)'}}>{p} ×{w}</span>
          ))}
        </div>
        <div className="helper" style={{marginTop:6}}>Higher severity counts more (continuously) toward the weighted count that feeds the curve.</div>
      </Group>


      {muVariants && Object.keys(projData).some(p=>PROJECT_DEFAULTS[p]) && (
        <Group title="Sensitivity — how μ moves each project" badge="Rec #5">
          <div className="helper" style={{marginBottom:8}}>Final Risk if μ were set lower (stricter) or higher (lenient). Helps the team pick the anchor with eyes open.</div>
          <div style={{display:'grid',gridTemplateColumns:`1fr ${muVariants.map(()=>'70px').join(' ')}`,gap:6,fontSize:11.5}}>
            <div style={{fontWeight:600,color:'var(--text2)'}}>Project</div>
            {muVariants.map((m,i)=><div key={i} style={{fontWeight:600,textAlign:'center',color:m===curve.mu?'var(--purple)':'var(--text2)'}}>μ={m}{m===curve.mu?' ★':''}</div>)}
            {Object.keys(projData).filter(p=>PROJECT_DEFAULTS[p]).map(p=>(
              <React.Fragment key={p}>
                <div style={{padding:'3px 0'}}>{p}</div>
                {muVariants.map((m,i)=>{const f=simFinal(p,m);const rl=f!=null?riskLevel(f):null;return (
                  <div key={i} style={{textAlign:'center',padding:'3px 0',borderRadius:4,background:rl?rl.bg:'transparent',color:rl?rl.text:'var(--text3)',fontWeight:m===curve.mu?700:500}}>{f!=null?f.toFixed(1):'—'}</div>
                );})}
              </React.Fragment>
            ))}
          </div>
        </Group>
      )}

      {jiraHistory?.projects && (
        <Group title="TRITON history (backfilled)" badge="Rec #5/#8">
          <div className="helper" style={{marginBottom:8}}>Escaped-defect TRITON score per quarter, reconstructed from Jira with this methodology. Used to validate the anchor and watch trends — informational, not the official score.</div>
          <div style={{display:'grid',gridTemplateColumns:`1fr ${(jiraHistory.quarters||[]).map(()=>'66px').join(' ')}`,gap:6,fontSize:11.5}}>
            <div style={{fontWeight:600,color:'var(--text2)'}}>Project</div>
            {(jiraHistory.quarters||[]).map(qq=><div key={qq} style={{fontWeight:600,textAlign:'center',color:'var(--text2)'}}>{qq.replace('-'," ")}</div>)}
            {Object.entries(jiraHistory.projects).map(([p,qd])=>(
              <React.Fragment key={p}>
                <div style={{padding:'3px 0'}}>{p}</div>
                {(jiraHistory.quarters||[]).map(qq=>{const c=qd[qq];const s=c?c.tritonScore:null;const rl=s!=null?riskLevel(s):null;return (
                  <div key={qq} style={{textAlign:'center',padding:'3px 0',borderRadius:4,background:rl?rl.bg:'transparent',color:rl?rl.text:'var(--text3)'}}>{s!=null?s.toFixed(1):'—'}</div>
                );})}
              </React.Fragment>
            ))}
          </div>
          {jiraHistory.calibrationStats && <div className="helper" style={{marginTop:8}}>Calibration check: across {jiraHistory.calibrationStats.n} real values, median {jiraHistory.calibrationStats.median} / mean {jiraHistory.calibrationStats.mean} → μ={curve.mu} sits near the center (anchor validated). Note the quarter-to-quarter volatility — read the trend, not a single point.</div>}
        </Group>
      )}

      {jiraHistory?.projects && (
        <Group title="Defect density (informational — NOT scored)" badge="Rec #1">
          <div className="helper" style={{marginBottom:8}}>Weighted escaped defects per 100 delivered items (Done Story/Bug), per project vs its own history. Does <strong>not</strong> affect the score — cross-team density isn't comparable, so this is each project against itself, building toward the Q4 decision.</div>
          <div style={{display:'grid',gridTemplateColumns:`1fr ${(jiraHistory.quarters||[]).map(()=>'66px').join(' ')}`,gap:6,fontSize:11.5}}>
            <div style={{fontWeight:600,color:'var(--text2)'}}>Project</div>
            {(jiraHistory.quarters||[]).map(qq=><div key={qq} style={{fontWeight:600,textAlign:'center',color:'var(--text2)'}}>{qq.replace('-'," ")}</div>)}
            {Object.entries(jiraHistory.projects).map(([p,qd])=>(
              <React.Fragment key={p}>
                <div style={{padding:'3px 0'}}>{p}</div>
                {(jiraHistory.quarters||[]).map(qq=>{const c=qd[qq];const d=c?c.density:null;return (
                  <div key={qq} style={{textAlign:'center',padding:'3px 0',color:'var(--text2)'}}>{d!=null?d:(c&&c.delivered===0?'n/a':'—')}</div>
                );})}
              </React.Fragment>
            ))}
          </div>
          <div className="helper" style={{marginTop:8}}>⚠ <strong>Mira</strong> shows <code>n/a</code> — its delivery isn't logged under MIRA Story/Bug (denominator ≈ 0), so density is undefined for it. That denominator must be fixed before density is usable for Mira. GenAI Lens, Mira Studio and Mobile have a usable per-project trend.</div>
        </Group>
      )}

      <Group title="Calibration cadence" badge="Rec #5">
        <Row k="Last reviewed" v={cal?.lastReviewed||'—'} meaning="When μ/σ were last set/validated." />
        <Row k="Next review" v={cal?.nextReview||'—'} meaning="μ/σ are anchored and reviewed on a cadence (not per quarter) so scores stay comparable over time." />
        <div className="helper" style={{marginTop:6}}>{cal?.basis ? `Basis: ${cal.basis}.` : ''} Recompute the basis from accumulated history once ≥4 quarters exist.</div>
      </Group>

      <Group title="Exposure normalization (defect density)" badge={jiraMetrics?.exposureEnabled ? 'ON' : 'OFF'}>
        <div className="helper">
          {jiraMetrics?.exposureEnabled
            ? 'Active: escaped defects are normalized by delivery volume (defects per unit shipped).'
            : 'Disabled. Cross-team density isn’t viable yet — delivered-volume counts vary too much by team (verified: 31× spread). The workable path is per-project trend (each project vs its own history) once enough quarters accrue. See scripts/jira-projects.json → exposure.'}
        </div>
      </Group>
    </div>
  );
}

// ── QAEffectivenessView ───────────────────────────────────────────────────────
function QAEffectivenessView({ jiraMetrics }) {
  const mp = jiraMetrics?.modelParams || DEFAULT_MODEL_PARAMS;
  const [visibleProjects, setVisibleProjects] = useState(new Set(PROJECTS));

  const toggleProject = proj =>
    setVisibleProjects(s => { const n = new Set(s); n.has(proj) ? n.delete(proj) : n.add(proj); return n; });

  const projectData = PROJECTS.map(proj => {
    const de       = jiraMetrics?.projects?.[proj]?.detectionEfficiency;
    const defaults = PROJECT_DEFAULTS[proj] || {};
    const result   = de ? computeQAEI(de.rate, defaults, mp) : null;
    const ql       = result ? qaLevel(result.qaei) : null;
    return { proj, de, defaults, result, ql };
  });

  const ScoreBar = ({ value, max = 10, color, dim }) => (
    <div style={{height:8, background:'var(--bg3)', borderRadius:4, opacity: dim ? 0.5 : 1}}>
      <div style={{height:8, width:`${Math.min(100, (value / max) * 100)}%`, background:color||'var(--teal)', borderRadius:4, transition:'width .4s'}}/>
    </div>
  );

  const docs = jiraMetrics?.docs || {};

  return (
    <div>
      {/* Header */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <div style={{fontSize:13, fontWeight:700}}>QA Effectiveness Index (QAEI)</div>
          <span className="dim-badge" style={{background:'var(--blue-bg)', color:'var(--blue-text)', borderColor:'var(--blue-border)'}}>Q3 2026 · Phase 1 of 2</span>
        </div>
        <div className="helper" style={{lineHeight:1.7}}>
          Measures the value QA adds independently of product complexity or user base size.
          A product can score <strong>High Risk</strong> and <strong>Excellent QA</strong> simultaneously — they answer different questions.
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginTop:10}}>
          <div style={{fontSize:11, background:'var(--bg2)', borderRadius:6, padding:'8px 10px', border:'.5px solid var(--border)'}}>
            <div style={{fontWeight:700, marginBottom:4}}>
              Formula — Q3 2026
              {docs.qaeiMethodology && <a href={docs.qaeiMethodology} target="_blank" rel="noreferrer" style={{fontSize:10, color:'var(--purple)', marginLeft:8, fontWeight:400}}>Metodología ↗</a>}
            </div>
            <code style={{fontSize:10, display:'block', lineHeight:1.6, color:'var(--text2)'}}>
              QAEI = DCE × 0.65 + Process Maturity × 0.35
            </code>
            <div style={{fontSize:10, color:'var(--text3)', marginTop:4}}>
              <strong>DCE</strong> — bugs caught by QA (staging + production) as % of all known bugs<br/>
              <strong>Process Maturity</strong> — automation, coverage, testability
              {docs.dceReference && <><br/><a href={docs.dceReference} target="_blank" rel="noreferrer" style={{color:'var(--purple)'}}>Referencia DCE ↗</a></>}
              {docs.riskBaselineConfluence && <><br/><a href={docs.riskBaselineConfluence} target="_blank" rel="noreferrer" style={{color:'var(--purple)'}}>QA Risk Baseline Confluence ↗</a></>}
            </div>
          </div>
          <div style={{fontSize:11, background:'var(--bg2)', borderRadius:6, padding:'8px 10px', border:'.5px solid var(--border)'}}>
            <div style={{fontWeight:700, marginBottom:4}}>Phase 2 — Q4 2026</div>
            <code style={{fontSize:10, display:'block', lineHeight:1.6, color:'var(--text3)'}}>
              QAEI = DCE × 0.50 + Trend × 0.30 + Process × 0.20
            </code>
            <div style={{fontSize:10, color:'var(--text3)', marginTop:4}}>
              Trend (quarter-over-quarter improvement) requires 2 consecutive real quarters of data. Unlocks after Q3 closes.
            </div>
          </div>
        </div>
      </div>

      {/* Project filter */}
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          <span style={{fontSize:12, fontWeight:600, color:'var(--text2)', flexShrink:0}}>Mostrar proyectos:</span>
          {PROJECTS.map(proj => {
            const visible = visibleProjects.has(proj);
            const pd = projectData.find(p => p.proj === proj);
            const ql = pd?.ql;
            return (
              <button key={proj} onClick={() => toggleProject(proj)}
                style={{fontSize:12, padding:'5px 14px', borderRadius:20, cursor:'pointer', fontFamily:'inherit',
                  fontWeight: visible ? 600 : 400,
                  border: visible ? `1.5px solid ${ql?.border||'var(--purple)'}` : '.5px solid var(--border)',
                  background: visible ? (ql?.bg||'var(--bg2)') : 'transparent',
                  color: visible ? (ql?.text||'var(--purple)') : 'var(--text3)',
                  transition:'all .15s'}}>
                {proj}
              </button>
            );
          })}
          {visibleProjects.size < PROJECTS.length && (
            <button onClick={() => setVisibleProjects(new Set(PROJECTS))}
              style={{fontSize:11, padding:'4px 12px', borderRadius:20, cursor:'pointer', fontFamily:'inherit',
                border:'.5px solid var(--border)', background:'transparent', color:'var(--text3)'}}>
              Mostrar todos
            </button>
          )}
        </div>
      </div>

      {/* Project cards */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(480px, 1fr))', gap:16, marginBottom:16}}>
        {projectData.filter(p => visibleProjects.has(p.proj)).map(({ proj, de, defaults, result, ql }) => (
          <div key={proj} className="card" style={{
            border: ql ? `1.5px solid ${ql.border}` : '1px solid var(--border)',
            background: ql ? `${ql.bg}cc` : 'var(--bg2)',
          }}>
            {/* Card header */}
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14}}>
              <div style={{fontWeight:700, fontSize:16}}>{proj}</div>
              {ql
                ? <span className="pill" style={{background:ql.bg, color:ql.text, border:`1px solid ${ql.border}`, fontWeight:600, fontSize:12}}>{ql.label}</span>
                : <span className="pill" style={{background:'var(--bg3)', color:'var(--text3)', border:'.5px solid var(--border)', fontSize:12}}>No data</span>}
            </div>

            {/* Score + breakdown */}
            <div style={{display:'flex', alignItems:'flex-start', gap:16, marginBottom:14}}>
              {/* Big number */}
              <div style={{textAlign:'center', flexShrink:0, minWidth:64}}>
                <div style={{fontSize:38, fontWeight:700, lineHeight:1, color:ql?.text||'var(--text3)'}}>
                  {result ? result.qaei.toFixed(1) : '—'}
                </div>
                <div style={{fontSize:11, color:ql?.text||'var(--text3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.05em', marginTop:2}}>/ 10</div>
              </div>

              {/* Bars */}
              <div style={{flex:1}}>
                {/* DCE */}
                <div style={{marginBottom:12}}>
                  <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                    <span style={{color:'var(--text2)'}}>Defect Containment <span style={{fontWeight:700, color:'var(--text)'}}>65%</span></span>
                    <span style={{fontWeight:700, color: de ? ql?.text||'var(--text)' : 'var(--text3)'}}>
                      {de ? `${de.rate}%` : '—'}
                    </span>
                  </div>
                  <ScoreBar value={de?.rate||0} max={100} color={ql?.border||'var(--border2)'}/>
                  {de && (
                    <div style={{fontSize:11, color:'var(--text3)', marginTop:4}}>
                      {(() => {
                        const preP = de.preProductionCaught ?? 0;
                        const parts = [];
                        if (preP > 0) parts.push(`${preP} pre-prod`);
                        if (de.internallyFound > 0) parts.push(`${de.internallyFound} escaped`);
                        parts.push(`${de.customerFound} customer`);
                        return `${parts.join(' + ')} · score ${result?.dceScore?.toFixed(1)||'—'}/10`;
                      })()}
                    </div>
                  )}
                </div>

                {/* Process Maturity */}
                <div style={{marginBottom:12}}>
                  <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                    <span style={{color:'var(--text2)'}}>Process Maturity <span style={{fontWeight:700, color:'var(--text)'}}>35%</span></span>
                    <span style={{fontWeight:700, color:'var(--text)'}}>
                      {result?.pmScore != null ? `${result.pmScore.toFixed(1)}/10` : '—'}
                    </span>
                  </div>
                  <ScoreBar value={result?.pmScore||0} max={10} color='var(--teal)' dim={true}/>
                  <div style={{fontSize:11, color:'var(--text3)', marginTop:4}}>
                    Auto {defaults.automationConfidence||'—'}/3 · Coverage {defaults.testCoverage||'—'}/5 · Testability {defaults.testability||'—'}/3
                  </div>
                </div>

                {/* Trend */}
                <div>
                  <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:4}}>
                    <span style={{color:'var(--text3)'}}>Trend (Q4+) <span style={{fontWeight:700}}>—</span></span>
                    <span style={{color:'var(--text3)', fontStyle:'italic', fontSize:11}}>Available Q4 2026</span>
                  </div>
                  <ScoreBar value={0} max={10} color='var(--border2)' dim={true}/>
                </div>
              </div>
            </div>

            {/* DCE interpretation */}
            {de && (
              <div style={{borderTop:'.5px solid var(--border)', paddingTop:10, fontSize:12, color:'var(--text2)', lineHeight:1.6}}>
                {de.rate >= 80
                  ? '✓ World-class containment — QA catches most bugs before customers, in staging and production.'
                  : de.rate >= 50
                  ? '~ About half of known bugs are caught by QA — room to grow pre-production detection.'
                  : de.rate > 0
                  ? '⚠ Most bugs reach customers first — increase usage of known and escaped labels in dev boards.'
                  : '⚠ No pre-production or internal catches found — verify known/escaped label usage in dev boards.'}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Industry benchmarks + methodology */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
        <div className="card">
          <div style={{fontSize:12, fontWeight:700, marginBottom:4}}>DCE Industry Benchmarks</div>
          <div style={{fontSize:11, color:'var(--text3)', marginBottom:8}}>Defect Containment Effectiveness — Capers Jones / IEEE / Atlassian</div>
          {[
            { range:'≥ 80%', label:'World-class', ...QA_LEVELS[3] },
            { range:'50–79%', label:'Effective', ...QA_LEVELS[2] },
            { range:'< 50%', label:'Needs improvement', ...QA_LEVELS[0] },
          ].map(b => (
            <div key={b.range} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'5px 0', borderBottom:'.5px solid var(--border)'}}>
              <span className="pill" style={{background:b.bg, color:b.text, border:`1px solid ${b.border}`}}>{b.label}</span>
              <span style={{fontSize:11, color:'var(--text2)', fontWeight:600}}>{b.range} of bugs caught internally</span>
            </div>
          ))}
        </div>

        <div className="card">
          <div style={{fontSize:12, fontWeight:700, marginBottom:8}}>What to improve first</div>
          {projectData.filter(p => p.de).sort((a,b) => (a.result?.qaei||0) - (b.result?.qaei||0)).map(({ proj, de, result, ql }) => (
            <div key={proj} style={{display:'flex', alignItems:'center', gap:8, padding:'5px 0', borderBottom:'.5px solid var(--border)'}}>
              <span style={{fontSize:11, fontWeight:600, minWidth:110}}>{proj}</span>
              <div style={{flex:1, height:5, background:'var(--bg3)', borderRadius:3}}>
                <div style={{height:5, width:`${Math.min(100, (result?.qaei||0) * 10)}%`, background:ql?.border||'var(--border)', borderRadius:3}}/>
              </div>
              <span style={{fontSize:11, fontWeight:700, color:ql?.text||'var(--text3)', minWidth:26, textAlign:'right'}}>
                {result?.qaei?.toFixed(1)||'—'}
              </span>
            </div>
          ))}
          <div className="helper" style={{marginTop:8}}>
            DCE improves by labeling bugs with <code>known</code> (staging catches, strongest signal) and <code>escaped</code> (production catches before customer reports) on dev boards. Process Maturity improves through automation and coverage growth.
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('assess');
  const [historyRefresh, setHistoryRefresh] = useState(0);
  const [jiraMetrics, setJiraMetrics] = useState(null);
  const [jiraHistory, setJiraHistory] = useState(null);
  const [testMetrics, setTestMetrics] = useState(null);

  // Load Jira metrics once; shared by the header period label and the assessment.
  useEffect(() => {
    fetch('./jira-history.json', {cache:'no-store'}).then(r=>r.ok?r.json():null).then(setJiraHistory).catch(()=>setJiraHistory(null));
    fetch('./jira-metrics.json', {cache:'no-store'})
      .then(r => r.ok ? r.json() : null)
      .then(setJiraMetrics)
      .catch(() => setJiraMetrics(null));
    fetch('./test-metrics.json', {cache:'no-store'})
      .then(r => r.ok ? r.json() : null)
      .then(setTestMetrics)
      .catch(() => setTestMetrics(null));
  }, []);

  const fmtDay = s => { try { return new Date(s + (s.length===10?'T00:00:00':'')).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return s; } };
  const w = jiraMetrics?.window;
  const periodText = w ? `TRITON data: ${fmtDay(w.from)} – ${fmtDay(w.to)}` : 'shared via data.json';

  return (
    <div>
      <div className="header">
        <div className="header-left">
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <span className="header-logo">Meltwater</span>
            <span className="header-divider">/</span>
            <span style={{fontSize:12,color:'var(--text2)'}}>Mira &amp; GenAI QA</span>
          </div>
          <h1>QA Risk Baseline</h1>
          <p>Q3 2026 model · {periodText}</p>
        </div>
        <div className="nav-tabs">
          <button className={`nav-tab${tab==='assess'?' active':''}`} onClick={()=>setTab('assess')}>Risk Index</button>
          <button className={`nav-tab${tab==='history'?' active':''}`} onClick={()=>setTab('history')}>History</button>
          <button className={`nav-tab${tab==='qa'?' active':''}`} onClick={()=>setTab('qa')}>QA Effectiveness</button>
          <button className={`nav-tab${tab==='config'?' active':''}`} onClick={()=>setTab('config')}>Model</button>
        </div>
      </div>
      {tab==='assess' && <AssessView jiraMetrics={jiraMetrics} testMetrics={testMetrics}/>}
      {tab==='history' && <HistoryView refreshKey={historyRefresh} jiraHistory={jiraHistory} jiraMetrics={jiraMetrics} testMetrics={testMetrics}/>}
      {tab==='qa' && <QAEffectivenessView jiraMetrics={jiraMetrics}/>}
      {tab==='config' && <ConfigView jiraMetrics={jiraMetrics} jiraHistory={jiraHistory}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
