<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f4f0;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6a64;--text3:#9c9a92;

<body>
<div class="container" id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

// ── Storage ──────────────────────────────────────────────────────────────────
// Shared assessments live in the committed ./data.json (visible to everyone).
// Local additions are kept in localStorage until exported and committed to the repo.
const STORAGE_KEY = 'qa-risk-assessments-v2';
const DATA_URL = './data.json';

function loadLocalAssessments() {
  try { const r = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); return Array.isArray(r)?r:[]; }
  catch { return []; }
}

async function fetchSharedAssessments() {
  try {
    const res = await fetch(DATA_URL, {cache:'no-store'});
    if (!res.ok) return [];
    const r = await res.json();
    return Array.isArray(r) ? r : [];
  } catch { return []; }
}

// Merge shared (data.json) + local (localStorage) by id; local wins on conflict.
async function loadAssessments() {
  const [shared, local] = [await fetchSharedAssessments(), loadLocalAssessments()];
  const byId = new Map();
  shared.forEach(r => byId.set(r.id, r));
  local.forEach(r => byId.set(r.id, r));
  return [...byId.values()];
}

function saveAssessment(record) {
  const all = loadLocalAssessments(); all.push(record);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

// Download the full merged set as data.json so it can be committed to the repo.
function exportAssessments(records) {
  const sorted = [...records].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const blob = new Blob([JSON.stringify(sorted, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Model ─────────────────────────────────────────────────────────────────────
const PROJECTS = ['GenAI Lens','Mira Studio','Mira','Mobile'];

// Project defaults map
const PROJECT_DEFAULTS = {
  'GenAI Lens': { userImpact:3, rateOfChange:3, complexity:3, testability:2, testCoverage:1, automationConfidence:1 },
  'Mira Studio': { userImpact:3, rateOfChange:3, complexity:3, testability:2, testCoverage:1, automationConfidence:1 },
  'Mira':        { userImpact:3, rateOfChange:2, complexity:2, testability:2, testCoverage:2, automationConfidence:2 },
  'Mobile':      { userImpact:2, rateOfChange:2, complexity:2, testability:2, testCoverage:1, automationConfidence:1 },
};

// Criteria definitions
const BASE_RISK_CRITERIA = [
  { id:'userImpact', label:'User impact', inputType:'auto',
    description:'Business criticality and size of user base. Pre-loaded — update only if product scope changes.',
    options:[{score:1,label:'Low',detail:'Internal tool or low traffic'},{score:2,label:'Medium',detail:'Affects a subset of users'},{score:3,label:'High',detail:'Core product, wide user base'}] },
  { id:'rateOfChange', label:'Rate of change', inputType:'auto',
    description:'Release frequency and sprint delivery cadence. Pre-loaded — update if cadence changes significantly.',
    options:[{score:1,label:'Stable',detail:'Rarely updated'},{score:2,label:'Moderate',detail:'Updated every few weeks'},{score:3,label:'Rapid',detail:'Updated weekly or more'}] },
  { id:'complexity', label:'Complexity', inputType:'auto',
    description:'Integrations, dependencies, and system logic. Pre-loaded — update only after major architectural changes.',
    options:[{score:1,label:'Low',detail:'Simple flows, few integrations'},{score:2,label:'Medium',detail:'Some complex flows or integrations'},{score:3,label:'High',detail:'Many dependencies, complex logic'}] },
];

const TRITON_CRITERIA = [
  { id:'escapedDefects', label:'Escaped defects', inputType:'jira',
    description:'TRITON Defects this quarter (service requests excluded), scored 0–10 on an anchored Gaussian curve. Severity overrides volume: P1/P2 tickets raise the floor. Sourced automatically from TRITON; the options below are only a manual fallback for unmapped projects.',
    // Manual-fallback options on the 0–10 scale (used only when no Jira data).
    options:[
      {score:2,label:'Low',detail:'Few escaped defects this quarter'},
      {score:5,label:'Medium',detail:'A moderate number of escaped defects'},
      {score:9,label:'High',detail:'Many escaped defects, or critical (P1/P2) present'},
    ] },
];

const MITIGATION_CRITERIA = [
  { id:'automationConfidence', label:'Automation confidence', inputType:'confirm',
    description:'How reliably automated tests would catch a regression in critical user flows. Review each quarter.',
    options:[{score:1,label:'Low',detail:'Major flows rely on manual testing'},{score:2,label:'Medium',detail:'Partial coverage or some gaps'},{score:3,label:'High',detail:'Critical flows covered reliably'}] },
  { id:'testCoverage', label:'Test coverage', inputType:'confirm',
    description:'Combined automated + manual coverage across critical flows. Review each quarter.',
    options:[{score:1,label:'<40%',detail:'Low coverage'},{score:2,label:'40–70%',detail:'Medium coverage'},{score:3,label:'>70%',detail:'High coverage'}] },
  { id:'testability', label:'Testability', inputType:'confirm',
    description:'How easy it is to write and maintain meaningful tests. Structural — confirm quarterly.',
    options:[{score:1,label:'Hard',detail:'Poor structure, hard to isolate'},{score:2,label:'Moderate',detail:'Some friction, partial test support'},{score:3,label:'Easy',detail:'Good structure, test hooks available'}] },
  { id:'avgAgeOpenIssues', label:'Avg. age of open issues', inputType:'jira',
    description:'Average days since creation for unresolved TRITON issues linked to this project at end of quarter.',
    options:[{score:1,label:'Slow',detail:'31+ days average'},{score:2,label:'Moderate',detail:'8–30 days average'},{score:3,label:'Fast',detail:'0–7 days average'}] },
];

// Weights
const BASE_WEIGHTS  = { userImpact:0.40, rateOfChange:0.35, complexity:0.25 };
const MIT_WEIGHTS   = { automationConfidence:0.35, testCoverage:0.30, testability:0.20, avgAgeOpenIssues:0.15 };

// Mitigation multiplier: strong (all 3) → 0.70, weak (all 1) → 1.10
function mitigationMultiplier(mitScore) {
  // Linear mapping: score 1 → 1.10, score 3 → 0.70
  return 1.10 - ((mitScore - 1) / 2) * 0.40;
}

// TRITON escaped-defect score on a 0–10 scale via an anchored Gaussian curve
// (mirrors scripts/fetch-jira-metrics.mjs). Used to recompute the score live when
// an engineer manually excludes a ticket. Curve params come from jira-metrics.json.
const DEFAULT_CURVE = { mu: 6, sigma: 3, severityFloor1: 5, severityFloor2: 8.5, scaleMax: 10 };
function normalCDF(z) {
  const t = 1 / (1 + 0.3275911 * Math.abs(z / Math.SQRT2));
  const y = 1 - (((((1.061405429*t - 1.453152027)*t) + 1.421413741)*t - 0.284496736)*t + 0.254829592) * t * Math.exp(-(z/Math.SQRT2)*(z/Math.SQRT2));
  const erf = z >= 0 ? y : -y;
  return 0.5 * (1 + erf);
}
function tritonScore10(total, critical, curve) {
  const { mu, sigma, severityFloor1 = 0, severityFloor2 = 0, scaleMax = 10 } = curve || DEFAULT_CURVE;
  const c = scaleMax * normalCDF((total - mu) / sigma);
  const floor = critical >= 2 ? severityFloor2 : critical >= 1 ? severityFloor1 : 0;
  return Math.round(Math.max(c, floor) * 10) / 10;
}

function wavg(criteria, weights, scores) {
  const filled = criteria.filter(c => scores[c.id] != null);
  if (!filled.length) return null;
  const tw = filled.reduce((s,c) => s + weights[c.id], 0);
  return filled.reduce((s,c) => s + scores[c.id] * weights[c.id], 0) / tw;
}

const SCALE_MAX = 10;
// Map a 1–3 weighted-average (manual criteria) onto the 0–10 scale.
const to10 = v => v == null ? null : (v - 1) / 2 * SCALE_MAX;

function compute(scores, overrideActive) {
  if (overrideActive) return { baseRisk:null, tritonScore:(scores.escapedDefects ?? null), mitScore:null, multiplier:null, finalRisk:SCALE_MAX, overridden:true };
  const base10     = to10(wavg(BASE_RISK_CRITERIA, BASE_WEIGHTS, scores));
  const tritonScore = scores.escapedDefects ?? null; // already on the 0–10 scale
  const mitScore   = wavg(MITIGATION_CRITERIA, MIT_WEIGHTS, scores);
  if (base10 == null && tritonScore == null) return { baseRisk:null, tritonScore:null, mitScore:null, multiplier:null, finalRisk:null, overridden:false };
  const combined = ((base10||0) * 0.40) + ((tritonScore||0) * 0.60);
  const multiplier = mitScore ? mitigationMultiplier(mitScore) : 1.0;
  const finalRisk = Math.min(SCALE_MAX, combined * multiplier);
  return { baseRisk:base10, tritonScore, mitScore, multiplier, finalRisk, overridden:false };
}

// 0–10 scale (linear rescale of the previous 1.5 / 2.2 thresholds × 10/3).
const LEVELS = [
  {max:5.0, label:'Low',    text:'#085041', bg:'#E1F5EE', border:'#1D9E75'},
  {max:7.3, label:'Medium', text:'#633806', bg:'#FAEEDA', border:'#BA7517'},
  {max:Infinity, label:'High', text:'#712B13', bg:'#FAECE7', border:'#D85A30'},
];
const riskLevel = s => LEVELS.find(l => s <= l.max);
const levelByLabel = lbl => LEVELS.find(l => l.label === lbl);

// Option colors by criterion type
const RISK_COLORS   = {1:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'},2:{bg:'#FAEEDA',border:'#BA7517',text:'#633806'},3:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'}};
const MIT_COLORS    = {1:{bg:'#FAECE7',border:'#D85A30',text:'#712B13'},2:{bg:'#FAEEDA',border:'#BA7517',text:'#633806'},3:{bg:'#E1F5EE',border:'#1D9E75',text:'#085041'}};
const NEUTRAL_COLORS= {1:{bg:'#E8F0FE',border:'#4A6FA5',text:'#1a3a6b'},2:{bg:'#E8F0FE',border:'#4A6FA5',text:'#1a3a6b'},3:{bg:'#E8F0FE',border:'#4A6FA5',text:'#1a3a6b'}};

// ── CriterionCard ─────────────────────────────────────────────────────────────
function CriterionCard({ criterion, score, onScore, colorMap, weightPct, autoLoaded, reverseOptions, locked, lockedNote }) {
  const inputTypeLabel = criterion.inputType === 'auto' ? 'Auto' : criterion.inputType === 'confirm' ? 'Confirm' : 'Jira';
  const inputTagClass  = criterion.inputType === 'auto' ? 'auto-tag' : criterion.inputType === 'confirm' ? 'confirm-tag' : 'auto-tag';
  // Display order only — score values stay attached to each option.
  // Reversed so green (lower final risk) is always leftmost, red rightmost, across all sections.
  const orderedOptions = reverseOptions ? [...criterion.options].reverse() : criterion.options;
  return (
    <div className={`criterion-card ${score != null ? 'filled' : 'empty'} ${autoLoaded ? 'auto-loaded' : ''}`}>
      <div className="criterion-top">
        <div className="criterion-name">{criterion.label}</div>
        <div className="criterion-meta">
          {weightPct && <span style={{fontSize:11,color:'var(--text2)'}}>{weightPct}</span>}
          <span className={inputTagClass}>{locked ? '🔒 Jira' : inputTypeLabel}</span>
        </div>
      </div>
      <div className="criterion-desc">{criterion.description}</div>
      <div className="options-row">
        {orderedOptions.map(o => {
          const sel = score === o.score;
          const col = colorMap[o.score];
          // When locked (value sourced from Jira), only the selected option is shown
          // and it is not clickable — it's read-only data, not a choice.
          if (locked && !sel) return null;
          return (
            <button key={o.score} className="opt-btn" disabled={locked} onClick={() => !locked && onScore(criterion.id, o.score)}
              style={{cursor: locked ? 'default' : 'pointer', border: sel ? `1.5px solid ${col.border}` : '.5px solid var(--border)', background: sel ? col.bg : 'transparent', color: sel ? col.text : 'var(--text2)', fontWeight: sel ? 600 : 400}}>
              {o.label} <span style={{opacity:.75}}>· {o.detail}</span>
            </button>
          );
        })}
      </div>
      {locked && lockedNote && <div style={{fontSize:10.5,color:'var(--text3)',marginTop:6}}>{lockedNote}</div>}
    </div>
  );
}

// ── AssessView ────────────────────────────────────────────────────────────────
function AssessView({ onSaved, jiraMetrics }) {
  const [project, setProject] = useState('');
  const [customProject, setCustomProject] = useState('');
  const [evaluator, setEvaluator] = useState('');
  const [notes, setNotes] = useState('');
  const [scores, setScores] = useState({});
  const [overrideActive, setOverrideActive] = useState(false);
  const [overrideJustification, setOverrideJustification] = useState('');
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const [excludedKeys, setExcludedKeys] = useState({}); // manually excluded escaped-defect tickets
  const [showTickets, setShowTickets] = useState(false);

  const finalProject = project === '__custom__' ? customProject.trim() : project;

  // The "Jira" criteria — pre-loaded and locked from jira-metrics.json when available.
  const JIRA_IDS = ['escapedDefects', 'avgAgeOpenIssues'];
  const jiraProject = (jiraMetrics && finalProject) ? jiraMetrics.projects?.[finalProject] : null;
  const jiraScore = id => jiraProject?.[id]?.score;
  const isJiraLocked = c => c.inputType === 'jira' && jiraScore(c.id) != null;
  const fmtUpdated = iso => { try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); } catch { return ''; } };

  // Escaped-defect tickets + manual exclusions → effective counts and score.
  const escapedTickets = jiraProject?.escapedDefects?.tickets || [];
  const activeEscaped = escapedTickets.filter(t => !excludedKeys[t.key]);
  const excludedCount = escapedTickets.length - activeEscaped.length;
  const escTotalEff = activeEscaped.length;
  const escCritEff = activeEscaped.filter(t => t.critical).length;
  const escScoreEff = escapedTickets.length ? tritonScore10(escTotalEff, escCritEff, jiraMetrics?.tritonCurve) : jiraScore('escapedDefects');

  const jiraNote = id => {
    if (!jiraProject) return null;
    const upd = jiraMetrics.generatedAt ? ` · updated ${fmtUpdated(jiraMetrics.generatedAt)}` : '';
    const mr = jiraProject.needsManualReview;
    if (id === 'escapedDefects') {
      const exc = excludedCount ? ` · ${excludedCount} excluded` : '';
      const warn = mr?.escaped ? ` ⚠ ${mr.escaped} unlinked need manual review` : '';
      return `From TRITON · ${escTotalEff} escaped defect${escTotalEff!==1?'s':''} (${escCritEff} critical) this quarter${exc}${upd}${warn}`;
    }
    if (id === 'avgAgeOpenIssues') {
      const d = jiraProject.avgAgeOpenIssues;
      const warn = mr?.open ? ` ⚠ ${mr.open} unlinked need manual review` : '';
      const core = d.openCount === 0 ? `From TRITON · no open defects${upd}` : `From TRITON · ${d.openCount} open · avg ${d.avgDays}d${upd}`;
      return core + warn;
    }
    return null;
  };

  // Load defaults + overlay Jira scores when project (or Jira data) changes.
  useEffect(() => {
    const base = (finalProject && PROJECT_DEFAULTS[finalProject]) ? {...PROJECT_DEFAULTS[finalProject]} : {};
    const jp = (jiraMetrics && finalProject) ? jiraMetrics.projects?.[finalProject] : null;
    if (jp) {
      for (const id of JIRA_IDS) {
        if (jp[id]?.score != null) base[id] = jp[id].score;
      }
    }
    setScores(base);
    setExcludedKeys({});
    setShowTickets(false);
    setOverrideActive(false);
    setOverrideJustification('');
  }, [finalProject, jiraMetrics]);

  // Keep the escaped-defects score in sync with manual ticket exclusions.
  useEffect(() => {
    if (!escapedTickets.length) return;
    setScores(s => s.escapedDefects === escScoreEff ? s : ({...s, escapedDefects: escScoreEff}));
  }, [escScoreEff, escapedTickets.length]);

  const setScore = (id, val) => setScores(s => ({...s, [id]: val}));
  const toggleExclude = key => setExcludedKeys(m => ({...m, [key]: !m[key]}));

  const allCriteria = [...BASE_RISK_CRITERIA, ...TRITON_CRITERIA, ...MITIGATION_CRITERIA];
  const filledCount = allCriteria.filter(c => scores[c.id] != null).length;
  const pct = Math.round(filledCount / allCriteria.length * 100);

  const result = compute(scores, overrideActive);
  const rl = result.finalRisk != null ? riskLevel(result.finalRisk) : null;

  const canSave = filledCount === allCriteria.length && evaluator.trim() && finalProject &&
    (!overrideActive || overrideJustification.trim().length > 0);

  const showToast = (msg, type='success') => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const handleSave = () => {
    if (!canSave) return;
    setSaving(true);
    try {
      const record = {
        id: `${Date.now()}`,
        date: new Date().toISOString(),
        project: finalProject,
        evaluator: evaluator.trim(),
        scores,
        overrideActive,
        overrideJustification: overrideJustification.trim(),
        baseRisk: result.baseRisk,
        tritonScore: result.tritonScore,
        mitScore: result.mitScore,
        multiplier: result.multiplier,
        finalRisk: result.finalRisk,
        level: rl?.label || '',
        scaleMax: 10,
        notes: notes.trim(),
        // Snapshot of the Jira-sourced inputs for transparency / auditability,
        // including any tickets the engineer manually excluded.
        jira: jiraProject ? {
          source: 'TRITON', quarter: jiraMetrics?.quarter, window: jiraMetrics?.window, generatedAt: jiraMetrics?.generatedAt,
          ...jiraProject,
          excludedTickets: escapedTickets.filter(t => excludedKeys[t.key]).map(t => t.key),
          escapedEffective: escapedTickets.length ? { total: escTotalEff, critical: escCritEff, score: escScoreEff } : null,
        } : null,
      };
      saveAssessment(record);
      showToast('Assessment saved');
      setScores({});
      setExcludedKeys({});
      setOverrideActive(false);
      setOverrideJustification('');
      setNotes('');
      onSaved();
    } catch(e) { showToast(e.message,'error'); }
    finally { setSaving(false); }
  };

  return (
    <div>
      {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}

      {/* Meta */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
        <div className="card">
          <div className="section-label">Project</div>
          <select value={project} onChange={e=>setProject(e.target.value)} style={{width:'100%',fontSize:13,padding:'4px 0',border:'none',borderBottom:'.5px solid var(--border2)'}}>
            <option value="">Select a project...</option>
            {PROJECTS.map(p=><option key={p} value={p}>{p}</option>)}
            <option value="__custom__">Other...</option>
          </select>
          {project==='__custom__' && <input value={customProject} onChange={e=>setCustomProject(e.target.value)} placeholder="Project name" style={{width:'100%',fontSize:13,marginTop:8,padding:'4px 0',border:'none',borderBottom:'.5px solid var(--border2)'}}/>}
        </div>
        <div className="card">
          <div className="section-label">Evaluator</div>
          <input value={evaluator} onChange={e=>setEvaluator(e.target.value)} placeholder="Your name" style={{width:'100%',fontSize:13,padding:'4px 0',border:'none',borderBottom:'.5px solid var(--border2)'}}/>
        </div>
      </div>

      {/* Progress */}
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text2)',marginBottom:5}}>
          <span>{filledCount} of {allCriteria.length} criteria scored</span>
          <span>{pct}%</span>
        </div>
        <div style={{height:4,background:'var(--border)',borderRadius:2}}>
          <div style={{height:4,width:pct+'%',background:'var(--purple)',borderRadius:2,transition:'width .3s'}}/>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:16,alignItems:'start'}}>
        <div>
          {/* Base Risk */}
          <div className="dim-header">
            <div className="dim-title">Base Risk Manual</div>
            <span className="dim-badge" style={{background:'var(--bg2)',color:'var(--text2)',borderColor:'var(--border2)'}}>40% of Final Risk</span>
          </div>
          <div className="helper" style={{marginBottom:10}}>Inherent product risk. Pre-loaded from known project characteristics — review and adjust if something has changed.</div>
          {BASE_RISK_CRITERIA.map(c => (
            <CriterionCard key={c.id} criterion={c} score={scores[c.id]} onScore={setScore}
              colorMap={RISK_COLORS} weightPct={`${Math.round(BASE_WEIGHTS[c.id]*100)}% of group`}
              autoLoaded={PROJECT_DEFAULTS[finalProject] != null} />
          ))}

          {/* TRITON Score */}
          <div className="dim-header">
            <div className="dim-title">TRITON Score</div>
            <span className="dim-badge" style={{background:'#E8F0FE',color:'#1a3a6b',borderColor:'#4A6FA5'}}>60% of Final Risk</span>
          </div>
          <div className="helper" style={{marginBottom:10}}>Sourced automatically from TRITON (🔒 locked) — Defects this quarter scored 0–10 on an anchored Gaussian curve, severity-adjusted. Falls back to manual entry for projects not mapped in Jira. See §4.6 in Confluence for the JQL filter and curve.</div>
          {TRITON_CRITERIA.map(c => {
            if (isJiraLocked(c)) {
              const lvl = riskLevel(escScoreEff) || {};
              return (
                <div key={c.id} className="criterion-card filled">
                  <div className="criterion-top">
                    <div className="criterion-name">{c.label}</div>
                    <div className="criterion-meta">
                      <span style={{fontSize:11,color:'var(--text2)'}}>60% effective</span>
                      <span className="auto-tag">🔒 Jira</span>
                    </div>
                  </div>
                  <div className="criterion-desc">{c.description}</div>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginTop:6}}>
                    <div style={{minWidth:62,textAlign:'center',padding:'6px 8px',borderRadius:8,border:`1.5px solid ${lvl.border||'var(--border2)'}`,background:lvl.bg||'var(--bg2)'}}>
                      <div style={{fontSize:22,fontWeight:700,lineHeight:1,color:lvl.text||'var(--text)'}}>{escScoreEff!=null?escScoreEff.toFixed(1):'—'}</div>
                      <div style={{fontSize:9,color:lvl.text||'var(--text3)'}}>of 10</div>
                    </div>
                    <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.5}}>{jiraNote(c.id)}</div>
                  </div>
                </div>
              );
            }
            return (
              <CriterionCard key={c.id} criterion={c} score={scores[c.id]} onScore={setScore}
                colorMap={{2:RISK_COLORS[1],5:RISK_COLORS[2],9:RISK_COLORS[3]}} weightPct="60% effective" autoLoaded={false} />
            );
          })}

          {/* Escaped-defect ticket viewer — see exactly which defects are counted
              and manually exclude any service request the keyword filter missed. */}
          {escapedTickets.length > 0 && (
            <div className="card" style={{marginTop:8,padding:'10px 12px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',gap:8}} onClick={()=>setShowTickets(v=>!v)}>
                <span style={{fontSize:12,fontWeight:600}}>{showTickets?'▾':'▸'} Defects considered ({escTotalEff}{excludedCount?` of ${escapedTickets.length}`:''})</span>
                <span style={{fontSize:10.5,color:'var(--text3)'}}>Exclude a ticket if it's a service request the keyword filter missed</span>
              </div>
              {showTickets && (
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:3}}>
                  {escapedTickets.map(t => {
                    const ex = !!excludedKeys[t.key];
                    const pc = t.critical ? {bg:'#FAECE7',bd:'#D85A30',tx:'#712B13'} : {bg:'var(--bg2)',bd:'var(--border2)',tx:'var(--text2)'};
                    return (
                      <div key={t.key} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 6px',borderRadius:5,background:ex?'var(--bg2)':'transparent',opacity:ex?0.5:1}}>
                        <span style={{fontSize:9.5,fontWeight:600,padding:'1px 6px',borderRadius:4,background:pc.bg,color:pc.tx,border:`.5px solid ${pc.bd}`,whiteSpace:'nowrap'}}>{t.priority}</span>
                        <a href={t.url} target="_blank" rel="noreferrer" style={{fontSize:11,fontWeight:600,color:'var(--purple)',textDecoration:'none',whiteSpace:'nowrap'}}>{t.key}</a>
                        <span style={{fontSize:11,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,textDecoration:ex?'line-through':'none'}} title={t.summary}>{t.summary}</span>
                        <button className="opt-btn" onClick={()=>toggleExclude(t.key)} style={{fontSize:10,padding:'2px 8px',flexShrink:0,cursor:'pointer'}}>{ex?'Restore':'Exclude'}</button>
                      </div>
                    );
                  })}
                  <div style={{fontSize:10.5,color:'var(--text3)',marginTop:5,borderTop:'.5px solid var(--border)',paddingTop:5}}>
                    Effective: {escTotalEff} escaped ({escCritEff} critical) → score {escScoreEff}.{excludedCount?` ${excludedCount} excluded — recorded with the assessment.`:''}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Mitigation Multiplier */}
          <div className="dim-header">
            <div className="dim-title">Mitigation Multiplier</div>
            <span className="dim-badge" style={{background:'#E1F5EE',color:'#085041',borderColor:'#1D9E75'}}>Range 0.70 – 1.10</span>
          </div>
          <div className="helper" style={{marginBottom:10}}>Higher scores = stronger mitigations = lower multiplier = lower final risk. Confirm each quarter.</div>
          {MITIGATION_CRITERIA.map(c => (
            <CriterionCard key={c.id} criterion={c} score={scores[c.id]} onScore={setScore}
              colorMap={MIT_COLORS} weightPct={`${Math.round(MIT_WEIGHTS[c.id]*100)}% of group`}
              autoLoaded={c.inputType==='confirm' && PROJECT_DEFAULTS[finalProject] != null}
              reverseOptions={true}
              locked={isJiraLocked(c)} lockedNote={jiraNote(c.id)} />
          ))}

          {/* Manual Override */}
          <div className="dim-header">
            <div className="dim-title">Manual Override</div>
            <span className="dim-badge" style={{background:'var(--red-bg)',color:'var(--red-text)',borderColor:'var(--red-border)'}}>Sets Final Risk = 10</span>
          </div>
          <div className="helper" style={{marginBottom:10}}>Activate only if forward-looking signals indicate risk not yet reflected in data. Written justification is required.</div>
          <div className={`override-card ${overrideActive ? 'active' : ''}`}>
            <label className="override-toggle">
              <input type="checkbox" checked={overrideActive} onChange={e=>setOverrideActive(e.target.checked)}/>
              <span className="override-toggle-label" style={{color: overrideActive ? 'var(--red-text)' : 'var(--text)'}}>
                Activate override — set Final Risk to 10 (High)
              </span>
            </label>
            {overrideActive && (
              <div className="override-justification">
                <div style={{fontSize:11,color:'var(--red-text)',fontWeight:600,marginBottom:6}}>Justification required</div>
                <textarea value={overrideJustification} onChange={e=>setOverrideJustification(e.target.value)}
                  placeholder="Describe the forward-looking risk signal that justifies this override (e.g. major architectural change upcoming, critical feature entering production without adequate coverage)..."
                  rows={3} style={{width:'100%',fontSize:12,border:'.5px solid var(--red-border)',borderRadius:6,padding:'8px 10px',resize:'vertical',color:'var(--text)',background:'var(--bg)'}}/>
              </div>
            )}
          </div>

          {/* Notes */}
          <div className="card" style={{marginTop:8}}>
            <div className="section-label">Notes (optional)</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Context, observations, blockers..." rows={3} style={{width:'100%',fontSize:12,border:'none',resize:'vertical',color:'var(--text)',background:'transparent'}}/>
          </div>
        </div>

        {/* Sidebar */}
        <div style={{display:'flex',flexDirection:'column',gap:12,position:'sticky',top:16}}>
          {/* Score display */}
          <div className="score-display" style={{
            border: rl ? `1.5px solid ${rl.border}` : '.5px solid var(--border)',
            background: rl ? rl.bg : 'var(--bg2)'
          }}>
            <div style={{fontSize:11,fontWeight:600,color:rl?rl.text:'var(--text2)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:6}}>
              {result.overridden ? 'Override active' : 'Final Risk'}
            </div>
            <div className="score-num" style={{color:rl?rl.text:'var(--text3)'}}>
              {result.finalRisk != null ? result.finalRisk.toFixed(1) : '—'}<span style={{fontSize:'0.4em',fontWeight:500,opacity:.7}}> / 10</span>
            </div>
            <div className="score-level" style={{color:rl?rl.text:'var(--text3)'}}>
              {rl ? rl.label : 'Pending'}
            </div>
            {result.baseRisk != null && result.tritonScore != null && !result.overridden && (
              <div className="score-breakdown" style={{color:rl?.text}}>
                Base {result.baseRisk.toFixed(1)} × 0.40<br/>
                TRITON {result.tritonScore.toFixed(1)} × 0.60<br/>
                × {result.multiplier.toFixed(2)} multiplier
              </div>
            )}
          </div>

          {/* Formula */}
          <div className="formula-display">
            <strong>Formula</strong> <span style={{fontSize:10}}>(0–10 scale)</span><br/>
            <code>(Base × 0.40 + TRITON × 0.60) × Multiplier</code><br/>
            <span style={{fontSize:10}}>Override → Final Risk = 10</span>
          </div>

          {/* Legend */}
          <div className="card">
            <div className="section-label">Risk levels</div>
            {[{l:'Low',r:'0.0 – 5.0',c:'#085041',bg:'#E1F5EE'},{l:'Medium',r:'5.1 – 7.3',c:'#633806',bg:'#FAEEDA'},{l:'High',r:'7.4 – 10',c:'#712B13',bg:'#FAECE7'}].map(x=>(
              <div key={x.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <span className="pill" style={{background:x.bg,color:x.c}}>{x.l}</span>
                <span style={{fontSize:11,color:'var(--text2)'}}>{x.r}</span>
              </div>
            ))}
          </div>

          {/* Multiplier legend */}
          <div className="card">
            <div className="section-label">Mitigation multiplier</div>
            <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.6}}>
              Strong mitigations → <strong>0.70</strong> (reduces risk by 30%)<br/>
              Weak mitigations → <strong>1.10</strong> (increases risk by 10%)
            </div>
          </div>

          <button className="btn-primary" onClick={handleSave} disabled={!canSave||saving} style={{width:'100%',padding:'10px',fontSize:13}}>
            {saving ? 'Saving...' : 'Save Assessment'}
          </button>
          {!canSave && (
            <div style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>
              {!finalProject ? 'Select a project' :
               !evaluator.trim() ? 'Enter your name' :
               filledCount < allCriteria.length ? `Score all ${allCriteria.length} criteria` :
               overrideActive && !overrideJustification.trim() ? 'Add override justification' : ''}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── HistoryView ───────────────────────────────────────────────────────────────
function HistoryView({ refreshKey }) {
  const [records, setRecords] = useState([]);
  const [allRecords, setAllRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filterProject, setFilterProject] = useState('');
  const [viewMode, setViewMode] = useState('timeline');
  const [localRefresh, setLocalRefresh] = useState(0);
  const fileRef = useRef(null);

  useEffect(()=>{
    let cancelled = false;
    setLoading(true);
    loadAssessments().then(list=>{
      if (cancelled) return;
      const all = list.sort((a,b)=>new Date(b.date)-new Date(a.date));
      setAllRecords(all);
      setRecords(filterProject ? all.filter(r=>r.project===filterProject) : all);
      setLoading(false);
    });
    return ()=>{ cancelled = true; };
  },[filterProject,refreshKey,localRefresh]);

  const handleImport = e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) throw new Error('not an array');
        // Merge imported into local store by id (imported wins on conflict).
        const byId = new Map();
        loadLocalAssessments().forEach(r=>byId.set(r.id,r));
        imported.forEach(r=>byId.set(r.id,r));
        localStorage.setItem(STORAGE_KEY, JSON.stringify([...byId.values()]));
        setLocalRefresh(n=>n+1);
      } catch { alert('Invalid data.json file'); }
    };
    reader.readAsText(f);
    e.target.value = '';
  };

  const projects = [...new Set(records.map(r=>r.project))].sort();
  const byProject = projects.reduce((acc,p)=>{ acc[p]=records.filter(r=>r.project===p).sort((a,b)=>new Date(a.date)-new Date(b.date)); return acc; },{});
  const fmtDate = iso => new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  return (
    <div>
      <div className="history-toolbar">
        <select value={filterProject} onChange={e=>setFilterProject(e.target.value)}>
          <option value="">All projects</option>
          {[...new Set([...PROJECTS,...projects])].map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        <div className="toggle-wrap">
          <button className={`toggle-btn${viewMode==='timeline'?' active':''}`} onClick={()=>setViewMode('timeline')}>Timeline</button>
          <button className={`toggle-btn${viewMode==='table'?' active':''}`} onClick={()=>setViewMode('table')}>Table</button>
        </div>
        <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{records.length} assessment{records.length!==1?'s':''}</span>
        <input ref={fileRef} type="file" accept="application/json,.json" onChange={handleImport} style={{display:'none'}}/>
        <button className="toggle-btn" style={{border:'1px solid var(--border2)',borderRadius:6}} onClick={()=>fileRef.current && fileRef.current.click()}>Import data.json</button>
        <button className="btn-primary" style={{fontSize:11,padding:'5px 12px'}} onClick={()=>exportAssessments(allRecords)} disabled={!allRecords.length}>Export data.json</button>
      </div>
      <div className="helper" style={{marginBottom:16}}>
        To share your assessments with the team, click <strong>Export data.json</strong> and commit the downloaded file to <code>risk-baseline/data.json</code> in the repo. Everyone who opens this page then sees the committed assessments.
      </div>

      {loading && <div className="empty-state">Loading...</div>}
      {!loading && records.length===0 && <div className="empty-state">No assessments yet. Run the first one from the Assessment tab.</div>}

      {!loading && records.length>0 && viewMode==='timeline' && (
        <div className="timeline-wrap">
          {Object.entries(byProject).map(([proj,recs])=>(
            <div key={proj} className="timeline-project">
              <div className="timeline-project-name">{proj}</div>
              <div className="timeline-points">
                {recs.map(r=>{
                  const rl = r.level ? levelByLabel(r.level) : (r.finalRisk != null ? riskLevel(r.finalRisk) : null);
                  return (
                    <div key={r.id} className="timeline-point" style={{background:rl?rl.bg:'var(--bg2)',border:`1px solid ${rl?rl.border:'var(--border)'}`}} title={r.overrideActive?`Override: ${r.overrideJustification}`:r.notes||''}>
                      <div className="tp-date">{fmtDate(r.date)}</div>
                      <div className="tp-score" style={{color:rl?rl.text:'var(--text3)'}}>{r.finalRisk!=null?r.finalRisk.toFixed(1):'—'}</div>
                      <div className="tp-level" style={{color:rl?rl.text:'var(--text3)'}}>{rl?rl.label:'—'}{r.overrideActive?' ⚑':''}</div>
                      <div className="tp-eval">by {r.evaluator}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {!loading && records.length>0 && viewMode==='table' && (
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Project</th><th>Final Risk</th><th>Level</th>
                <th>Base Risk</th><th>TRITON</th><th>Multiplier</th>
                <th>Override</th><th>Evaluator</th><th>Notes</th>
              </tr>
            </thead>
            <tbody>
              {records.map(r=>{
                const rl = r.level ? levelByLabel(r.level) : (r.finalRisk!=null?riskLevel(r.finalRisk):null);
                return (
                  <tr key={r.id}>
                    <td style={{color:'var(--text2)',whiteSpace:'nowrap'}}>{fmtDate(r.date)}</td>
                    <td style={{fontWeight:600}}>{r.project}</td>
                    <td style={{fontWeight:700,color:rl?rl.text:'var(--text3)'}}>{r.finalRisk!=null?r.finalRisk.toFixed(1):'—'}</td>
                    <td>{rl&&<span className="pill" style={{background:rl.bg,color:rl.text}}>{rl.label}</span>}</td>
                    <td style={{color:'var(--text2)'}}>{r.baseRisk!=null?r.baseRisk.toFixed(1):'—'}</td>
                    <td style={{color:'var(--text2)'}}>{r.tritonScore!=null?r.tritonScore.toFixed(1):'—'}</td>
                    <td style={{color:'var(--text2)'}}>{r.multiplier!=null?r.multiplier.toFixed(2):'—'}</td>
                    <td style={{color:r.overrideActive?'var(--red-text)':'var(--text3)'}}>{r.overrideActive?'⚑ Yes':'—'}</td>
                    <td style={{color:'var(--text2)'}}>{r.evaluator}</td>
                    <td style={{color:'var(--text2)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.notes||'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('assess');
  const [historyRefresh, setHistoryRefresh] = useState(0);
  const [jiraMetrics, setJiraMetrics] = useState(null);

  // Load Jira metrics once; shared by the header period label and the assessment.
  useEffect(() => {
    fetch('./jira-metrics.json', {cache:'no-store'})
      .then(r => r.ok ? r.json() : null)
      .then(setJiraMetrics)
      .catch(() => setJiraMetrics(null));
  }, []);

  const fmtDay = s => { try { return new Date(s + (s.length===10?'T00:00:00':'')).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return s; } };
  const w = jiraMetrics?.window;
  const periodText = w ? `TRITON data: ${fmtDay(w.from)} – ${fmtDay(w.to)}` : 'shared via data.json';

  return (
    <div>
      <div className="header">
        <div className="header-left">
          <h1>QA Risk Baseline</h1>
          <p>Mira &amp; GenAI QA Team · Q3 2026 model · {periodText}</p>
        </div>
        <div className="nav-tabs">
          <button className={`nav-tab${tab==='assess'?' active':''}`} onClick={()=>setTab('assess')}>Assessment</button>
          <button className={`nav-tab${tab==='history'?' active':''}`} onClick={()=>setTab('history')}>History</button>
        </div>
      </div>
      {tab==='assess' && <AssessView onSaved={()=>setHistoryRefresh(n=>n+1)} jiraMetrics={jiraMetrics}/>}
      {tab==='history' && <HistoryView refreshKey={historyRefresh}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
