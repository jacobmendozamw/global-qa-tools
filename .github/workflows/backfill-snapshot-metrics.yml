name: Backfill Historical Snapshot Metrics

on:
  workflow_dispatch:   # manual one-shot trigger

permissions:
  contents: write

jobs:
  q1-2026:
    name: Q1-2026 snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch Q1-2026 test metrics
        env:
          GH_TOKEN: ${{ secrets.METRICS_READ_TOKEN }}
        run: |
          node scripts/fetch-snapshot-metrics.mjs \
            --tree=f08f4f50cba3572c9b1deaa9e3b6154a95fb3eaa \
            --label=Q1-2026
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-q1-2026
          path: risk-baseline/historical-test-metrics.json

  q2-2026:
    name: Q2-2026 snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch Q2-2026 test metrics
        env:
          GH_TOKEN: ${{ secrets.METRICS_READ_TOKEN }}
        run: |
          node scripts/fetch-snapshot-metrics.mjs \
            --tree=5f4063ca824ea71cc02eac4fe5f82afdc2c3bf35 \
            --label=Q2-2026
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-q2-2026
          path: risk-baseline/historical-test-metrics.json

  merge-and-commit:
    name: Merge results and commit
    runs-on: ubuntu-latest
    needs: [q1-2026, q2-2026]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/download-artifact@v4
        with:
          name: snapshot-q1-2026
          path: /tmp/q1
      - uses: actions/download-artifact@v4
        with:
          name: snapshot-q2-2026
          path: /tmp/q2
      - name: Merge JSONs
        run: |
          node -e "
            const fs = require('fs');
            const q1 = JSON.parse(fs.readFileSync('/tmp/q1/historical-test-metrics.json'));
            const q2 = JSON.parse(fs.readFileSync('/tmp/q2/historical-test-metrics.json'));
            const merged = { ...q1, ...q2 };
            fs.writeFileSync('risk-baseline/historical-test-metrics.json', JSON.stringify(merged, null, 2) + '\n');
            console.log('Quarters:', Object.keys(merged).join(', '));
          "
      - name: Commit result
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add risk-baseline/historical-test-metrics.json
          git diff --staged --quiet || git commit -m "chore(historical-metrics): backfill Q1-2026 and Q2-2026 test snapshots"
          git push
