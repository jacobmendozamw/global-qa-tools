name: Backfill Historical Snapshot Metrics

on:
  workflow_dispatch:   # manual one-shot trigger

permissions:
  contents: write

jobs:
  q4-2025:
    name: Q4-2025 snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch Q4-2025 test metrics
        env:
          GH_TOKEN: ${{ secrets.METRICS_READ_TOKEN }}
        run: |
          node scripts/fetch-snapshot-metrics.mjs \
            --tree=d0bfc7c0b96043d927a773a5010dc071ac0a5b73 \
            --label=Q4-2025
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-q4-2025
          path: risk-baseline/historical-test-metrics.json

  q1-2026:
    name: Q1-2026 snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch Q1-2026 test metrics
        env:
          GH_TOKEN: ${{ secrets.METRICS_READ_TOKEN }}
        run: |
          node scripts/fetch-snapshot-metrics.mjs \
            --tree=f08f4f50cba3572c9b1deaa9e3b6154a95fb3eaa \
            --label=Q1-2026
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-q1-2026
          path: risk-baseline/historical-test-metrics.json

  merge-and-commit:
    name: Merge results and commit
    runs-on: ubuntu-latest
    needs: [q4-2025, q1-2026]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/download-artifact@v4
        with:
          name: snapshot-q4-2025
          path: /tmp/q4
      - uses: actions/download-artifact@v4
        with:
          name: snapshot-q1-2026
          path: /tmp/q1
      - name: Merge both JSONs
        run: |
          node -e "
            const fs = require('fs');
            const q4 = JSON.parse(fs.readFileSync('/tmp/q4/historical-test-metrics.json'));
            const q1 = JSON.parse(fs.readFileSync('/tmp/q1/historical-test-metrics.json'));
            const merged = { ...q4, ...q1 };
            fs.writeFileSync('risk-baseline/historical-test-metrics.json', JSON.stringify(merged, null, 2) + '\n');
            console.log('Merged quarters:', Object.keys(merged).join(', '));
          "
      - name: Commit result
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add risk-baseline/historical-test-metrics.json
          git diff --staged --quiet || git commit -m "chore(historical-metrics): backfill Q4-2025 and Q1-2026 test snapshots"
          git push
