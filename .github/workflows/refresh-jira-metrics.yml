name: Refresh Jira Metrics

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Fetch Jira metrics
        env:
          # Atlassian account email + API token with read access to TRITON and all
          # configured dev project boards (GAIL, HZN, MOB, MIRA, SMM).
          # Create the token at id.atlassian.com (Security → API tokens) and store
          # both as repo secrets (Settings → Secrets and variables → Actions).
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node scripts/fetch-jira-metrics.mjs

      # main is protected (changes must go through a PR), so instead of pushing
      # directly we open/update a single rolling PR with the refreshed JSON.
      - name: Open or update PR with refreshed data
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            risk-baseline/jira-metrics.json
            risk-baseline/data.json
          branch: automated/jira-metrics-refresh
          base: main
          commit-message: "chore: refresh Jira metrics data (TRITON + escaped + pre-production)"
          title: "chore: refresh Jira metrics data (TRITON + escaped + pre-production)"
          assignees: |
            jacobmendozamw
          reviewers: |
            jacobmendozamw
          body: |
            Automated refresh of `risk-baseline/jira-metrics.json` by the **Refresh Jira Metrics** workflow.

            **What this updates:**
            - **TRITON escaped defects** — customer-reported Defects/Tickets this quarter, per project component (service requests excluded by keyword filter)
            - **Pre-production catches** — tickets tagged `labels = known` and reported by the QA team on dev boards (GAIL, HZN, MOB, MIRA, MIRALEGACY, SMM/Conversations) — bugs found in staging that never reached production
            - **Production-escaped catches** — tickets tagged `labels = escaped` across dev boards — bugs found in production before customer reports
            - **Comprehensive DCE score** — (pre-production + escaped) / (pre-production + escaped + customer-reported), mapped to a 1–3 mitigation score for the Risk Index and driving the QAEI

            Merge to publish the latest values into the QA Risk Baseline tool.
          labels: |
            automated
            metrics
