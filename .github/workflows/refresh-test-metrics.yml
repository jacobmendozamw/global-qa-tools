name: Refresh Test Metrics

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC daily
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch test metrics from GitHub
        env:
          GH_TOKEN: ${{ secrets.METRICS_READ_TOKEN }}
        run: node scripts/fetch-test-metrics.mjs

      - name: Open or update rolling PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/test-metrics-refresh
          commit-message: 'chore(test-metrics): automated refresh ${{ github.run_id }}'
          title: '[Auto] Refresh test metrics'
          body: |
            Automated update of `risk-baseline/test-metrics.json`.

            Generated by the **Refresh Test Metrics** workflow.
            Spec file counts and active test counts are fetched live from:
            - `meltwater/global-qa-test-suite` (Playwright)
            - `meltwater/global-qa-mobile-test-suite` (Maestro)

            Review and merge to publish updated counts to the web app.
          labels: automated,test-metrics
          delete-branch: true
